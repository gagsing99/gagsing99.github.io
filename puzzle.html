<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drag & Drop Animal Puzzle (+2 Increments)</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 480px;
        }

        .panel {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .info-panel {
            display: grid;
            grid-template-columns: 1fr 90px;
            gap: 12px;
            align-items: center;
        }

        .stats-wrapper {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.4);
            padding: 8px 12px;
            border-radius: 8px;
        }

        .stat-box {
            text-align: center;
        }

        .stat-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
        }

        .preview-box {
            text-align: center;
        }

        .preview-img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #334155;
            background-color: #0f172a;
            display: block;
        }

        #shuffle-btn {
            grid-column: span 2;
            margin-top: 0;
        }

        .puzzle-panel {
            position: relative;
            padding: 8px;
            background: #1e293b;
        }

        #puzzle-board {
            display: grid;
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #334155;
            border-radius: 8px;
            overflow: hidden;
            gap: 2px;
            border: 2px solid #334155;
        }

        .tile {
            cursor: grab;
            background-repeat: no-repeat;
            user-select: none;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
            touch-action: none; 
            position: relative;
            transition: transform 0.05s linear;
        }

        .tile.dragging {
            cursor: grabbing;
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            opacity: 0.9;
            transform: scale(1.05);
            pointer-events: none; 
        }

        .tile.drop-target {
            outline: 3px dashed #f59e0b;
            outline-offset: -3px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.95rem;
            width: 100%;
        }

        button:hover, button:active {
            background-color: var(--primary-hover);
        }

        .win-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 120;
            padding: 15px;
        }

        .win-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .win-card {
            text-align: center;
            background: #1e293b;
            padding: 25px 20px;
            border-radius: 12px;
            border: 2px solid var(--success);
            width: 100%;
            max-width: 320px;
        }

        .win-title {
            color: var(--success);
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        @media (min-width: 768px) {
            body { padding: 30px; }
            h1 { font-size: 2.3rem; }
            .game-container {
                flex-direction: row;
                max-width: 820px;
                gap: 25px;
                align-items: flex-start;
            }
            .info-panel {
                display: flex;
                flex-direction: column;
                width: 260px;
                gap: 20px;
                padding: 20px;
            }
            .stats-wrapper { width: 100%; }
            .stats-row {
                flex-direction: column;
                gap: 12px;
                padding: 15px;
            }
            .preview-img { width: 100%; height: 150px; }
            #shuffle-btn { margin-top: 10px; }
            .puzzle-panel { flex: 1; padding: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Fauna Jigsaw Quest</h1>
        <p class="subtitle">Drag & Drop pieces to swap • +2 extra pieces per level</p>
    </header>

    <div class="game-container">
        <div class="panel info-panel">
            <div class="stats-wrapper">
                <div class="stats-row">
                    <div class="stat-box">
                        <div class="stat-label">Level</div>
                        <div id="level-val" class="stat-value">1 / 10</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Pieces</div>
                        <div id="pieces-val" class="stat-value">10</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Moves</div>
                        <div id="moves-val" class="stat-value">0</div>
                    </div>
                </div>
            </div>

            <div class="preview-box">
                <img id="preview-image" class="preview-img" src="" alt="Target animal preview">
            </div>

            <button id="shuffle-btn">Reshuffle Board</button>
        </div>

        <div class="panel puzzle-panel">
            <div id="puzzle-board"></div>
            
            <div id="win-overlay" class="win-overlay">
                <div class="win-card">
                    <h2 class="win-title">Level Cleared! 🎉</h2>
                    <p id="win-msg" style="margin-bottom: 20px; color: var(--text-muted); font-size: 0.95rem;"></p>
                    <button id="next-lvl-btn">Next Level</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // High-stability source parameters explicitly processed to prevent cross-origin loading drops
        const animalImages = [
            "https://images.unsplash.com/photo-1546182990-dffeafbe841d?w=600&auto=format&fit=crop&q=80", // Lion
            "https://images.unsplash.com/photo-1564349683136-77e08dba1ef7?w=600&auto=format&fit=crop&q=80", // Tiger
            "https://images.unsplash.com/photo-1557050543-4d5f4e07ef46?w=600&auto=format&fit=crop&q=80", // Elephant
            "https://images.unsplash.com/photo-1474511320723-9a56873867b5?w=600&auto=format&fit=crop&q=80", // Fox
            "https://images.unsplash.com/photo-1501705388883-4ed8a543392c?w=600&auto=format&fit=crop&q=80", // Zebra
            "https://images.unsplash.com/photo-1526336028067-6484187f6421?w=600&auto=format&fit=crop&q=80", // Panda
            "https://images.unsplash.com/photo-1575550959106-5a7defe28b56?w=600&auto=format&fit=crop&q=80", // Leopard
            "https://images.unsplash.com/photo-1484406566174-9da000fda645?w=600&auto=format&fit=crop&q=80", // Deer
            "https://images.unsplash.com/photo-1507666405895-422efe53f00d?w=600&auto=format&fit=crop&q=80", // Giraffe
            "https://images.unsplash.com/photo-1540573133-896cf78d1217?w=600&auto=format&fit=crop&q=80"  // Monkey
        ];

        // Explicit structural configuration map to handle the dynamic layout math cleanly for +2 increments
        const levelConfig = [
            { pieces: 10, cols: 5, rows: 2 }, // L1
            { pieces: 12, cols: 4, rows: 3 }, // L2
            { pieces: 14, cols: 7, rows: 2 }, // L3
            { pieces: 16, cols: 4, rows: 4 }, // L4
            { pieces: 18, cols: 6, rows: 3 }, // L5
            { pieces: 20, cols: 5, rows: 4 }, // L6
            { pieces: 22, cols: 11, rows: 2 },// L7
            { pieces: 24, cols: 6, rows: 4 }, // L8
            { pieces: 26, cols: 13, rows: 2 },// L9
            { pieces: 28, cols: 7, rows: 4 }  // L10
        ];

        let currentLevel = 1;
        const maxLevels = 10;
        
        let piecesCount = 10;
        let rows = 2;
        let columns = 5;
        
        let tilesArray = [];
        let moveCount = 0;
        let currentImageUrl = "";

        let draggedTile = null;
        let startX = 0;
        let startY = 0;
        let currentTargetTile = null;

        const board = document.getElementById("puzzle-board");
        const previewImage = document.getElementById("preview-image");
        const levelVal = document.getElementById("level-val");
        const piecesVal = document.getElementById("pieces-val");
        const movesVal = document.getElementById("moves-val");
        const winOverlay = document.getElementById("win-overlay");
        const winMsg = document.getElementById("win-msg");
        const nextLvlBtn = document.getElementById("next-lvl-btn");
        const shuffleBtn = document.getElementById("shuffle-btn");

        function initGame() {
            // Load structural layout calculations directly from configuration mapping
            const config = levelConfig[currentLevel - 1];
            piecesCount = config.pieces;
            columns = config.cols;
            rows = config.rows;

            levelVal.innerText = `${currentLevel} / ${maxLevels}`;
            piecesVal.innerText = piecesCount;
            moveCount = 0;
            movesVal.innerText = moveCount;
            
            currentImageUrl = animalImages[currentLevel - 1];
            previewImage.src = currentImageUrl;

            winOverlay.classList.remove("active");
            draggedTile = null;

            buildPuzzleBoard();
        }

        function buildPuzzleBoard() {
            board.innerHTML = "";
            board.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
            board.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

            tilesArray = [];

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < columns; c++) {
                    const id = r * columns + c;
                    
                    const tile = document.createElement("div");
                    tile.classList.add("tile");
                    tile.dataset.correctId = id;
                    tile.dataset.currentId = id;

                    tile.addEventListener("pointerdown", onPointerDown);
                    tilesArray.push(tile);
                }
            }

            shuffleBoard();
            renderBoard();
        }

        function shuffleBoard() {
            do {
                for (let i = tilesArray.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    const temp = tilesArray[i].dataset.currentId;
                    tilesArray[i].dataset.currentId = tilesArray[j].dataset.currentId;
                    tilesArray[j].dataset.currentId = temp;
                }
            } while (checkWinCondition());
        }

        function renderBoard() {
            const sortedTiles = [...tilesArray].sort((a, b) => a.dataset.currentId - b.dataset.currentId);
            board.innerHTML = "";
            sortedTiles.forEach(tile => board.appendChild(tile));
            
            tilesArray.forEach(tile => {
                const correctPos = parseInt(tile.dataset.correctId);
                const targetC = correctPos % columns;
                const targetR = Math.floor(correctPos / columns);

                const posX = columns > 1 ? (targetC / (columns - 1)) * 100 : 0;
                const posY = rows > 1 ? (targetR / (rows - 1)) * 100 : 0;
                
                tile.style.backgroundImage = `url('${currentImageUrl}')`;
                tile.style.backgroundSize = `${columns * 100}% ${rows * 100}%`;
                tile.style.backgroundPosition = `${posX}% ${posY}%`;
            });
        }

        // --- Pointer Event Handling Systems ---
        function onPointerDown(e) {
            if (winOverlay.classList.contains("active")) return;
            
            draggedTile = e.currentTarget;
            startX = e.clientX;
            startY = e.clientY;

            draggedTile.classList.add("dragging");
            draggedTile.setPointerCapture(e.pointerId);

            draggedTile.addEventListener("pointermove", onPointerMove);
            draggedTile.addEventListener("pointerup", onPointerUp);
            draggedTile.addEventListener("pointercancel", onPointerUp);
        }

        function onPointerMove(e) {
            if (!draggedTile) return;

            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            draggedTile.style.transform = `translate(${dx}px, ${dy}px)`;

            const elementUnder = document.elementFromPoint(e.clientX, e.clientY);
            
            if (currentTargetTile && currentTargetTile !== elementUnder) {
                currentTargetTile.classList.remove("drop-target");
                currentTargetTile = null;
            }

            if (elementUnder && elementUnder.classList.contains("tile") && elementUnder !== draggedTile) {
                currentTargetTile = elementUnder;
                currentTargetTile.classList.add("drop-target");
            }
        }

        function onPointerUp(e) {
            if (!draggedTile) return;

            draggedTile.removeEventListener("pointermove", onPointerMove);
            draggedTile.removeEventListener("pointerup", onPointerUp);
            draggedTile.removeEventListener("pointercancel", onPointerUp);

            draggedTile.releasePointerCapture(e.pointerId);
            draggedTile.classList.remove("dragging");
            draggedTile.style.transform = "";

            if (currentTargetTile) {
                currentTargetTile.classList.remove("drop-target");

                const tempId = draggedTile.dataset.currentId;
                draggedTile.dataset.currentId = currentTargetTile.dataset.currentId;
                currentTargetTile.dataset.currentId = tempId;

                moveCount++;
                movesVal.innerText = moveCount;

                renderBoard();

                if (checkWinCondition()) {
                    setTimeout(triggerWinState, 200);
                }
            }

            draggedTile = null;
            currentTargetTile = null;
        }

        function checkWinCondition() {
            return tilesArray.every(tile => tile.dataset.correctId === tile.dataset.currentId);
        }

        function triggerWinState() {
            winMsg.innerText = `Cleared Level ${currentLevel} using ${moveCount} swaps!`;
            if (currentLevel >= maxLevels) {
                winMsg.innerText += "\n🏆 Brilliant! You've completely mastered all 10 custom tiers!";
                nextLvlBtn.innerText = "Replay Game";
            } else {
                nextLvlBtn.innerText = `Advance to Level ${currentLevel + 1} (${levelConfig[currentLevel].pieces} Pieces)`;
            }
            winOverlay.classList.add("active");
        }

        nextLvlBtn.addEventListener("click", () => {
            if (currentLevel >= maxLevels) {
                currentLevel = 1;
            } else {
                currentLevel++;
            }
            initGame();
        });

        shuffleBtn.addEventListener("click", () => {
            shuffleBoard();
            renderBoard();
        });

        window.onload = initGame;
    </script>
</body>
</html>
