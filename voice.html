<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Whisper Game - Continuous Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #121214; color: #e0e0e0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 15px;
        }
        .game-container {
            background: #1e1e24; padding: 25px 20px; border-radius: 16px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.6); text-align: center;
            max-width: 450px; width: 100%;
        }
        h1 { color: #bb86fc; margin-top: 0; margin-bottom: 8px; font-size: 24px; }
        .progress-badge {
            display: inline-block; background: #bb86fc; color: #121214;
            padding: 6px 16px; border-radius: 20px; font-weight: bold;
            font-size: 13px; margin-bottom: 20px; text-transform: uppercase;
        }
        .phrase-box {
            background: #2d2d34; padding: 24px 15px; border-radius: 12px;
            font-size: 20px; font-weight: 600; margin: 15px 0;
            border-left: 6px solid #bb86fc; min-height: 70px;
            display: flex; align-items: center; justify-content: center;
            word-break: break-word;
        }
        .meter { height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 15px; display: none; }
        .meter-fill { height: 100%; background: #03dac6; width: 0%; transition: width 0.1s; }
        .status { font-style: italic; color: #b3b3b3; min-height: 24px; margin: 10px 0; font-size: 14px; }
        button {
            width: 100%; padding: 16px; font-size: 18px; border-radius: 12px;
            border: none; cursor: pointer; background: #03dac6; color: #000;
            font-weight: bold; transition: 0.2s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .result { font-size: 18px; margin-top: 20px; font-weight: bold; }
        .success { color: #4caf50; }
        .failure { color: #f44336; }
        .transcript { font-size: 15px; color: #ffb74d; margin-top: 12px; font-style: italic; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🤫 Whisper Only</h1>
    <div class="progress-badge" id="progress-badge">Easy Mode — Phrase 1/25</div>
    <div class="phrase-box" id="target-phrase">Loading...</div>
    
    <div class="meter" id="volume-meter"><div class="meter-fill" id="meter-fill"></div></div>
    
    <button id="record-btn" onclick="handleButtonClick()">🎤 Start Game</button>
    <div class="status" id="status">Tap button to start game and enable mic</div>
    <div class="result" id="result"></div>
    <div class="transcript" id="transcript"></div>
</div>

<script>
const phraseBank = {
    easy: [
        "Cat sat on the mat", "Blue sky", "Hot coffee", "Red apple", "Big dog",
        "Cold water", "Run fast", "Gagan loves you", "Good morning", "Happy birthday",
        "Green grass", "Fly a kite", "Soft pillow", "White snow", "Sing a song",
        "Read a book", "Time to eat", "Gagani loves me", "Bright stars", "Drive the car",
        "Baby smiles", "Fish can swim", "Ice cream cone", "I love you three thousand", "Sweet dreams"
    ],
    medium: [
        "The quick brown fox jumps", "Whispering winds in the woods", "A rolling stone gathers no moss", "Coding late into the night", "Baking fresh blueberry muffins",
        "JavaScript engines run incredibly fast", "Tusi great ho", "A picture is worth a thousand words", "An apple a day keeps the doctor away", "Curiosity killed the cat eventually",
        "Better late than never to arrive", "Practice makes perfect every single day", "Every cloud has a silver lining inside", "Jassa Singh is great", "The early bird catches the worm",
        "Actions speak louder than empty words", "Don't count your chickens before hatching", "Good things come to those who wait", "Honesty is definitely the best policy", "Knowledge is power in this modern world",
        "Light travels faster than heavy sound", "The pen is mightier than a sharp sword", "Two heads are better than one brain", "Where there is a will there is a way", "Birds of a feather flock together closely"
    ],
    hard: [
        "Syntactic sugar causes cancer of the semicolon", "Asynchronous operations handle continuous background network traffic smoothly", "Parallel processing distributed computing infrastructure scales up easily", "Algorithm efficiency dramatically improves overall system rendering benchmarks", "Cryptographic protocols guarantee absolute confidentiality during data transmission",
        "Sublime acoustics echo through the cavernous subterranean chambers", "Meticulous architecture prevents catastrophic stack overflow exceptions completely", "Phenomenal cosmic power hidden inside an incredibly microscopic space", "Flamboyant flamingos frantically fluttered past the tropical paradise", "Superficial conversations seldom satisfy deeply analytical intellectual human minds",
        "Juxtaposing chaotic dynamic environments against structured static frameworks", "Enigmatic whispers echo endlessly down the abandoned concrete hallways", "Exquisite culinary masterpieces require exceptional attention to microscopic details", "Idiosyncratic behaviors often characterize brilliant eccentric software engineers", "Perpendicular lines intersect precisely at ninety degree perfect angles",
        "Symmetrical geometric patterns emerged from the chaotic mathematical simulations", "Unprecedented technological advancements completely revolutionized global communications networks", "Vicarious adventures experienced entirely through reading fictional fantasy novels", "Whimsical woodwinds played delightful melodies during the autumn festival", "Zealous young entrepreneurs launched a highly disruptive financial platform"
    ],
    "super-hard": [
        "Pneumonoultramicroscopicsilicovolcanoconiosis is a fictional lung disease caused by inhaling fine ash", "Peter Piper picked a peck of pickled peppers before packing his bags for Peru", "She sells seashells by the seashore while shouting sharp sounds dramatically", "The sixth sick sheik's sixth sheep is incredibly sick according to local legends", "Supercalifragilisticexpialidocious sounds quite atrocious when whispered backward in total darkness",
        "Antidisestablishmentarianism was a highly prominent political philosophy in nineteenth century England", "Floccinaucinihilipilification is the habit of estimating something as completely worthless", "Honorificabilitudinitatibus is the state of being able to achieve high honorable status", "Pseudopseudohypoparathyroidism causes mild genetic medical conditions mimicking classic symptoms perfectly", "Llanfairpwllgwyngyllgogerychwyrndrobwllllantysiliogogogoch is a real town name located in Wales",
        "Deoxyribonucleic acid carries the entire complex genetic blueprint for living organisms", "Electroencephalographically recording neural pathways provides profound diagnostic insights into human brains", "Incomprehensibility remains a fundamental characteristic of advanced quantum mechanics theories", "Uncharacteristically uncooperative unicyclists upset the entirely synchronized parade choreography", "Institutionalization of highly complex multi tiered bureaucratic systems creates massive stagnation",
        "Mathematical compartmentalization facilitates easier execution of incredibly dense calculations", "Counterrevolutionary movements historically faced massive pushback from established governing regimes", "Intercontinental ballistic missile defense systems require instantaneous microsecond calculations", "Dacryocystorhinostomy surgeries restore proper tear drainage pathways into the nasal cavity", "The automated garbage collector optimized memory allocation profiles without interrupting application threads"
    ]
};

const levelOrder = ["easy", "medium", "hard", "super-hard"];
let currentLevelIndex = 0, currentPhraseIndex = 0;
let isListening = false;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = true; // STAYS ALIVE CONTINUOUSLY
    recognition.lang = 'en-US';
    recognition.interimResults = true; // Catch words mid-sentence for instant processing

    recognition.onstart = () => {
        isListening = true;
        const btn = document.getElementById('record-btn');
        btn.innerText = "🛑 Stop Engine";
        btn.style.background = "#f44336";
    };

    recognition.onerror = (event) => {
        if (event.error !== 'no-speech') {
            document.getElementById('status').innerText = "❌ Engine Error: " + event.error;
            stopListeningState();
        }
    };

    recognition.onend = () => { 
        // Auto-restart if user didn't intentionally click stop
        if (isListening) {
            try { recognition.start(); } catch(e) {}
        }
    };

    recognition.onresult = (event) => {
        let finalTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal || event.results[i][0].confidence > 0.1) {
                finalTranscript += event.results[i][0].transcript;
            }
        }
        
        if (finalTranscript.trim().length > 0) {
            document.getElementById('transcript').innerText = `Detected: "${finalTranscript}"`;
            evaluateResult(finalTranscript);
        }
    };
} else {
    alert("Speech API not fully supported here. Use Chrome or Safari.");
}

// Perform isolated whisper calibration check before starting the speech engine
function runWhisperGatekeeper() {
    return new Promise(async (resolve) => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 256;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            document.getElementById('volume-meter').style.display = "block";
            document.getElementById('status').innerText = "🔊 Testing noise level... Keep quiet!";
            document.getElementById('status').style.color = "#ffb74d";

            let maxVolume = 0;
            let checks = 0;
            
            const interval = setInterval(() => {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                let average = sum / dataArray.length;
                
                maxVolume = Math.max(maxVolume, average);
                document.getElementById('meter-fill').style.width = Math.min(average * 3, 100) + "%";
                checks++;

                if (checks >= 20) { // Test for ~2 seconds
                    clearInterval(interval);
                    
                    // Disconnect and shut down track safely to release hardware conflict
                    stream.getTracks().forEach(track => track.stop());
                    audioCtx.close();
                    document.getElementById('volume-meter').style.display = "none";
                    
                    // Target ceiling threshold
                    if (maxVolume > 38) {
                        resolve(false); 
                    } else {
                        resolve(true);
                    }
                }
            }, 100);

        } catch (e) {
            document.getElementById('status').innerText = "❌ Microphone access blocked.";
            resolve(false);
        }
    });
}

async function handleButtonClick() {
    if (!SpeechRecognition) return;

    if (isListening) {
        stopListeningState();
        return;
    }

    document.getElementById('status').innerText = "🔄 Initializing calibration...";
    const passesWhisperGate = await runWhisperGatekeeper();
    
    if (!passesWhisperGate) {
        document.getElementById('status').innerText = "⚠️ TOO LOUD! You must speak softly or whisper to play.";
        document.getElementById('status').style.color = "#f44336";
        return;
    }

    // Pass configuration check -> Safe to run core isolated translation engine
    document.getElementById('status').innerText = ""; 
    try {
        recognition.start();
    } catch(e) {
        console.error(e);
    }
}

function stopListeningState() {
    isListening = false;
    try { recognition.stop(); } catch(e) {}
    const btn = document.getElementById('record-btn');
    if (btn) {
        btn.innerText = "🎤 Start Game";
        btn.style.background = "#03dac6";
    }
    document.getElementById('status').innerText = "Engine stopped.";
    document.getElementById('status').style.color = "#b3b3b3";
}

function updateGameDisplay() {
    const currentTier = levelOrder[currentLevelIndex];
    if (!currentTier) {
        document.getElementById('progress-badge').innerText = "🏆 Campaign Complete!";
        document.getElementById('target-phrase').innerText = "Incredible! You completed all 100 whispers!";
        document.getElementById('record-btn').style.display = "none";
        stopListeningState();
        return;
    }
    
    const targetPhrase = phraseBank[currentTier][currentPhraseIndex];
    const friendlyTierNames = { "easy": "Easy Mode", "medium": "Medium Mode", "hard": "Hard Mode", "super-hard": "💥 Super Hard Mode" };
    
    document.getElementById('progress-badge').innerText = `${friendlyTierNames[currentTier]} — ${currentPhraseIndex + 1}/25`;
    document.getElementById('target-phrase').innerText = targetPhrase;
}

function advanceProgress() {
    currentPhraseIndex++;
    if (currentPhraseIndex >= 25) {
        currentPhraseIndex = 0;
        currentLevelIndex++;
    }
    updateGameDisplay();
}

function evaluateResult(spokenText) {
    const cleanText = (str) => str.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").split(/\s+/).filter(Boolean);
    
    const currentTier = levelOrder[currentLevelIndex];
    const targetPhrase = phraseBank[currentTier][currentPhraseIndex];
    
    const targetWords = cleanText(targetPhrase);
    const spokenWords = cleanText(spokenText);
    
    let matches = 0;
    targetWords.forEach((word) => {
        const index = spokenWords.indexOf(word);
        if (index !== -1) {
            matches++;
            spokenWords.splice(index, 1); 
        }
    });
    
    const percentage = Math.round((matches / targetWords.length) * 100);
    const resultDiv = document.getElementById('result');
    
    if (percentage >= 60) {
        resultDiv.className = "result success";
        resultDiv.innerText = `🎉 PASSED! Score: ${percentage}%`;
        
        // Temporarily pause recognition to step smoothly to the next level
        isListening = false;
        try { recognition.stop(); } catch(e) {}

        setTimeout(() => {
            resultDiv.innerText = "";
            document.getElementById('transcript').innerText = "";
            advanceProgress();
            
            // Re-engage listening automatically for the next phrase block
            isListening = true;
            try { recognition.start(); } catch(e) {}
        }, 1800);
    } else {
        resultDiv.className = "result failure";
        resultDiv.innerText = `Keep Whispering... Current Match Score: ${percentage}%`;
    }
}

// Load Initial Display
updateGameDisplay();
</script>

</body>
</html>
