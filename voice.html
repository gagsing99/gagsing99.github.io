<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Whisper Game - Custom Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #121214; color: #e0e0e0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 15px;
        }
        .game-container {
            background: #1e1e24; padding: 25px 20px; border-radius: 16px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.6); text-align: center;
            max-width: 450px; width: 100%;
        }
        h1 { color: #bb86fc; margin-top: 0; margin-bottom: 8px; font-size: 24px; }
        .progress-badge {
            display: inline-block; background: #bb86fc; color: #121214;
            padding: 6px 16px; border-radius: 20px; font-weight: bold;
            font-size: 13px; margin-bottom: 20px; text-transform: uppercase;
        }
        .phrase-box {
            background: #2d2d34; padding: 24px 15px; border-radius: 12px;
            font-size: 20px; font-weight: 600; margin: 15px 0;
            border-left: 6px solid #bb86fc; min-height: 70px;
            display: flex; align-items: center; justify-content: center;
            word-break: break-word;
        }
        .meter { height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 15px; display: none; }
        .meter-fill { height: 100%; background: #03dac6; width: 0%; transition: width 0.1s; }
        .status { font-style: italic; color: #b3b3b3; min-height: 24px; margin: 10px 0; font-size: 14px; }
        button {
            width: 100%; padding: 16px; font-size: 18px; border-radius: 12px;
            border: none; cursor: pointer; background: #03dac6; color: #000;
            font-weight: bold; transition: 0.2s;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .result { font-size: 18px; margin-top: 20px; font-weight: bold; }
        .success { color: #4caf50; }
        .failure { color: #f44336; }
        .transcript { font-size: 15px; color: #ffb74d; margin-top: 12px; font-style: italic; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🤫 Whisper Only</h1>
    <div class="progress-badge" id="progress-badge">Easy Mode — Phrase 1/10</div>
    <div class="phrase-box" id="target-phrase">Loading...</div>
    
    <div class="meter" id="volume-meter"><div class="meter-fill" id="meter-fill"></div></div>
    
    <button id="record-btn" onclick="handleButtonClick()">🎤 Start Game</button>
    <div class="status" id="status">Tap button to start game and enable mic</div>
    <div class="result" id="result"></div>
    <div class="transcript" id="transcript"></div>
</div>

<script>
// Exactly 10 phrases per category (Total 40)
const phraseBank = {
    easy: [
        "Gagan loves you", "Gagani loves me", "Jassa Singh is great", "I love you three thousand", "Tusi great ho",
        "Red leather yellow leather", "I scream you scream", "Big black bug", "Toy boat toy boat", "Short silk shirts"
    ],
    medium: [
        "She sells sea shells on the sea shore", "Peter Piper picked a peck of pickled peppers", "How can a clam cram in a clean cream can", "I saw Susie sitting in a shoeshine shop", "Wayne went to Wales to watch walruses",
        "Double bubble gum bubbles double", "Gagan loves you more than words can say", "Gagani loves me day and night", "Jassa Singh is remarkably great", "Tusi universal level great ho"
    ],
    hard: [
        "The shells she sells are surely seashells", "A peck of pickled peppers Peter Piper picked", "If Peter Piper picked a peck of pickled peppers", "Susie works in a shoeshine shop where she shines", "Where she shines she sits and where she sits she shines",
        "Gagan loves you across the entire multiverse", "Gagani loves me without any absolute limits", "Jassa Singh is unimaginably great and true", "Tusi completely great ho globally", "I love you three thousand times infinity"
    ],
    "super-hard": [
        "Supercalifragilisticexpialidocious sounds quite atrocious when whispered backward in total darkness", "Antidisestablishmentarianism was a highly prominent political philosophy in nineteenth century England", "Floccinaucinihilipilification is the habit of estimating something as completely worthless", "Llanfairpwllgwyngyllgogerychwyrndrobwllllantysiliogogogoch is a real town name located in Wales", "Uncharacteristically uncooperative unicyclists upset the entirely synchronized parade choreography",
        "Gagan loves you unconditionally through all space and chronological dimensions forever", "Gagani loves me eternally beyond the edge of the known universe", "Jassa Singh is structurally the greatest individual in human history", "Tusi multi dimensionally great ho aur hamesha rahoge", "I love you three thousand times over and over without stopping"
    ]
};

const levelOrder = ["easy", "medium", "hard", "super-hard"];
let currentLevelIndex = 0, currentPhraseIndex = 0;
let isListening = false;

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition;

if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.lang = 'en-US';
    recognition.interimResults = true;

    recognition.onstart = () => {
        isListening = true;
        const btn = document.getElementById('record-btn');
        btn.innerText = "🛑 Stop Engine";
        btn.style.background = "#f44336";
    };

    recognition.onerror = (event) => {
        if (event.error !== 'no-speech') {
            document.getElementById('status').innerText = "❌ Engine Error: " + event.error;
            stopListeningState();
        }
    };

    recognition.onend = () => { 
        if (isListening) {
            try { recognition.start(); } catch(e) {}
        }
    };

    recognition.onresult = (event) => {
        let finalTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal || event.results[i][0].confidence > 0.1) {
                finalTranscript += event.results[i][0].transcript;
            }
        }
        
        if (finalTranscript.trim().length > 0) {
            document.getElementById('transcript').innerText = `Detected: "${finalTranscript}"`;
            evaluateResult(finalTranscript);
        }
    };
} else {
    alert("Speech API not supported. Use Chrome or Safari.");
}

function runWhisperGatekeeper() {
    return new Promise(async (resolve) => {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioCtx.createAnalyser();
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(analyser);
            analyser.fftSize = 256;
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            
            document.getElementById('volume-meter').style.display = "block";
            document.getElementById('status').innerText = "🔊 Testing noise level... Keep quiet!";
            document.getElementById('status').style.color = "#ffb74d";

            let maxVolume = 0;
            let checks = 0;
            
            const interval = setInterval(() => {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                let average = sum / dataArray.length;
                
                maxVolume = Math.max(maxVolume, average);
                document.getElementById('meter-fill').style.width = Math.min(average * 3, 100) + "%";
                checks++;

                if (checks >= 20) { 
                    clearInterval(interval);
                    stream.getTracks().forEach(track => track.stop());
                    audioCtx.close();
                    document.getElementById('volume-meter').style.display = "none";
                    
                    if (maxVolume > 38) {
                        resolve(false); 
                    } else {
                        resolve(true);
                    }
                }
            }, 100);

        } catch (e) {
            document.getElementById('status').innerText = "❌ Microphone access blocked.";
            resolve(false);
        }
    });
}

async function handleButtonClick() {
    if (!SpeechRecognition) return;

    if (isListening) {
        stopListeningState();
        return;
    }

    document.getElementById('status').innerText = "🔄 Initializing calibration...";
    const passesWhisperGate = await runWhisperGatekeeper();
    
    if (!passesWhisperGate) {
        document.getElementById('status').innerText = "⚠️ TOO LOUD! You must speak softly or whisper to play.";
        document.getElementById('status').style.color = "#f44336";
        return;
    }

    document.getElementById('status').innerText = ""; 
    try {
        recognition.start();
    } catch(e) {
        console.error(e);
    }
}

function stopListeningState() {
    isListening = false;
    try { recognition.stop(); } catch(e) {}
    const btn = document.getElementById('record-btn');
    if (btn) {
        btn.innerText = "🎤 Start Game";
        btn.style.background = "#03dac6";
    }
    document.getElementById('status').innerText = "Engine stopped.";
    document.getElementById('status').style.color = "#b3b3b3";
}

function updateGameDisplay() {
    const currentTier = levelOrder[currentLevelIndex];
    if (!currentTier) {
        document.getElementById('progress-badge').innerText = "🏆 Campaign Complete!";
        document.getElementById('target-phrase').innerText = "Incredible! You completed all 40 whispers!";
        document.getElementById('record-btn').style.display = "none";
        stopListeningState();
        return;
    }
    
    const targetPhrase = phraseBank[currentTier][currentPhraseIndex];
    const friendlyTierNames = { "easy": "Easy Mode", "medium": "Medium Mode", "hard": "Hard Mode", "super-hard": "💥 Super Hard Mode" };
    
    document.getElementById('progress-badge').innerText = `${friendlyTierNames[currentTier]} — ${currentPhraseIndex + 1}/10`;
    document.getElementById('target-phrase').innerText = targetPhrase;
}

function advanceProgress() {
    currentPhraseIndex++;
    if (currentPhraseIndex >= 10) { // Safely jumps tiers at exactly 10 items
        currentPhraseIndex = 0;
        currentLevelIndex++;
    }
    updateGameDisplay();
}

function evaluateResult(spokenText) {
    const cleanText = (str) => str.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").split(/\s+/).filter(Boolean);
    
    const currentTier = levelOrder[currentLevelIndex];
    const targetPhrase = phraseBank[currentTier][currentPhraseIndex];
    
    const targetWords = cleanText(targetPhrase);
    const spokenWords = cleanText(spokenText);
    
    let matches = 0;
    targetWords.forEach((word) => {
        const index = spokenWords.indexOf(word);
        if (index !== -1) {
            matches++;
            spokenWords.splice(index, 1); 
        }
    });
    
    const percentage = Math.round((matches / targetWords.length) * 100);
    const resultDiv = document.getElementById('result');
    
    if (percentage >= 60) {
        resultDiv.className = "result success";
        resultDiv.innerText = `🎉 PASSED! Score: ${percentage}%`;
        
        isListening = false;
        try { recognition.stop(); } catch(e) {}

        setTimeout(() => {
            resultDiv.innerText = "";
            document.getElementById('transcript').innerText = "";
            advanceProgress();
            
            isListening = true;
            try { recognition.start(); } catch(e) {}
        }, 1800);
    } else {
        resultDiv.className = "result failure";
        resultDiv.innerText = `Keep Whispering... Current Match Score: ${percentage}%`;
    }
}

updateGameDisplay();
</script>

</body>
</html>
