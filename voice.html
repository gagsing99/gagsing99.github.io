<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Whisper Game - Pro Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #121214; color: #e0e0e0;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 15px;
        }
        .game-container {
            background: #1e1e24; padding: 25px 20px; border-radius: 16px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.6); text-align: center;
            max-width: 450px; width: 100%;
        }
        h1 { color: #bb86fc; margin-top: 0; margin-bottom: 8px; font-size: 24px; }
        .progress-badge {
            display: inline-block; background: #bb86fc; color: #121214;
            padding: 6px 16px; border-radius: 20px; font-weight: bold;
            font-size: 13px; margin-bottom: 20px; text-transform: uppercase;
        }
        .phrase-box {
            background: #2d2d34; padding: 24px 15px; border-radius: 12px;
            font-size: 20px; font-weight: 600; margin: 15px 0;
            border-left: 6px solid #bb86fc; min-height: 70px;
            display: flex; align-items: center; justify-content: center;
            word-break: break-word;
        }
        .meter { height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
        .meter-fill { height: 100%; background: #03dac6; width: 0%; transition: width 0.1s; }
        .status { font-style: italic; color: #b3b3b3; min-height: 24px; margin: 10px 0; font-size: 14px; }
        button {
            width: 100%; padding: 16px; font-size: 18px; border-radius: 12px;
            border: none; cursor: pointer; background: #03dac6; color: #000;
            font-weight: bold; transition: 0.2s;
        }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }
        .result { font-size: 18px; margin-top: 20px; font-weight: bold; }
        .success { color: #4caf50; }
        .failure { color: #f44336; }
    </style>
</head>
<body>

<div class="game-container">
    <h1>🤫 Whisper Only</h1>
    <div class="progress-badge" id="progress-badge">Level: Easy</div>
    <div class="phrase-box" id="target-phrase">Loading...</div>
    
    <div class="meter"><div class="meter-fill" id="meter-fill"></div></div>
    
    <button id="record-btn" onclick="toggleListening()">🎤 Start Whispering</button>
    <div class="status" id="status">Tap to start whisper check</div>
    <div class="result" id="result"></div>
</div>

<script>
const phraseBank = {
    easy: ["Cat sat on the mat", "Blue sky", "Hot coffee", "Gagan loves you", "Gagani loves me", "Jassa Singh is great", "I love you three thousand", "Tusi great ho"],
    medium: ["The quick brown fox jumps", "Whispering winds in the woods", "Coding late into the night", "JavaScript engines run fast"],
    hard: ["Syntactic sugar causes cancer", "Parallel processing distributed computing"],
    "super-hard": ["Pneumonoultramicroscopicsilicovolcanoconiosis is lung disease", "Supercalifragilisticexpialidocious sounds atrocious"]
};

let currentLevelIndex = 0, currentPhraseIndex = 0;
let isListening = false;
let audioContext, analyser, microphone, dataArray;
const WHISPER_THRESHOLD = 30; // 0-255 scale

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = new SpeechRecognition();
recognition.lang = 'en-US';

// Setup Audio Analyzer for Whisper Detection
async function initAudio() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        microphone = audioContext.createMediaStreamSource(stream);
        microphone.connect(analyser);
        analyser.fftSize = 256;
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        checkVolume();
    } catch (e) {
        document.getElementById('status').innerText = "Mic access blocked.";
    }
}

function checkVolume() {
    if (!isListening) {
        analyser.getByteFrequencyData(dataArray);
        let sum = 0;
        for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
        let average = sum / dataArray.length;
        
        document.getElementById('meter-fill').style.width = Math.min(average * 2, 100) + "%";
        requestAnimationFrame(checkVolume);
    }
}

function toggleListening() {
    if (isListening) {
        recognition.stop();
        return;
    }

    // Check volume before starting
    analyser.getByteFrequencyData(dataArray);
    let sum = 0;
    for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
    let volume = sum / dataArray.length;

    if (volume > WHISPER_THRESHOLD) {
        document.getElementById('status').innerText = "⚠️ TOO LOUD! Whisper, don't talk.";
        document.getElementById('status').style.color = "#ff4336";
        return;
    }

    // Start recognition
    recognition.start();
    isListening = true;
    document.getElementById('status').innerText = "🤫 Listening to whisper...";
    document.getElementById('status').style.color = "#03dac6";
}

recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript.toLowerCase();
    const target = phraseBank[Object.keys(phraseBank)[currentLevelIndex]][currentPhraseIndex].toLowerCase();
    
    if (transcript.includes(target.split(' ')[0])) { // Simplified check
        document.getElementById('result').innerText = "✅ Perfect whisper!";
        document.getElementById('result').className = "result success";
        setTimeout(() => advance(), 1500);
    } else {
        document.getElementById('result').innerText = "❌ Try again.";
    }
};

function advance() {
    currentPhraseIndex++;
    if (currentPhraseIndex >= 5) { currentLevelIndex++; currentPhraseIndex = 0; }
    document.getElementById('target-phrase').innerText = phraseBank[Object.keys(phraseBank)[currentLevelIndex]][currentPhraseIndex];
    document.getElementById('result').innerText = "";
}

initAudio();
document.getElementById('target-phrase').innerText = phraseBank.easy[0];
</script>
</body>
</html>
