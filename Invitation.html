<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Invitation</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap');

body {
    margin: 0;
    background: linear-gradient(to right, #0f0c29, #302b63, #24243e);
    color: white;
    font-family: 'Poppins', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
}

/* Card */
.card {
    background: rgba(255, 255, 255, 0.1);
    padding: 3rem;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    text-align: center;
    width: 360px;
    transition: opacity 0.5s ease;
}

/* Input */
input {
    background: transparent;
    border: none;
    border-bottom: 2px solid #fff;
    color: white;
    padding: 10px;
    width: 80%;
    font-size: 1.2rem;
    outline: none;
    margin-top: 20px;
}

/* Error text */
#error {
    color: #ff416c;
    margin-top: 10px;
    font-size: 0.9rem;
    display: none;
}

/* Buttons */
button {
    background: #ff416c;
    color: white;
    border: none;
    padding: 10px 25px;
    margin: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    transition: transform 0.2s;
}
button:hover {
    transform: scale(1.1);
}

/* Shake animation */
@keyframes shake {
    0%,100% { transform: translateX(0);}
    25% { transform: translateX(-8px);}
    75% { transform: translateX(8px);}
}
.shake {
    animation: shake 0.3s;
}

/* Starry night */
.stars {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

/* Twinkling stars */
.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
