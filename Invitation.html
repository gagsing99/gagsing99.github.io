<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Invitation</title>

<!-- ✅ Proper font link -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    padding: 15px;
}

/* Card */
.card {
    width: 100%;
    max-width: 350px;
    background: rgba(255,255,255,0.08);
    padding: 25px;
    border-radius: 16px;
    text-align: center;
    backdrop-filter: blur(12px);
    transition: opacity 0.4s ease;
}

/* Text */
h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
}

/* Input */
input {
    width: 100%;
    padding: 12px;
    margin-top: 20px;
    font-size: 1rem;
    border: none;
    border-bottom: 2px solid white;
    background: transparent;
    color: white;
    outline: none;
}

/* Error */
.error {
    color: #ff4d6d;
    font-size: 0.85rem;
    display: none;
    margin-top: 10px;
}

/* Buttons */
button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    background: #ff4d6d;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
}

/* Shake */
@keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
}
.shake {
    animation: shake 0.3s;
}

/* Stars */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
}

.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite;
}

@keyframes twinkle {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}

/* Fireworks */
.firework {
    position: absolute;
    width: 4px;
    height: 4px;
    animation: explode 1s infinite ease-out;
}

@keyframes explode {
    0% { box-shadow: 0 0 white; }
    100% {
        box-shadow:
        0 -40px red,
        40px 0 blue,
        -40px 0 yellow,
        0 40px purple;
        opacity: 0;
    }
}

/* Center text */
.center-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.8rem;
    text-align: center;
    font-family: 'Playfair Display', serif;
}

</style>
</head>

<body>

<div id="app" class="card"></div>

<script>

const app = document.getElementById("app");
let first = "";
let last = "";

/* FIRST NAME */
function step1() {
    app.innerHTML = `
        <h2>Enter First Name</h2>
        <input id="input">
        <div class="error">Only your name is permitted</div>
    `;

    validate("jasleena", () => {
        first = "Jasleena";
        fade(step2);
    });
}

/* LAST NAME */
function step2() {
    app.innerHTML = `
        <h2>Enter Last Name</h2>
        <input id="input">
        <div class="error">Only your name is permitted</div>
    `;

    validate("saluja", () => {
        last = "Saluja";
        fade(() => question(false));
    });
}

/* VALIDATION */
function validate(expected, next) {
    const input = document.getElementById("input");
    const error = document.querySelector(".error");

    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            const val = input.value.trim().toLowerCase();

            if (val === expected) {
                error.style.display = "none";
                next();
            } else {
                error.style.display = "block";
                input.classList.add("shake");
                setTimeout(() => input.classList.remove("shake"), 300);
            }
        }
    });
}

/* FADE */
function fade(next) {
    app.style.opacity = 0;
    setTimeout(() => {
        next();
        app.style.opacity = 1;
    }, 400);
}

/* QUESTION */
function question(second) {
    app.innerHTML = `
        <h2>
        Hello, ${first} ${last},<br><br>
        Would you like to spend some quality time with me?
        </h2>

        <button onclick="yes()">Yes</button>
        <button onclick="${second ? 'yes()' : 'no()'}">
        ${second ? "I was kidding, it's Yes" : "No"}
        </button>
    `;
}

/* NO */
function no() {
    fade(() => question(true));
}

/* YES */
function yes() {
    document.body.innerHTML = `<div class="stars" id="stars"></div>`;

    const stars = document.getElementById("stars");

    for (let i = 0; i < 120; i++) {
        const s = document.createElement("div");
        s.className = "star";

        let size = Math.random()*3;
        s.style.width = size+"px";
        s.style.height = size+"px";
        s.style.top = Math.random()*100+"%";
        s.style.left = Math.random()*100+"%";

        stars.appendChild(s);
    }

    for (let i = 0; i < 5; i++) {
        const f = document.createElement("div");
        f.className = "firework";
        f.style.top = Math.random()*80+"%";
        f.style.left = Math.random()*80+"%";

        stars.appendChild(f);
    }

    const text = document.createElement("div");
    text.className = "center-text";
    text.innerText = "✨ See you soon ✨";

    document.body.appendChild(text);
}

/* START */
step1();

</script>

</body>
</html>
