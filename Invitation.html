<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Invitation</title>

<!-- ✅ Correct Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #141e30, #243b55);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 15px;
}

/* Card */
.card {
    width: 100%;
    max-width: 380px;
    background: rgba(255,255,255,0.08);
    padding: 30px 20px;
    border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(14px);
    transition: opacity 0.5s ease;
}

/* Text */
h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    line-height: 1.5;
}

/* Input */
input {
    margin-top: 20px;
    padding: 12px;
    width: 100%;
    font-size: 1rem;
    border: none;
    border-bottom: 2px solid white;
    background: transparent;
    color: white;
    outline: none;
}

/* Error */
.error {
    color: #ff4d6d;
    font-size: 0.85rem;
    margin-top: 10px;
    display: none;
}

/* Buttons */
button {
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    font-size: 1rem;
    cursor: pointer;
}

button:active {
    transform: scale(0.95);
}

/* Shake */
@keyframes shake {
    0%,100% { transform: translateX(0);}
    25% { transform: translateX(-6px);}
    75% { transform: translateX(6px);}
}
.shake { animation: shake 0.3s; }

/* Fade */
.fade-out { opacity: 0; }

/* Stars */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

/* Star */
.star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite;
}

@keyframes twinkle {
    0%,100% { opacity: 0.2; }
    50% { opacity: 1; }
}

/* Fireworks */
.firework {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    animation: explode 1s ease-out infinite;
}

@keyframes explode {
    0% { box-shadow: 0 0 white; }
    100% {
        box-shadow:
        0 -50px red,
        50px 0 blue,
        -50px 0 yellow,
        0 50px purple,
        30px 30px orange,
        -30px 30px pink,
        30px -30px cyan,
        -30px -30px white;
        opacity: 0;
    }
}

/* Center Text */
.center-text {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    text-align: center;
    font-family: 'Playfair Display', serif;
}

</style>
</head>

<body>

<div id="app" class="card"></div>

<script>

const app = document.getElementById("app");
let firstName = "";
let lastName = "";

/* STEP 1 */
function showFirstName() {
    app.innerHTML = `
        <h2>Enter First Name</h2>
        <input id="input" type="text" placeholder="First Name">
        <div class="error">Only your name is permitted</div>
    `;

    validate("jasleena", () => {
        firstName = "Jasleena";
        transition(showLastName);
    });
}

/* STEP 2 */
function showLastName() {
    app.innerHTML = `
        <h2>Enter Last Name</h2>
        <input id="input" type="text" placeholder="Last Name">
        <div class="error">Only your name is permitted</div>
    `;

    validate("saluja", () => {
        lastName = "Saluja";
        transition(() => showQuestion(false));
    });
}

/* VALIDATION */
function validate(expected, callback) {
    const input = document.getElementById("input");
    const error = document.querySelector(".error");

    input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
            const val = input.value.trim().toLowerCase();

            if (val === expected) {
                error.style.display = "none";
                callback();
            } else {
                error.style.display = "block";
                input.classList.add("shake");
                setTimeout(() => input.classList.remove("shake"), 300);
            }
        }
    });
}

/* TRANSITION */
function transition(next) {
    app.classList.add("fade-out");
    setTimeout(() => {
        app.classList.remove("fade-out");
        next();
    }, 400);
}

/* QUESTION */
function showQuestion(secondAttempt) {
    app.innerHTML = `
        <h2>
        Hello, ${firstName} ${lastName},<br>
        the most beautiful woman of the world.<br><br>
        Would you like to spend some quality time with me?
        </h2>

        <button onclick="yes()">Yes</button>

        <button onclick="${secondAttempt ? 'yes()' : 'no()'}">
            ${secondAttempt ? "I was kidding, it's Yes" : "No"}
        </button>
    `;
}

/* NO */
function no() {
    transition(() => showQuestion(true));
}

/* YES */
function yes() {
    document.body.innerHTML = `<div class="stars" id="stars"></div>`;

    const stars = document.getElementById("stars");

    // stars
    for (let i = 0; i < 150; i++) {
        let s = document.createElement("div");
        s.className = "star";

        let size = Math.random() * 3;
        s.style.width = size + "px";
        s.style.height = size + "px";
        s.style.top = Math.random() * 100 + "%";
        s.style.left = Math.random() * 100 + "%";
        s.style.animationDelay = Math.random() * 2 + "s";

        stars.appendChild(s);
    }

    // fireworks
    for (let i = 0; i < 6; i++) {
        let f = document.createElement("div");
        f.className = "firework";

        f.style.top = Math.random() * 80 + "%";
        f.style.left = Math.random() * 80 + "%";

        stars.appendChild(f);
    }

    // text
    let text = document.createElement("div");
    text.className = "center-text";
    text.innerText = "✨ See you soon ✨";

    document.body.appendChild(text);
}

/* START */
showFirstName();

</script>

</body>
</html>
