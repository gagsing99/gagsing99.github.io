<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Puzzle to Starry Night</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #111;
        color: white;
        padding-top: 50px;
    }

    input, button {
        padding: 10px;
        font-size: 16px;
        margin: 5px;
    }

    #canvasContainer {
        display: none;
    }

    canvas {
        display: block;
    }

    #loveMessage {
        position: absolute;
        top: 40%;
        width: 100%;
        text-align: center;
        font-size: 40px;
        color: white;
        font-weight: bold;
        text-shadow: 0 0 20px white;
    }
</style>
</head>
<body>

<h1>Welcome</h1>
<p>Do you want to continue?</p>

<input type="text" id="answerInput" placeholder="Type yes or no..." />
<br>
<button onclick="checkAnswer()">Submit</button>

<div id="puzzleSection" style="display:none;">
    <h2 id="puzzleText"></h2>
    <p id="warningText" style="color: #ff8080;"></p>
    <input type="text" id="puzzleInput" placeholder="Enter answer..." />
    <br>
    <button onclick="checkPuzzle()">Submit Puzzle</button>
</div>

<script>
let currentPuzzle = "";

/* STEP 1 */
function checkAnswer() {
    const val = document.getElementById("answerInput").value.toLowerCase().trim();

    if (
        val === "yes" ||
        val === "no" ||
        val === "i m kidding, it's yes"
    ) {
        showPuzzle();
    } else {
        alert("Please answer properly 😄");
    }
}

/* STEP 2: Generate puzzle always = 3000 */
function generatePuzzle() {
    const templates = [
        () => {
            const a = rand(1000, 2000);
            return `${a} + ${3000 - a}`;
        },
        () => {
            const factors = [5, 6, 10, 12, 15, 20, 25, 30];
            const a = factors[Math.floor(Math.random() * factors.length)];
            return `${a} × ${3000 / a}`;
        },
        () => {
            const a = rand(3500, 5000);
            return `${a} - ${a - 3000}`;
        },
        () => {
            const a = rand(500, 1500);
            const b = rand(500, 1500);
            const c = 3000 - (a + b);
            return `(${a} + ${b}) + ${c}`;
        }
    ];

    const generator = templates[Math.floor(Math.random() * templates.length)];
    return generator();
}

function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

/* STEP 3 */
function showPuzzle() {
    currentPuzzle = generatePuzzle();
    document.getElementById("puzzleSection").style.display = "block";
    document.getElementById("puzzleText").innerText = "Solve: " + currentPuzzle;
    document.getElementById("warningText").innerText = "";
    document.getElementById("puzzleInput").value = "";
}

/* STEP 4 */
function checkPuzzle() {
    const userAnswer = Number(document.getElementById("puzzleInput").value);

    if (userAnswer === 3000) {
        startStarryNight();
    } else {
        document.getElementById("warningText").innerText =
            "now now!! in order to proceed, type in the write answer, Jasleena!";
        
        // show SAME puzzle again
        document.getElementById("puzzleText").innerText = "Solve: " + currentPuzzle;
        document.getElementById("puzzleInput").value = "";
    }
}

/* STEP 5 */
function startStarryNight() {
    document.body.innerHTML = `
        <canvas id="stars"></canvas>
        <div id="loveMessage">I love you 3000</div>
    `;

    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = [];

    for (let i = 0; i < 300; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2
        });
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "white";

        stars.forEach(s => {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
        });

        requestAnimationFrame(draw);
    }

    draw();
}
</script>

</body>
</html>
