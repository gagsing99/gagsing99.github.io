<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Page</title>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #111;
        color: white;
        padding-top: 50px;
    }

    input, button {
        padding: 10px;
        font-size: 16px;
        margin: 5px;
    }

    #loveMessage {
        position: absolute;
        top: 40%;
        width: 100%;
        text-align: center;
        font-size: 40px;
        color: white;
        font-weight: bold;
        text-shadow: 0 0 20px white;
    }
</style>
</head>
<body>

<!-- STEP 1: NAME INPUT -->
<div id="nameSection">
    <h1>Welcome</h1>
    <input type="text" id="firstName" placeholder="First Name" />
    <input type="text" id="lastName" placeholder="Last Name" />
    <br>
    <button onclick="goToQuestion()">Continue</button>
</div>

<!-- STEP 2: QUESTION -->
<div id="questionSection" style="display:none;">
    <h2>Do you want to spend time with me?</h2>
    <button onclick="answerQuestion('yes')">Yes</button>
    <button onclick="answerQuestion('no')">No</button>
</div>

<!-- STEP 3: PUZZLE -->
<div id="puzzleSection" style="display:none;">
    <h2 id="puzzleText"></h2>
    <p id="warningText" style="color:#ff8080;"></p>
    <input type="text" id="puzzleInput" placeholder="Enter answer..." />
    <br>
    <button onclick="checkPuzzle()">Submit</button>
</div>

<script>
let currentPuzzle = "";

/* STEP 1 → STEP 2 */
function goToQuestion() {
    const first = document.getElementById("firstName").value.trim();
    const last = document.getElementById("lastName").value.trim();

    if (!first || !last) {
        alert("Please enter your name 😊");
        return;
    }

    document.getElementById("nameSection").style.display = "none";
    document.getElementById("questionSection").style.display = "block";
}

/* STEP 2 → STEP 3 */
function answerQuestion(answer) {
    // regardless of yes or no → go to puzzle
    document.getElementById("questionSection").style.display = "none";
    showPuzzle();
}

/* PUZZLE GENERATOR (always = 3000) */
function generatePuzzle() {
    const templates = [
        () => {
            const a = rand(1000, 2000);
            return `${a} + ${3000 - a}`;
        },
        () => {
            const factors = [5, 6, 10, 12, 15, 20, 25, 30];
            const a = factors[Math.floor(Math.random() * factors.length)];
            return `${a} × ${3000 / a}`;
        },
        () => {
            const a = rand(3500, 5000);
            return `${a} - ${a - 3000}`;
        },
        () => {
            const a = rand(500, 1500);
            const b = rand(500, 1500);
            const c = 3000 - (a + b);
            return `(${a} + ${b}) + ${c}`;
        }
    ];

    const generator = templates[Math.floor(Math.random() * templates.length)];
    return generator();
}

function rand(min, max) {
    return Math.floor(Math.random() * (max - min + 1)) + min;
}

/* SHOW PUZZLE */
function showPuzzle() {
    currentPuzzle = generatePuzzle();
    document.getElementById("puzzleSection").style.display = "block";
    document.getElementById("puzzleText").innerText = "Solve: " + currentPuzzle;
    document.getElementById("warningText").innerText = "";
    document.getElementById("puzzleInput").value = "";
}

/* CHECK PUZZLE */
function checkPuzzle() {
    const userAnswer = Number(document.getElementById("puzzleInput").value);

    if (userAnswer === 3000) {
        startStarryNight();
    } else {
        document.getElementById("warningText").innerText =
            "now now!! in order to proceed, type in the write answer, Jasleena!";

        // SAME puzzle again
        document.getElementById("puzzleText").innerText = "Solve: " + currentPuzzle;
        document.getElementById("puzzleInput").value = "";
    }
}

/* STARRY NIGHT */
function startStarryNight() {
    document.body.innerHTML = `
        <canvas id="stars"></canvas>
        <div id="loveMessage">I love you 3000</div>
    `;

    const canvas = document.getElementById("stars");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = [];

    for (let i = 0; i < 300; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2
        });
    }

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "white";

        stars.forEach(s => {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fill();
        });

        requestAnimationFrame(draw);
    }

    draw();
}
</script>

</body>
</html>
