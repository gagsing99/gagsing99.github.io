<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Breathing App</title>
    <style>
        :root {
            --bg-color: #121826;
            --card-bg: #1a2333;
            --text-color: #e2e8f0;
            --accent-color: #38bdf8;
            --inhale-color: #34d399;
            --exhale-color: #f43f5e;
            --hold-color: #fbbf24;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        /* Settings Panel */
        .settings {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .setting-row:last-child {
            margin-bottom: 0;
        }

        label {
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        .input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-step {
            background: #2e3d52;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-step:active {
            background: var(--accent-color);
        }

        .duration-val {
            font-size: 1.1rem;
            font-weight: bold;
            min-width: 25px;
        }

        /* Visual Breathing Circle */
        .circle-container {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .breath-circle {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(56, 189, 248, 0.1);
            border: 4px solid var(--accent-color);
            transition: transform 1s linear, border-color 0.5s ease, background-color 0.5s ease;
            transform: scale(0.4);
        }

        .circle-text {
            position: relative;
            z-index: 10;
        }

        #phase-name {
            font-size: 1.4rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            transition: color 0.3s;
        }

        #timer-display {
            font-size: 3rem;
            font-weight: 800;
        }

        /* Dynamic Message Box */
        .message-box {
            min-height: 40px;
            margin-bottom: 25px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #f1f5f9;
            font-style: italic;
            transition: all 0.3s ease;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-main {
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            flex: 1;
            transition: background 0.2s, transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-main:active {
            transform: scale(0.98);
        }

        #btn-start {
            background: var(--accent-color);
            color: #0f172a;
        }

        #btn-reset {
            background: #2e3d52;
            color: var(--text-color);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Box Breathing</h1>
        <div class="subtitle">Reset your nervous system</div>

        <!-- Mobile Settings -->
        <div class="settings">
            <div class="setting-row">
                <label>Inhale / Exhale:</label>
                <div class="input-group">
                    <button class="btn-step" onclick="adjustTime('breath', -1)">-</button>
                    <span class="duration-val" id="breath-val">5</span>
                    <button class="btn-step" onclick="adjustTime('breath', 1)">+</button>
                </div>
            </div>
            <div class="setting-row">
                <label>Hold (In / Out):</label>
                <div class="input-group">
                    <button class="btn-step" onclick="adjustTime('hold', -1)">-</button>
                    <span class="duration-val" id="hold-val">5</span>
                    <button class="btn-step" onclick="adjustTime('hold', 1)">+</button>
                </div>
            </div>
        </div>

        <!-- Breathing Ring -->
        <div class="circle-container">
            <div class="breath-circle" id="visual-circle"></div>
            <div class="circle-text">
                <div id="phase-name">Ready</div>
                <div id="timer-display">--</div>
            </div>
        </div>

        <!-- Personalized Messages Status Display -->
        <div class="message-box" id="dynamic-message">✨</div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn-main" id="btn-start" onclick="toggleApp()">Start</button>
            <button class="btn-main" id="btn-reset" onclick="resetApp()">Reset</button>
        </div>
    </div>

    <script>
        let breathDuration = 5; 
        let holdDuration = 5;
        
        let isRunning = false;
        let timerInterval = null;
        
        let currentPhase = 0; 
        let secondsLeft = 0;

        const phases = [
            { name: "Inhale", color: "var(--inhale-color)" },
            { name: "Hold", color: "var(--hold-color)" },
            { name: "Exhale", color: "var(--exhale-color)" },
            { name: "Hold", color: "var(--hold-color)" }
        ];

        // Custom Messages List
        const loveMessages = [
            "I love you", "tu bas tu hai", "jithe tu othe main", 
            "tu hi sab Mera", "Pyaar Mera tu", "#JG4Life", 
            "smile 😊", "mahaul Poora wavy 🌊", "kinni sohni tu", 
            "love you always", "love you forever", "raabta", "Dil Diya gallan"
        ];

        let lastMessage = "";

        // Elements
        const phaseNameEl = document.getElementById("phase-name");
        const timerDisplayEl = document.getElementById("timer-display");
        const circleEl = document.getElementById("visual-circle");
        const startBtn = document.getElementById("btn-start");
        const messageEl = document.getElementById("dynamic-message");

        function adjustTime(type, change) {
            if (isRunning) return;
            if (type === 'breath') {
                breathDuration = Math.max(2, breathDuration + change);
                document.getElementById("breath-val").textContent = breathDuration;
            } else {
                holdDuration = Math.max(2, holdDuration + change);
                document.getElementById("hold-val").textContent = holdDuration;
            }
        }

        // Pull a truly random message without repeating the exact same one back-to-back
        function updateRandomMessage() {
            let availableMessages = loveMessages.filter(msg => msg !== lastMessage);
            let randomIndex = Math.floor(Math.random() * availableMessages.length);
            let selectedMessage = availableMessages[randomIndex];
            
            lastMessage = selectedMessage;
            messageEl.textContent = selectedMessage;
        }

        function toggleApp() {
            if (isRunning) {
                pause();
            } else {
                start();
            }
        }

        function start() {
            isRunning = true;
            startBtn.textContent = "Pause";
            startBtn.style.background = "#e2e8f0";
            startBtn.style.color = "#0f172a";
            
            if (secondsLeft <= 0) {
                currentPhase = 0;
                secondsLeft = breathDuration;
            }
            
            updateDisplay();
            updateRandomMessage();
            
            timerInterval = setInterval(() => {
                secondsLeft--;
                
                if (secondsLeft <= 0) {
                    currentPhase = (currentPhase + 1) % 4;
                    secondsLeft = (currentPhase % 2 === 0) ? breathDuration : holdDuration;
                }
                
                updateDisplay();
                updateRandomMessage(); // Switches up messages multiple times per individual cycle
            }, 1000);
        }

        function pause() {
            isRunning = false;
            startBtn.textContent = "Resume";
            startBtn.style.background = "var(--accent-color)";
            startBtn.style.color = "#0f172a";
            clearInterval(timerInterval);
        }

        function resetApp() {
            isRunning = false;
            clearInterval(timerInterval);
            currentPhase = 0;
            secondsLeft = 0;
            lastMessage = "";
            
            startBtn.textContent = "Start";
            startBtn.style.background = "var(--accent-color)";
            startBtn.style.color = "#0f172a";
            
            phaseNameEl.textContent = "Ready";
            phaseNameEl.style.color = "var(--text-color)";
            timerDisplayEl.textContent = "--";
            messageEl.textContent = "✨";
            
            circleEl.style.transform = "scale(0.4)";
            circleEl.style.borderColor = "var(--accent-color)";
            circleEl.style.backgroundColor = "rgba(56, 189, 248, 0.1)";
        }

        function updateDisplay() {
            const phase = phases[currentPhase];
            phaseNameEl.textContent = phase.name;
            phaseNameEl.style.color = phase.color;
            timerDisplayEl.textContent = secondsLeft;
            circleEl.style.borderColor = phase.color;

            if (currentPhase === 0) {
                const progress = (breathDuration - secondsLeft) / breathDuration;
                const scale = 0.4 + (progress * 0.6);
                circleEl.style.transform = `scale(${scale})`;
                circleEl.style.backgroundColor = `rgba(52, 211, 153, ${0.05 + (progress * 0.15)})`;
            } 
            else if (currentPhase === 1) {
                circleEl.style.transform = "scale(1)";
                circleEl.style.backgroundColor = "rgba(251, 191, 36, 0.2)";
            } 
            else if (currentPhase === 2) {
                const progress = (breathDuration - secondsLeft) / breathDuration;
                const scale = 1.0 - (progress * 0.6);
                circleEl.style.transform = `scale(${scale})`;
                circleEl.style.backgroundColor = `rgba(244, 63, 94, ${0.2 - (progress * 0.15)})`;
            } 
            else if (currentPhase === 3) {
                circleEl.style.transform = "scale(0.4)";
                circleEl.style.backgroundColor = "rgba(251, 191, 36, 0.05)";
            }
        }
    </script>
</body>
</html>
