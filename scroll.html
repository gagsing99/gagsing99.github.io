<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Letter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #EBF4FF;
            overflow: hidden;
            /* Force Caveat font globally */
            font-family: 'Caveat', cursive !important;
        }

        /* Hearts flow through the entire screen */
        .heart {
            position: absolute;
            color: #ff69b4;
            font-size: 20px;
            pointer-events: none;
            z-index: 1; /* Behind the scroll */
            animation: floatUp 8s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        .scroll-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 85%;
            max-width: 320px;
            z-index: 10;
        }

        .handle {
            width: 100%;
            height: 25px;
            background: linear-gradient(to bottom, #8b4513, #5d4037);
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .paper {
            width: 75%;
            background-color: #fffaf0;
            color: #4a2c2a;
            text-align: center;
            padding: 0 15px;
            height: 0;
            overflow-y: auto;
            transition: height 2.5s cubic-bezier(0.22, 1, 0.36, 1), padding 2.5s ease;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
            scrollbar-width: thin;
            scrollbar-color: #8b4513 #fffaf0;
            position: relative;
        }

        .paper::-webkit-scrollbar { width: 6px; }
        .paper::-webkit-scrollbar-thumb { background-color: #8b4513; border-radius: 10px; }

        .open .paper {
            height: 300px;
            padding: 20px 15px;
        }

        pre {
            white-space: pre-wrap;
            margin: 0;
            line-height: 1.4;
            /* Bold, clear text */
            font-size: 1.2rem;
            font-weight: 700;
            opacity: 0;
            transition: opacity 2s ease;
            font-family: 'Caveat', cursive !important;
        }

        .open pre { opacity: 1; }

        #readBtn {
            margin-top: 10px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            display: none;
            width: 100%;
        }
        .open #readBtn { display: block; }
    </style>
</head>
<body>

    <div class="scroll-wrapper" id="scrollContainer" onclick="toggleScroll()">
        <div class="handle"></div>
        <div class="paper" id="paper">
            <pre id="textToRead">---i love you----

Raati mainu garmi baut si laggi
Tu mere kol te aayi par garmi baut leyayi
Neend nahi aayi te main vich paati Rajai
Jad neend aayi, tut tut k aayi
Fer main Rajai c hatai
Jud gye do badan, o my my
Paseena v Aaya te garmi baut aayi
Par ik gal dassa? Neend Raj k aayi

---- 3000----</pre>
            <button id="readBtn" onclick="readText(event)">🔊</button>
        </div>
        <div class="handle"></div>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = Math.random() * 95 + 'vw';
            heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 9000);
        }
        // More hearts for a fuller screen effect
        setInterval(createHeart, 500);

        function toggleScroll() {
            document.getElementById('scrollContainer').classList.toggle('open');
        }

        function readText(event) {
            event.stopPropagation();
            const text = document.getElementById('textToRead').innerText;
            const speech = new SpeechSynthesisUtterance(text);
            speech.lang = 'pa-IN';
            window.speechSynthesis.speak(speech);
        }
    </script>
</body>
</html>
