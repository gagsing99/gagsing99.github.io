<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Letter</title>
    <link href="https://fonts.googleapis.com/css2?family=Kristi&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffe4e6;
            overflow: hidden;
            font-family: 'Kristi', cursive;
        }

        /* Heart Animation */
        .heart {
            position: absolute;
            color: #ff69b4;
            font-size: 20px;
            pointer-events: none;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh); opacity: 0; }
            10% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        .scroll-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 85%;
            max-width: 320px;
            z-index: 10;
        }

        .handle {
            width: 100%;
            height: 25px;
            background: linear-gradient(to bottom, #8b4513, #5d4037);
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .paper {
            width: 75%;
            background-color: #fffaf0;
            color: #4a2c2a;
            text-align: center;
            padding: 0 15px;
            height: 0;
            overflow-y: auto; /* Adds scrollbar if text is too long */
            transition: height 2.5s cubic-bezier(0.22, 1, 0.36, 1), padding 2s ease;
            box-shadow: 0 0 15px rgba(0,0,0,0.15);
            scrollbar-width: thin;
            scrollbar-color: #8b4513 #fffaf0;
        }

        /* Fancy Custom Scrollbar for Webkit */
        .paper::-webkit-scrollbar { width: 6px; }
        .paper::-webkit-scrollbar-thumb { background-color: #8b4513; border-radius: 10px; }

        .open .paper {
            height: 300px;
            padding: 20px 15px;
        }

        pre {
            white-space: pre-wrap;
            margin: 0;
            line-height: 1.5;
            font-size: 1.6rem; /* Kristi looks best slightly larger */
            font-weight: bold;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .open pre {
            opacity: 1;
        }
    </style>
</head>
<body>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 4 + 4) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 8000);
        }
        setInterval(createHeart, 800);
    </script>

    <div class="scroll-wrapper" id="scrollContainer" onclick="toggleScroll()">
        <div class="handle"></div>
        <div class="paper">
            <pre>
---i love you----

Raati mainu garmi baut si laggi
Tu mere kol te aayi par garmi baut leyayi
Neend nahi aayi te main vich paati Rajai
Jad neend aayi, tut tut k aayi
Fer main Rajai c hatai
Jud gye do badan, o my my
Paseena v Aaya te garmi baut aayi
Par ik gal dassa? Neend Raj k aayi

---- 3000----
            </pre>
        </div>
        <div class="handle"></div>
    </div>

    <script>
        function toggleScroll() {
            document.getElementById('scrollContainer').classList.toggle('open');
        }
    </script>
</body>
</html>
