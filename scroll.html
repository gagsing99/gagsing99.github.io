<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Letter</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #ffe4e6; /* Base pink */
            overflow: hidden;
            font-family: 'Dancing Script', cursive;
        }

        /* Animated Heart Background */
        .heart {
            position: absolute;
            color: #ff69b4;
            font-size: 20px;
            animation: floatUp 4s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        .scroll-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        .handle {
            width: 100%;
            height: 30px;
            background: linear-gradient(to bottom, #8b4513, #5d4037);
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .paper {
            width: 80%;
            background-color: #fffaf0;
            color: #5d4037;
            text-align: center;
            padding: 0 20px;
            height: 0;
            overflow: hidden;
            transition: height 2s cubic-bezier(0.22, 1, 0.36, 1), padding 2s ease;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .open .paper {
            height: 400px; /* Sufficient height for text */
            padding: 30px 20px;
        }

        pre {
            white-space: pre-wrap;
            margin: 0;
            line-height: 1.6;
            font-size: 1.4rem;
            opacity: 0;
            transition: opacity 2s ease;
        }

        .open pre {
            opacity: 1;
        }
    </style>
</head>
<body>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 600);
    </script>

    <div class="scroll-wrapper" id="scrollContainer" onclick="toggleScroll()">
        <div class="handle"></div>
        <div class="paper">
            <pre>
---i love you----

Raati mainu garmi baut si laggi
Tu mere kol te aayi par garmi baut leyayi
Neend nahi aayi te main vich paati Rajai
Jad neend aayi, tut tut k aayi
Fer main Rajai c hatai
Jud gye do badan, o my my
Paseena v Aaya te garmi baut aayi
Par ik gal dassa? Neend Raj k aayi

---- 3000----
            </pre>
        </div>
        <div class="handle"></div>
    </div>

    <script>
        function toggleScroll() {
            document.getElementById('scrollContainer').classList.toggle('open');
        }
    </script>
</body>
</html>
