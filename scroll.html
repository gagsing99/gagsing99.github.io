<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Scroll</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #2c1e14; /* Dark background to pop the scroll */
            font-family: 'Georgia', serif;
        }

        .scroll-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            width: 90%;
            max-width: 400px;
        }

        /* The wooden handles */
        .handle {
            width: 100%;
            height: 30px;
            background: linear-gradient(to bottom, #5d4037, #3e2723);
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            z-index: 2;
        }

        /* The parchment paper */
        .paper {
            width: 85%;
            background-color: #fdf5e6;
            color: #4e342e;
            text-align: center;
            padding: 0 20px;
            height: 0; /* Starts closed */
            overflow: hidden;
            transition: height 1.5s cubic-bezier(0.4, 0, 0.2, 1), padding 1.5s ease;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            border-left: 1px solid #d7ccc8;
            border-right: 1px solid #d7ccc8;
        }

        .open .paper {
            height: 350px; /* Adjust based on content */
            padding: 30px 20px;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            line-height: 1.8;
            font-size: 1.1rem;
            opacity: 0;
            transition: opacity 2s ease-in;
        }

        .open pre {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="scroll-wrapper" id="scrollContainer" onclick="toggleScroll()">
        <div class="handle"></div>
        <div class="paper" id="paper">
            <pre>
---i love you----

Raati mainu garmi baut si laggi
Tu mere kol te aayi par garmi baut leyayi
Neend nahi aayi te main vich paati Rajai
Jad neend aayi, tut tut k aayi
Fer main Rajai c hatai
Jud gye do badan, o my my
Paseena v Aaya te garmi baut aayi
Par ik gal dassa? Neend Raj k aayi

---- 3000----
            </pre>
        </div>
        <div class="handle"></div>
    </div>

    <script>
        function toggleScroll() {
            const container = document.getElementById('scrollContainer');
            container.classList.toggle('open');
        }
    </script>
</body>
</html>
