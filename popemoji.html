<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maanya's Magical Emoji Sky</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #1e528e 0%, #2672b7 40%, #6da1d9 75%, #bcd3f0 100%);
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
        }

        /* Sun Graphic */
        #sun {
            position: absolute;
            top: 40px;
            right: 15%;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #ffffff 0%, #fff7b3 30%, #ffdd43 70%, rgba(255,166,0,0) 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px 20px rgba(255, 235, 59, 0.6);
            z-index: 1;
            animation: pulseSun 6s ease-in-out infinite alternate;
        }
        @keyframes pulseSun {
            0% { transform: scale(1); opacity: 0.9; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* Sky & Cloud Grid with Name Layout */
        #sky-container {
            position: absolute;
            top: 25px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 5%;
            z-index: 5;
        }
        .cloud {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            background: radial-gradient(circle at 30% 30%, #ffffff, #f0f4f8);
            width: 110px;
            height: 55px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.3rem;
            font-weight: 900;
            color: #d81b60;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8), -1px -1px 2px rgba(0,0,0,0.15);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15), inset 0 -3px 6px rgba(0,0,0,0.05);
            animation: float 5s ease-in-out infinite alternate;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: inherit;
            border-radius: 50%;
        }
        .cloud::before {
            width: 65px;
            height: 65px;
            top: -35px;
            left: 20px;
        }
        .cloud::after {
            width: 55px;
            height: 55px;
            top: -25px;
            right: 20px;
        }
        .cloud span {
            position: relative;
            z-index: 10;
        }
        /* Randomized drift delays for organic flow */
        .cloud:nth-child(1) { animation-delay: 0s; }
        .cloud:nth-child(2) { animation-delay: 0.7s; }
        .cloud:nth-child(3) { animation-delay: 1.4s; }
        .cloud:nth-child(4) { animation-delay: 0.3s; }
        .cloud:nth-child(5) { animation-delay: 1.1s; }
        .cloud:nth-child(6) { animation-delay: 1.8s; }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(12px) scale(1.02); }
        }

        /* Game Canvas Stage */
        #game-stage {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Flying Emojis - Interactive */
        .emoji {
            position: absolute;
            font-size: 3.5rem;
            cursor: pointer;
            touch-action: none;
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
        }

        /* Landed Pile Emojis - No Pointer Events (Cannot be clicked) */
        .landed-emoji {
            position: absolute;
            font-size: 2.8rem;
            pointer-events: none; 
            z-index: 2;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2)) grayscale(10%);
        }

        /* Bottom Floor Grid & Pile Marker Zone */
        #ground-pile-zone {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30%;
            border-top: 3px dotted rgba(255, 255, 255, 0.4);
            background: linear-gradient(to top, rgba(255,255,255,0.15), rgba(255,255,255,0));
            z-index: 1;
            pointer-events: none;
        }

        /* Score & Timer HUD Graphics */
        .ui-panel {
            position: absolute;
            top: 115px;
            font-size: 1.6rem;
            color: #fff;
            background: rgba(12, 38, 68, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 8px 22px;
            border-radius: 30px;
            z-index: 20;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        #score-board { left: 25px; }
        #timer-board { right: 25px; background: rgba(216, 27, 96, 0.5); }

        /* Pop Display Screens */
        .end-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #game-over-screen { background: rgba(24, 45, 73, 0.92); }
        #game-win-screen { background: rgba(46, 125, 50, 0.94); }
        
        .end-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .end-screen h1 {
            font-size: 3.8rem;
            color: white;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.4);
            text-align: center;
        }
        .end-screen p {
            font-size: 1.9rem;
            color: #e3f2fd;
            margin-bottom: 35px;
        }
        .btn {
            background: #ff4081;
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 2.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0px #c2185b, 0 10px 25px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        #game-win-screen .btn {
            background: #ffeb3b;
            color: #212121;
            box-shadow: 0 8px 0px #fbc02d, 0 10px 25px rgba(0,0,0,0.3);
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px rgba(0,0,0,0.4);
        }

        /* FX Particles */
        .pop-particle {
            position: absolute;
            pointer-events: none;
            font-size: 1.3rem;
            z-index: 30;
            animation: explode 0.55s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1.2); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="game-stage">
        <div id="sun"></div>

        <div id="sky-container">
            <div class="cloud"><span>M</span></div>
            <div class="cloud"><span>A</span></div>
            <div class="cloud"><span>A</span></div>
            <div class="cloud"><span>N</span></div>
            <div class="cloud"><span>Y</span></div>
            <div class="cloud"><span>A</span></div>
        </div>

        <div id="score-board" class="ui-panel">Pops: <span id="score-val">0</span></div>
        <div id="timer-board" class="ui-panel">Time: <span id="timer-val">100</span>s</div>

        <div id="ground-pile-zone"></div>
    </div>

    <div id="game-over-screen" class="end-screen">
        <h1>Try Again, Maanya! 🌟</h1>
        <p>The screen filled up too high! Let's pop faster!</p>
        <button class="btn" onclick="resetGame()">Try Again 🔄</button>
    </div>

    <div id="game-win-screen" class="end-screen">
        <h1>Maanya is a Superstar! 🏆</h1>
        <p>Fantastic job keeping the sky clean for 100 seconds! ⭐</p>
        <button class="btn" onclick="resetGame()">Play Again 🔄</button>
    </div>

    <script>
        const stage = document.getElementById('game-stage');
        const scoreVal = document.getElementById('score-val');
        const timerVal = document.getElementById('timer-val');
        const gameOverScreen = document.getElementById('game-over-screen');
        const gameWinScreen = document.getElementById('game-win-screen');
        
        let score = 0;
        let timeLeft = 100;
        let isGameOver = false;
        let activeEmojis = [];
        let landedEmojis = [];
        
        let spawnInterval;
        let countdownInterval;
        let gameLoopFrame;
        
        // Settings: High speed action profile
        const baseFallSpeed = 4.8; 
        const spawnRate = 600; // Fast regular intervals
        
        const emojiPool = [
            { char: '💩', type: 'poop' },
            { char: '❤️', type: 'heart' },
            { char: '💖', type: 'heart' },
            { char: '👽', type: 'weird' },
            { char: '👻', type: 'weird' },
            { char: '🦄', type: 'silly' },
            { char: '🤪', type: 'silly' },
            { char: '🐵', type: 'silly' },
            { char: '⭐', type: 'normal' },
            { char: '🎈', type: 'normal' }
        ];

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'poop') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(95, now);
                osc.frequency.linearRampToValueAtTime(45, now + 0.35);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.start(now);
                osc.stop(now + 0.35);
            } else if (type === 'heart') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(330, now);
                osc.frequency.exponentialRampToValueAtTime(660, now + 0.4);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);

                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.frequency.setValueAtTime(440, now + 0.05);
                osc2.frequency.exponentialRampToValueAtTime(880, now + 0.45);
                gain2.gain.setValueAtTime(0.2, now);
                gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
                osc2.start(now + 0.05);
                osc2.stop(now + 0.45);
            } else if (type === 'weird') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(800, now + 0.1);
                osc.frequency.linearRampToValueAtTime(300, now + 0.2);
                osc.frequency.linearRampToValueAtTime(700, now + 0.3);
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.start(now);
                osc.stop(now + 0.35);
            } else if (type === 'silly') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.quadraticRampToValueAtTime(600, now + 0.2);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);
            } else {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.09);
                osc.start(now);
                osc.stop(now + 0.09);
            }
        }

        function spawnEmoji() {
            if (isGameOver) return;

            const randomTemplate = emojiPool[Math.floor(Math.random() * emojiPool.length)];
            const el = document.createElement('div');
            el.className = 'emoji';
            el.innerText = randomTemplate.char;
            
            const widthOffset = 70;
            const startX = Math.random() * (window.innerWidth - widthOffset);
            el.style.left = startX + 'px';
            el.style.top = '-80px';

            // Active tracking event handler (Popping while in air)
            el.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                popActiveEmoji(el, randomTemplate.type);
            });

            stage.appendChild(el);

            activeEmojis.push({
                element: el,
                x: startX,
                y: -80,
                type: randomTemplate.type,
                char: randomTemplate.char,
                speed: baseFallSpeed + Math.random() * 2.5
            });
        }

        function createPopParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'pop-particle';
                p.innerText = '✨';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 45 + Math.random() * 65;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                
                p.style.setProperty('--dx', dx + 'px');
                p.style.setProperty('--dy', dy + 'px');
                
                stage.appendChild(p);
                setTimeout(() => p.remove(), 550);
            }
        }

        function popActiveEmoji(el, type) {
            if (isGameOver) return;
            playSound(type);
            
            const rect = el.getBoundingClientRect();
            createPopParticles(rect.left + 25, rect.top + 25);

            activeEmojis = activeEmojis.filter(item => item.element !== el);
            el.remove();

            score++;
            scoreVal.innerText = score;
        }

        function updateGame() {
            if (isGameOver) return;

            const groundY = window.innerHeight;

            for (let i = activeEmojis.length - 1; i >= 0; i--) {
                const em = activeEmojis[i];
                em.y += em.speed;
                em.element.style.top = em.y + 'px';

                // Check landing trigger point
                if (em.y >= groundY - 65) {
                    landEmojiOnGround(em);
                    activeEmojis.splice(i, 1);
                }
            }

            gameLoopFrame = requestAnimationFrame(updateGame);
        }

        function landEmojiOnGround(em) {
            em.element.remove();

            const landed = document.createElement('div');
            landed.className = 'landed-emoji';
            landed.innerText = em.char;
            landed.style.left = em.x + 'px';
            
            let targetBottom = Math.random() * 12; 

            // Stacking layout calculations
            landedEmojis.forEach(other => {
                if (Math.abs(other.x - em.x) < 40) {
                    targetBottom = Math.max(targetBottom, other.bottomHeight + 35);
                }
            });

            landed.style.bottom = targetBottom + 'px';
            stage.appendChild(landed);

            landedEmojis.push({
                element: landed,
                x: em.x,
                bottomHeight: targetBottom
            });

            // Evaluate failure parameters: 30% Height Fill Check
            const maxAllowedPileHeight = window.innerHeight * 0.30;
            if (targetBottom >= maxAllowedPileHeight - 20) {
                triggerEndGame(false);
            }
        }

        function startTimer() {
            countdownInterval = setInterval(() => {
                if (isGameOver) return;
                timeLeft--;
                timerVal.innerText = timeLeft;

                if (timeLeft <= 0) {
                    triggerEndGame(true); // Victory!
                }
            }, 1000);
        }

        function triggerEndGame(isWin) {
            isGameOver = true;
            clearInterval(spawnInterval);
            clearInterval(countdownInterval);
            cancelAnimationFrame(gameLoopFrame);
            
            if (isWin) {
                gameWinScreen.classList.add('visible');
                playSound('heart'); 
            } else {
                gameOverScreen.classList.add('visible');
                playSound('weird');
            }
        }

        function resetGame() {
            activeEmojis.forEach(em => em.element.remove());
            landedEmojis.forEach(em => em.element.remove());
            activeEmojis = [];
            landedEmojis = [];
            
            score = 0;
            timeLeft = 100;
            scoreVal.innerText = score;
            timerVal.innerText = timeLeft;
            isGameOver = false;
            
            gameOverScreen.classList.remove('visible');
            gameWinScreen.classList.remove('visible');
            
            clearInterval(spawnInterval);
            clearInterval(countdownInterval);
            
            spawnInterval = setInterval(spawnEmoji, spawnRate);
            startTimer();
            updateGame();
        }

        window.addEventListener('DOMContentLoaded', () => {
            window.addEventListener('click', initAudio, { once: true });
            window.addEventListener('touchstart', initAudio, { once: true });
            
            spawnInterval = setInterval(spawnEmoji, spawnRate);
            startTimer();
            updateGame();
        });
    </script>
</body>
</html>
