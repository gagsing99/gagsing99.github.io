<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Maanya's Emoji Pop!</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(to bottom, #a1c4fd, #c2e9fb);
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
        }

        /* Sky & Clouds Setup */
        #sky-container {
            position: absolute;
            top: 10px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 10px;
            z-index: 5;
        }
        .cloud {
            position: relative;
            background: #ffffff;
            width: 90px;
            height: 45px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #ff4081;
            text-shadow: 1px 1px 0px #fff, 2px 2px 0px rgba(0,0,0,0.1);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            animation: float 4s ease-in-out infinite alternate;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
        }
        .cloud::before {
            width: 50px;
            height: 50px;
            top: -25px;
            left: 15px;
        }
        .cloud::after {
            width: 40px;
            height: 40px;
            top: -18px;
            right: 15px;
        }
        .cloud span {
            position: relative;
            z-index: 10;
        }
        /* Stagger cloud animations */
        .cloud:nth-child(2) { animation-delay: 0.5s; }
        .cloud:nth-child(3) { animation-delay: 1s; }
        .cloud:nth-child(4) { animation-delay: 1.5s; }
        .cloud:nth-child(5) { animation-delay: 2s; }
        .cloud:nth-child(6) { animation-delay: 2.5s; }

        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(8px); }
        }

        /* Game Stage */
        #game-stage {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Active Falling Emoji */
        .emoji {
            position: absolute;
            font-size: 3.5rem;
            cursor: pointer;
            touch-action: none;
            z-index: 10;
            transition: transform 0.1s ease;
        }
        .emoji:active {
            transform: scale(1.3);
        }

        /* Ground Pile Area */
        #ground-pile-zone {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 30%;
            border-top: 3px dashed rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            z-index: 1;
            pointer-events: none;
        }

        /* Emojis that rest on the ground */
        .landed-emoji {
            position: absolute;
            font-size: 2.8rem;
            pointer-events: none;
            z-index: 2;
            transition: bottom 0.2s ease, left 0.2s ease;
        }

        /* UI Panels */
        #score-board {
            position: absolute;
            top: 100px;
            left: 20px;
            font-size: 1.5rem;
            color: #fff;
            background: rgba(0,0,0,0.2);
            padding: 5px 15px;
            border-radius: 20px;
            z-index: 20;
        }

        #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 105, 180, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #game-over-screen.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #game-over-screen h1 {
            font-size: 3.5rem;
            color: white;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px #ff4081;
            text-align: center;
        }
        #game-over-screen p {
            font-size: 1.8rem;
            color: white;
            margin-bottom: 30px;
        }
        .btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0px #388e3c, 0 10px 20px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px #388e3c, 0 5px 10px rgba(0,0,0,0.2);
        }

        /* Particle Pops */
        .pop-particle {
            position: absolute;
            pointer-events: none;
            font-size: 1.2rem;
            z-index: 30;
            animation: explode 0.6s ease-out forwards;
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0.3); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="game-stage">
        <!-- Maanya's Name Clouds -->
        <div id="sky-container">
            <div class="cloud"><span>M</span></div>
            <div class="cloud"><span>A</span></div>
            <div class="cloud"><span>A</span></div>
            <div class="cloud"><span>N</span></div>
            <div class="cloud"><span>Y</span></div>
            <div class="cloud"><span>A</span></div>
        </div>

        <div id="score-board">Pops: <span id="score-val">0</span></div>

        <!-- The Danger Pile Line Area (Bottom 30%) -->
        <div id="ground-pile-zone"></div>
    </div>

    <!-- Game Over Splash Screen -->
    <div id="game-over-screen">
        <h1>Oh No! Too Much Magic!</h1>
        <p>The screen is filled up! 🎈</p>
        <button class="btn" onclick="resetGame()">Try Again 🔄</button>
    </div>

    <script>
        const stage = document.getElementById('game-stage');
        const scoreVal = document.getElementById('score-val');
        const gameOverScreen = document.getElementById('game-over-screen');
        
        let score = 0;
        let isGameOver = false;
        let activeEmojis = [];
        let landedEmojis = [];
        let spawnInterval;
        let gameLoopFrame;
        
        // Settings tailored for a 5-year-old
        const baseFallSpeed = 2; 
        const spawnRate = 1200; // MS between new emoji drops
        
        const emojiPool = [
            { char: '💩', type: 'poop' },
            { char: '❤️', type: 'heart' },
            { char: '💖', type: 'heart' },
            { char: '👽', type: 'weird' },
            { char: '👻', type: 'weird' },
            { char: '🦄', type: 'silly' },
            { char: '🤪', type: 'silly' },
            { char: '🐵', type: 'silly' },
            { char: '🍕', type: 'normal' },
            { char: '⭐', type: 'normal' },
            { char: '🎈', type: 'normal' }
        ];

        // Web Audio API Synthesizer (No external mp3 files required!)
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'poop') {
                // Fart: Low pitched frequency drop with distortion/vibration
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(95, now);
                osc.frequency.linearRampToValueAtTime(45, now + 0.35);
                
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.start(now);
                osc.stop(now + 0.35);

            } else if (type === 'heart') {
                // Awww: Sweet upward warm chime chord
                osc.type = 'sine';
                osc.frequency.setValueAtTime(330, now); // E4
                osc.frequency.exponentialRampToValueAtTime(660, now + 0.4); // E5
                
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);

                // Quick extra note for harmony
                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.frequency.setValueAtTime(440, now + 0.05); // A4
                osc2.frequency.exponentialRampToValueAtTime(880, now + 0.45);
                gain2.gain.setValueAtTime(0.2, now);
                gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
                osc2.start(now + 0.05);
                osc2.stop(now + 0.45);

            } else if (type === 'weird') {
                // Spacey / Alien Vibrato
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.linearRampToValueAtTime(800, now + 0.1);
                osc.frequency.linearRampToValueAtTime(300, now + 0.2);
                osc.frequency.linearRampToValueAtTime(700, now + 0.3);
                
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
                osc.start(now);
                osc.stop(now + 0.35);

            } else if (type === 'silly') {
                // Boing effect
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.quadraticRampToValueAtTime(600, now + 0.2);
                
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start(now);
                osc.stop(now + 0.25);

            } else {
                // Classic standard pop sound
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.08);
                
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.09);
                osc.start(now);
                osc.stop(now + 0.09);
            }
        }

        // Create a falling emoji element
        function spawnEmoji() {
            if (isGameOver) return;

            const randomTemplate = emojiPool[Math.floor(Math.random() * emojiPool.length)];
            const el = document.createElement('div');
            el.className = 'emoji';
            el.innerText = randomTemplate.char;
            
            // Random horizontal start position
            const widthOffset = 60;
            const startX = Math.random() * (window.innerWidth - widthOffset);
            el.style.left = startX + 'px';
            el.style.top = '-70px'; // start offscreen above cloud line

            // Attach touch/click listeners
            el.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                popEmoji(el, randomTemplate.type);
            });

            stage.appendChild(el);

            activeEmojis.push({
                element: el,
                x: startX,
                y: -70,
                type: randomTemplate.type,
                char: randomTemplate.char,
                speed: baseFallSpeed + Math.random() * 1.5
            });
        }

        // Popper Particle Sparkles
        function createPopParticles(x, y) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'pop-particle';
                p.innerText = '✨';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                // Math directions for explosion spread
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 60;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;
                
                p.style.setProperty('--dx', dx + 'px');
                p.style.setProperty('--dy', dy + 'px');
                
                stage.appendChild(p);
                setTimeout(() => p.remove(), 600);
            }
        }

        // Action when popped successfully
        function popEmoji(el, type) {
            if (isGameOver) return;
            
            playSound(type);
            
            const rect = el.getBoundingClientRect();
            createPopParticles(rect.left + 20, rect.top + 20);

            // Clean data entries
            activeEmojis = activeEmojis.filter(item => item.element !== el);
            el.remove();

            score++;
            scoreVal.innerText = score;
        }

        // Central game updates calculation loop
        function updateGame() {
            if (isGameOver) return;

            const groundY = window.innerHeight;
            const fillLimitY = window.innerHeight * 0.70; // 30% height line from bottom

            for (let i = activeEmojis.length - 1; i >= 0; i--) {
                const em = activeEmojis[i];
                em.y += em.speed;
                em.element.style.top = em.y + 'px';

                // Check if emoji has reached the ground line or resting pile height
                if (em.y >= groundY - 55) {
                    landEmojiOnGround(em);
                    activeEmojis.splice(i, 1);
                }
            }

            gameLoopFrame = requestAnimationFrame(updateGame);
        }

        // Pile settlement logic
        function landEmojiOnGround(em) {
            // Transfer element from active falling state to stationary ground element
            em.element.remove();

            const landed = document.createElement('div');
            landed.className = 'landed-emoji';
            landed.innerText = em.char;
            landed.style.left = em.x + 'px';
            
            // Basic random staggering so they settle dynamically into piles
            const randomSettleOffset = Math.random() * 20; 
            let targetBottom = randomSettleOffset;

            // Stack on top of closest neighbors horizontally if they exist
            landedEmojis.forEach(other => {
                if (Math.abs(other.x - em.x) < 35) {
                    targetBottom = Math.max(targetBottom, other.bottomHeight + 35);
                }
            });

            landed.style.bottom = targetBottom + 'px';
            stage.appendChild(landed);

            landedEmojis.push({
                element: landed,
                x: em.x,
                bottomHeight: targetBottom
            });

            // GAME OVER CONDITION: If pile builds up past 30% screen height threshold
            const maxAllowedPileHeight = window.innerHeight * 0.30;
            if (targetBottom >= maxAllowedPileHeight - 20) {
                triggerGameOver();
            }
        }

        function triggerGameOver() {
            isGameOver = true;
            clearInterval(spawnInterval);
            cancelAnimationFrame(gameLoopFrame);
            gameOverScreen.classList.add('visible');
            playSound('weird'); // generic silly sound on wrap-up
        }

        function resetGame() {
            // Clean active entities
            activeEmojis.forEach(em => em.element.remove());
            landedEmojis.forEach(em => em.element.remove());
            activeEmojis = [];
            landedEmojis = [];
            
            score = 0;
            scoreVal.innerText = score;
            isGameOver = false;
            
            gameOverScreen.classList.remove('visible');
            
            // Restart Timers
            clearInterval(spawnInterval);
            spawnInterval = setInterval(spawnEmoji, spawnRate);
            updateGame();
        }

        // Initialize engine on boot load
        window.addEventListener('DOMContentLoaded', () => {
            // Explicitly unlock audio on child's first window tap interaction
            window.addEventListener('click', initAudio, { once: true });
            window.addEventListener('touchstart', initAudio, { once: true });
            
            spawnInterval = setInterval(spawnEmoji, spawnRate);
            updateGame();
        });
    </script>
</body>
</html>
