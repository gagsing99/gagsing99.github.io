<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click the Heart Game</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 85vh;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 12px;
        }

        /* The Picture Container */
        #photo {
            width: 100%;
            height: 100%;
            background-image: url('IMG-20260518-WA0000.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(25px);
            transform: scale(1.1);
            transition: filter 2.5s ease, transform 2.5s ease;
        }

        /* Pure CSS Heart Overlay */
        #heart-overlay {
            position: absolute;
            width: 100px;
            height: 100px;
            top: 45%;
            left: 50%;
            margin-left: -50px;
            margin-top: -50px;
            transform: rotate(-45deg) scale(1);
            background-color: rgb(255, 249, 214); 
            transition: transform 0.08s ease, opacity 1.5s ease;
            opacity: 0.9;
            pointer-events: none;
            z-index: 10;
        }

        /* CSS Heart Shapes via pseudo-elements */
        #heart-overlay::before,
        #heart-overlay::after {
            content: "";
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: inherit;
        }

        #heart-overlay::before {
            top: -50px;
            left: 0;
        }

        #heart-overlay::after {
            top: 0;
            left: 50px;
        }

        /* Floating Counter Overlay */
        #counter-overlay {
            position: absolute;
            top: 10%;
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            z-index: 5;
            transition: opacity 1s ease;
        }

        /* 1-Liner Pop-up Messages (Toasts) */
        #message-toast {
            position: absolute;
            top: 22%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            text-align: center;
            max-width: 85%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            opacity: 0;
            transform: translateY(10px) scale(0.95);
            transition: opacity 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), 
                        transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
            pointer-events: none;
        }

        #message-toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Beautiful Final "I love you" Banner Overlay */
        #text-banner {
            position: absolute;
            bottom: 8%;
            width: 85%;
            padding: 16px 20px;
            text-align: center;
            
            /* Glassmorphism background design */
            background: rgba(15, 15, 15, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 
                        inset 0 1px 2px rgba(255, 255, 255, 0.2);

            /* Typography */
            color: #ffffff;
            font-size: 2.8rem;
            font-weight: 800;
            font-family: 'Playfair Display', 'Didot', 'Georgia', serif;
            font-style: italic;
            letter-spacing: 1px;
            
            /* Multi-layer text glow */
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5),
                         0 0 20px rgba(153, 0, 18, 0.6);
            
            /* Initial State (Hidden) */
            opacity: 0;
            transform: translateY(40px) scale(0.95);
            transition: opacity 2.5s cubic-bezier(0.19, 1, 0.22, 1) 0.8s, 
                        transform 2.5s cubic-bezier(0.19, 1, 0.22, 1) 0.8s;
            pointer-events: none;
            z-index: 15;
        }

        /* Game Finished State Styling */
        #game-container.finished #photo {
            filter: blur(0px);
            transform: scale(1);
        }

        #game-container.finished #heart-overlay {
            opacity: 0;
            transform: rotate(-45deg) scale(0);
        }

        #game-container.finished #text-banner {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        #game-container.finished #counter-overlay,
        #game-container.finished #message-toast {
            opacity: 0 !important;
        }
    </style>
    <!-- Import an elegant luxury display font option -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="game-container">
        <div id="photo"></div>
        <div id="counter-overlay">0 / 1000</div>
        <div id="message-toast"></div>
        <div id="heart-overlay"></div>
        <div id="text-banner">I love you</div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const heart = document.getElementById('heart-overlay');
        const counter = document.getElementById('counter-overlay');
        const toast = document.getElementById('message-toast');
        
        let clicks = 0;
        const maxClicks = 1000;
        let isFinished = false;
        let toastTimeout;

        const loveLines = [
            "Every click brings me closer to you. ❤️",
            "You are my favorite distraction. ✨",
            "My heart beats a little faster with every tap.",
            "khulle aasmaan thalle, har jagah, bas tu meri!!! 💕",
            "You make my world so much brighter. 🌟",
            "In a room full of art, I'd still stare at you.",
            "Just a little reminder: you are incredible. 🥰",
            "kar la jo karna, main ni chhadna, ⛓️.",
            "You have my whole heart, for my whole life.",
            "Almost there, keep going for a surprise! 😘",
            "My favorite place in the world is right next to you.",
            "You're my blue sky on a rainy day. 🌤️",
            "Forever wouldn't be long enough with you.",
            "Vibe teri meri mildi aaaaaaaa.",
            "Tu meri, main tera",
            "Dhak dhak karne laga 👄 🤍",
            "Thank you for being my person.",
            "My love for you grows click by click!"
        ];

        const startColor = { r: 255, g: 249, b: 214 }; // Pale Yellow
        const endColor = { r: 153, g: 0, b: 18 };     // Crimson Red

        function handleTap(e) {
            if (isFinished) return;
            
            if (e.type === 'touchstart') {
                e.preventDefault();
            }

            clicks++;
            counter.innerText = `${clicks} / ${maxClicks}`;

            // Calculate precise custom gradient ratio
            const ratio = clicks / maxClicks;
            const r = Math.round(startColor.r + (endColor.r - startColor.r) * ratio);
            const g = Math.round(startColor.g + (endColor.g - startColor.g) * ratio);
            const b = Math.round(startColor.b + (endColor.b - startColor.b) * ratio);
            heart.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;

            // Snappy micro-pop reaction on tap
            heart.style.transform = 'rotate(-45deg) scale(1.18)';
            setTimeout(() => {
                if (!isFinished) heart.style.transform = 'rotate(-45deg) scale(1)';
            }, 60);

            // Toast updates every 50 steps
            if (clicks < maxClicks && clicks % 50 === 0) {
                showNewToast();
            }

            // Completion check
            if (clicks >= maxClicks) {
                isFinished = true;
                heart.style.backgroundColor = `rgb(${endColor.r}, ${endColor.g}, ${endColor.b})`;
                container.classList.add('finished');
                container.style.cursor = 'default';
            }
        }

        function showNewToast() {
            clearTimeout(toastTimeout);
            toast.classList.remove('show');
            
            setTimeout(() => {
                const randomIndex = Math.floor(Math.random() * loveLines.length);
                toast.innerText = loveLines[randomIndex];
                toast.classList.add('show');
                
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2500);
            }, 50);
        }

        container.addEventListener('click', handleTap);
        container.addEventListener('touchstart', handleTap, { passive: false });
    </script>

</body>
</html>
