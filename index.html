<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gagan's heart</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fff5f5;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="250" height="100" viewBox="0 0 250 100"><text x="10" y="50" font-family="cursive, sans-serif" font-size="14" fill="rgba(0, 0, 0, 0.04)" transform="rotate(-15 125 50)">i love you 3000 to infinity</text></svg>');
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            transition: background-color 0.5s ease;
        }

        #game-container {
            position: relative;
            background: white;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 95vw;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            color: #4a4a4a;
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 1.6rem;
            transition: color 0.5s ease;
        }

        #carousel-container {
            border: 1px dashed #ccc;
            border-radius: 8px;
            padding: 6px;
            margin-bottom: 10px;
            min-height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.5s ease, border-color 0.5s ease;
        }

        #carousel-text {
            font-weight: 600;
            font-style: italic;
            font-size: 0.95rem;
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out, color 0.5s ease;
        }

        #status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #4a4a4a;
            font-weight: 600;
            margin-bottom: 10px;
            padding: 0 2px;
            font-size: 0.85rem;
        }

        #timer {
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            min-width: 60px;
            transition: background-color 0.5s ease, border-color 0.5s ease, color 0.5s ease;
        }

        #timer.hurry {
            animation: pulse 1s infinite;
            background: #d90429 !important;
            color: white !important;
            border-color: #d90429 !important;
        }

        #inventory {
            padding: 4px 10px;
            border-radius: 20px;
            transition: background-color 0.5s ease, border-color 0.5s ease, color 0.5s ease;
        }

        #inventory.has-key {
            color: #b48a04 !important;
            background: #fffdf0 !important;
            border-color: #f3e5ab !important;
        }

        #canvas-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        canvas {
            border: 4px solid #ccc;
            border-radius: 8px;
            display: block;
            max-width: 100%;
            max-height: 48vh;
            object-fit: contain;
            transition: border-color 0.5s ease, background-color 0.5s ease;
        }

        #mobile-controls {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
            user-select: none;
        }

        .dpad-row {
            display: flex;
            justify-content: center;
        }

        .dpad-btn {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid #ccc;
            border-radius: 50%;
            margin: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            touch-action: manipulation;
            transition: background 0.1s, border-color 0.5s ease, color 0.5s ease;
        }

        .dpad-btn:active {
            color: white !important;
        }

        .controls-hint {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #7a7a7a;
        }

        #popup-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #popup-box {
            background: white;
            padding: 25px 15px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            max-width: 85%;
            text-align: center;
            border: 3px solid #ccc;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: border-color 0.5s ease;
        }

        #popup-message {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            font-family: 'Georgia', serif;
            line-height: 1.4;
            transition: color 0.5s ease;
        }

        #popup-btn {
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s ease;
        }

        @media (max-width: 768px) {
            #mobile-controls {
                display: flex;
            }
            h1 { font-size: 1.4rem; }
            .controls-hint { display: none; }
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div id="game-container">
        <h1 id="game-title">Gagan's heart</h1>
        
        <div id="carousel-container">
            <div id="carousel-text">Loading sweet lines...</div>
        </div>

        <div id="status-bar">
            <div id="level-indicator">Level 1 / 10</div>
            <div id="timer">⏱️ 45s</div>
            <div id="inventory">🎒 Keys: ❌</div>
        </div>
        
        <div id="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="mobile-controls">
            <div class="dpad-row">
                <button class="dpad-btn" id="btn-up">▲</button>
            </div>
            <div class="dpad-row">
                <button class="dpad-btn" id="btn-left">◀</button>
                <button class="dpad-btn" id="btn-down">▼</button>
                <button class="dpad-btn" id="btn-right">▶</button>
            </div>
        </div>
        
        <div class="controls-hint">Collect all <b>🔑 Keys</b> to open the doors before reaching the heart!</div>

        <!-- Pop-up Overlay -->
        <div id="popup-overlay">
            <div id="popup-box">
                <div id="popup-message">Message goes here!</div>
                <button id="popup-btn">Next Level</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameTitle = document.getElementById('game-title');
        const levelIndicator = document.getElementById('level-indicator');
        const timerDiv = document.getElementById('timer');
        const inventoryDiv = document.getElementById('inventory');
        const carouselContainer = document.getElementById('carousel-container');
        const carouselText = document.getElementById('carousel-text');
        const popupOverlay = document.getElementById('popup-overlay');
        const popupBox = document.getElementById('popup-box');
        const popupMessage = document.getElementById('popup-message');
        const popupBtn = document.getElementById('popup-btn');
        const bgMusic = document.getElementById('bgMusic');
        const dpadButtons = document.querySelectorAll('.dpad-btn');

        let currentLevel = 0;
        let gameActive = false;
        let levelWon = false;
        let keysFound = 0;
        let totalKeysNeeded = 1;
        let audioInitialized = false;
        let map = [];
        let gridSize = 21; 
        let tileSize = 20; 
        let player = { x: 1, y: 1 };
        
        let timerInterval;
        let timeLeft = 0;

        let animationFrameId;
        let flagWaveFrame = 0;
        let danceTimer = 0;
        let pulseFrame = 0;

        const carouselLines = [
            "tere sang yaara mast baharaaaaa",
            "aj din chadhya tere rang varga",
            "Shake it off, shake it off",
            "aj lagdi tu badhi HOT oye",
            "ooo you look beautiful every day",
            "aaja fer!!!!!",
            "mast mausam mein awesome chawsome"
        ];
        let carouselIndex = 0;

        const themes = [
            { bg: "#fff5f5", main: "#ff4d6d", light: "#fff0f3", wall: "#ffccd5", wallBorder: "#ffb3c1" }, 
            { bg: "#f0f8ff", main: "#0077b6", light: "#e0f2fe", wall: "#bae6fd", wallBorder: "#7dd3fc" }, 
            { bg: "#ecfeff", main: "#06b6d4", light: "#cffafe", wall: "#a5f3fc", wallBorder: "#67e8f9" }, 
            { bg: "#faf5ff", main: "#7c3aed", light: "#f3e8ff", wall: "#e9d5ff", wallBorder: "#d8b4fe" }, 
            { bg: "#fff7ed", main: "#ea580c", light: "#ffedd5", wall: "#fed7aa", wallBorder: "#fdba74" }, 
            { bg: "#fdf2f8", main: "#db2777", light: "#fce7f3", wall: "#fbcfe8", wallBorder: "#f9a8d4" }, 
            { bg: "#f5f3ff", main: "#4f46e5", light: "#e0e7ff", wall: "#c7d2fe", wallBorder: "#a5b4fc" }, 
            { bg: "#fff1f2", main: "#e11d48", light: "#ffe4e6", wall: "#fecdd3", wallBorder: "#fda4af" }, 
            { bg: "#f0fdfa", main: "#0d9488", light: "#ccfbf1", wall: "#99f6e4", wallBorder: "#5eead4" }, 
            { bg: "#fafaf9", main: "#44403c", light: "#f5f5f4", wall: "#e7e5e4", wallBorder: "#d6d3d1" }  
        ];

        const levelConfigs = [
            { size: 19, keys: 1, msg: "1. I love you 3000 to infinity" },
            { size: 21, keys: 1, msg: "2. #JG4Life" },
            { size: 23, keys: 1, msg: "3. You are you though" },
            { size: 25, keys: 1, msg: "4. Tu meri main tera" },
            { size: 27, keys: 2, msg: "5. I will love you more and more and more every day" },
            { size: 29, keys: 2, msg: "6. day and night I love you more" },
            { size: 31, keys: 2, msg: "7. I wanna grow old with you" },
            { size: 33, keys: 3, msg: "8. tu hi Dil ch, tu hi yaada ch" },
            { size: 35, keys: 3, msg: "9. reh tu mere kol hamesha" },
            { size: 35, keys: 4, msg: "10. jass, Gagan, maanya and Joey" }
        ];

        const TILE = { FLOOR: 0, WALL: 1, HEART: 2, KEY: 3, GATE: 4 };

        function applyTheme() {
            const theme = themes[currentLevel];
            document.body.style.backgroundColor = theme.bg;
            gameTitle.style.color = theme.main;
            
            carouselContainer.style.backgroundColor = theme.light;
            carouselContainer.style.borderColor = theme.wall;
            carouselText.style.color = theme.main;

            timerDiv.style.backgroundColor = theme.light;
            timerDiv.style.borderColor = theme.wall;
            timerDiv.style.color = theme.main;

            inventoryDiv.style.backgroundColor = theme.light;
            inventoryDiv.style.borderColor = theme.wall;
            inventoryDiv.style.color = theme.wallBorder;

            canvas.style.backgroundColor = theme.light;
            canvas.style.borderColor = theme.wall;

            popupBox.style.borderColor = theme.main;
            popupMessage.style.color = theme.main;
            popupBtn.style.backgroundColor = theme.main;

            dpadButtons.forEach(btn => {
                btn.style.borderColor = theme.wall;
                btn.style.color = theme.main;
                btn.onmousedown = () => btn.style.backgroundColor = theme.main;
                btn.onmouseup = () => btn.style.backgroundColor = "rgba(0,0,0,0.05)";
                btn.ontouchstart = () => btn.style.backgroundColor = theme.main;
                btn.ontouchend = () => btn.style.backgroundColor = "rgba(0,0,0,0.05)";
            });
        }

        function tryPlayMusic() {
            if (!audioInitialized) {
                bgMusic.volume = 0.2;
                bgMusic.play().then(() => {
                    audioInitialized = true;
                }).catch(e => console.log("Audio playlist gesture active"));
            }
        }

        function initCarousel() {
            carouselText.textContent = carouselLines[carouselIndex];
            setInterval(() => {
                carouselText.style.opacity = 0;
                carouselText.style.transform = "translateY(-10px)";
                setTimeout(() => {
                    carouselIndex = (carouselIndex + 1) % carouselLines.length;
                    carouselText.textContent = carouselLines[carouselIndex];
                    carouselText.style.opacity = 1;
                    carouselText.style.transform = "translateY(0)";
                }, 400);
            }, 3000);
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 45 + (currentLevel * 10);
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    triggerGameOver();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            timerDiv.textContent = `⏱️ ${timeLeft}s`;
            if (timeLeft <= 10 && timeLeft > 0) {
                timerDiv.classList.add('hurry');
            } else {
                timerDiv.classList.remove('hurry');
            }
        }

        function updateInventoryDisplay() {
            let statusStr = "🎒 Keys: ";
            if (keysFound === 0) {
                statusStr += "❌";
            } else {
                for (let i = 0; i < keysFound; i++) statusStr += "🔑";
                for (let i = keysFound; i < totalKeysNeeded; i++) statusStr += "❌";
            }
            inventoryDiv.textContent = statusStr;

            if (keysFound === totalKeysNeeded) {
                inventoryDiv.classList.add('has-key');
            } else {
                inventoryDiv.classList.remove('has-key');
            }
        }

        // Modified forcePath to explicitly carve away WALLS to build a clear walkway
        function forcePath(start, target) {
            let queue = [{x: start.x, y: start.y}];
            let visited = Array.from({ length: gridSize }, () => Array(gridSize).fill(false));
            let parent = {};
            visited[start.y][start.x] = true;

            // We use standard BFS tracking through all grid cells to find the shortest injection vector
            while (queue.length > 0) {
                let curr = queue.shift();
                if (curr.x === target.x && curr.y === target.y) break;
                
                let directions = [[0,1], [1,0], [0,-1], [-1,0]];
                for (let [dx, dy] of directions) {
                    let nx = curr.x + dx;
                    let ny = curr.y + dy;
                    if (nx >= 0 && nx < gridSize && ny >= 0 && ny < gridSize) {
                        if (!visited[ny][nx]) {
                            visited[ny][nx] = true;
                            parent[`${nx},${ny}`] = curr;
                            queue.push({x: nx, y: ny});
                        }
                    }
                }
            }

            // Crawl backward along the computed link chain and drill open any walls
            let curr = target;
            while (curr.x !== start.x || curr.y !== start.y) {
                let p = parent[`${curr.x},${curr.y}`];
                if (!p) break;
                
                // Only wipe out obstacles if it is structurally blocking passage (protect gates/heart/keys)
                if (map[curr.y][curr.x] === TILE.WALL) {
                    map[curr.y][curr.x] = TILE.FLOOR;
                }
                curr = p;
            }
        }

        function generateHardMaze() {
            gridSize = levelConfigs[currentLevel].size;
            totalKeysNeeded = levelConfigs[currentLevel].keys;

            if (gridSize <= 21) tileSize = 22;
            else if (gridSize <= 27) tileSize = 18;
            else tileSize = 14;

            canvas.width = gridSize * tileSize;
            canvas.height = gridSize * tileSize;

            // Step 1: Initialize full solid wall space
            map = Array.from({ length: gridSize }, () => Array(gridSize).fill(TILE.WALL));

            let walls = [];
            function passage(x, y) {
                map[y][x] = TILE.FLOOR;
                if (x >= 3) walls.push([x - 1, y, x - 2, y]);
                if (y >= 3) walls.push([x, y - 1, x, y - 2]);
                if (x < gridSize - 3) walls.push([x + 1, y, x + 2, y]);
                if (y < gridSize - 3) walls.push([x, y + 1, x, y + 2]);
            }

            passage(1, 1);

            while (walls.length > 0) {
                let rIdx = Math.floor(Math.random() * walls.length);
                let [wx, wy, nx, ny] = walls[rIdx];
                walls.splice(rIdx, 1);
                if (map[ny][nx] === TILE.WALL) {
                    map[wy][wx] = TILE.FLOOR;
                    passage(nx, ny);
                }
            }

            // Step 2: Grab random open tile nodes far away from starting corner to host assets
            let floorTiles = [];
            for (let r = 3; r < gridSize - 3; r++) {
                for (let c = 3; c < gridSize - 3; c++) {
                    if (map[r][c] === TILE.FLOOR) {
                        floorTiles.push({x: c, y: r});
                    }
                }
            }
            
            // Step 3: Establish the target Heart node 
            let heartIndex = Math.floor(Math.random() * floorTiles.length);
            let hPos = floorTiles.splice(heartIndex, 1)[0];
            map[hPos.y][hPos.x] = TILE.HEART;

            // Step 4: Construct strict perimeter locks safely around the heart target
            let directions = [[0,1], [1,0], [0,-1], [-1,0]];
            let validGatePositions = [];

            for (let [dx, dy] of directions) {
                let gx = hPos.x + dx;
                let gy = hPos.y + dy;
                map[gy][gx] = TILE.GATE;
                validGatePositions.push({x: gx, y: gy});
            }

            // Step 5: Place the keys safely out in open pathways
            let keyPositions = [];
            for (let k = 0; k < totalKeysNeeded; k++) {
                if (floorTiles.length > 0) {
                    let kIdx = Math.floor(Math.random() * floorTiles.length);
                    let kPos = floorTiles.splice(kIdx, 1)[0];
                    map[kPos.y][kPos.x] = TILE.KEY;
                    keyPositions.push(kPos);
                }
            }

            player = { x: 1, y: 1 };

            // Step 6: Core Path Correction Engine
            // Ensure player has a guaranteed clear path to EVERY key
            for (let kPos of keyPositions) {
                forcePath(player, kPos);
            }

            // Ensure every key location has a guaranteed open path leading up to the perimeter security gates
            for (let kPos of keyPositions) {
                forcePath(kPos, validGatePositions[0]);
            }
            
            // Final verification trace: Check if a structural link from player to gate point exists cleanly
            forcePath(player, validGatePositions[0]);
        }

        function initLevel() {
            levelWon = false;
            keysFound = 0;
            applyTheme();
            updateInventoryDisplay();
            levelIndicator.textContent = `Level ${currentLevel + 1} / 10`;
            
            generateHardMaze();
            startTimer();

            gameActive = true;
            popupOverlay.style.display = 'none';
            
            if(animationFrameId) cancelAnimationFrame(animationFrameId);
            gameLoop();
        }

        function drawHeart(x, y, size) {
            ctx.save();
            ctx.translate(x + tileSize/2, y + tileSize/2);

            let pulseScale = 1.0;
            if (gameActive && timeLeft <= 10 && timeLeft > 0) {
                pulseFrame += 0.25;
                pulseScale = 1.0 + Math.abs(Math.sin(pulseFrame)) * 0.25; 
            }
            ctx.scale((size / 24) * pulseScale, (size / 24) * pulseScale);

            ctx.beginPath();
            ctx.moveTo(0, 8.35);
            ctx.lineTo(-1.45, 7.03);
            ctx.bezierCurveTo(-6.6, 2.36, -10, -0.72, -10, -4.5);
            ctx.bezierCurveTo(-10, -7.58, -7.58, -10, -4.5, -10);
            ctx.bezierCurveTo(-2.76, -10, -1.09, -9.19, 0, -7.91);
            ctx.bezierCurveTo(1.09, -7.91, 2.76, -10, 4.5, -10);
            ctx.bezierCurveTo(7.58, -10, 10, -7.58, 10, -4.5);
            ctx.bezierCurveTo(10, -0.72, 6.6, 2.36, 1.45, 7.05);
            ctx.closePath();
            ctx.fillStyle = '#ff4d6d'; 
            ctx.fill();
            ctx.restore();
        }

        function drawGirlAndFlag(x, y) {
            let cx = x * tileSize + tileSize / 2;
            let cy = y * tileSize + tileSize / 2;
            const scale = tileSize / 40;
            const theme = themes[currentLevel];

            flagWaveFrame += 0.15;

            let bounceY = 0;
            let rotation = 0;
            if (levelWon) {
                danceTimer += 0.25;
                bounceY = Math.abs(Math.sin(danceTimer)) * -12 * scale; 
                rotation = Math.sin(danceTimer) * 0.3; 
            }

            ctx.save();
            ctx.translate(cx, cy + bounceY);
            ctx.rotate(rotation);

            ctx.save();
            ctx.translate(-10 * scale, 5 * scale); 
            
            ctx.strokeStyle = '#5c3d2e';
            ctx.lineWidth = 2 * scale;
            ctx.beginPath();
            ctx.moveTo(0, 10 * scale);
            ctx.lineTo(-12 * scale, -15 * scale);
            ctx.stroke();

            ctx.fillStyle = theme.wallBorder;
            ctx.beginPath();
            let fx = -12 * scale;
            let fy = -15 * scale;
            ctx.moveTo(fx, fy);
            
            for (let i = 0; i <= 20; i++) {
                let segmentX = fx - i * (scale * 1.3);
                let segmentY = fy + Math.sin(flagWaveFrame + i * 0.5) * (3 * scale);
                ctx.lineTo(segmentX, segmentY);
            }
            let flagWidth = 20 * (scale * 1.3);
            ctx.lineTo(fx - flagWidth, fy + (12 * scale) + Math.sin(flagWaveFrame + 20 * 0.5) * (3 * scale));
            
            for (let i = 20; i >= 0; i--) {
                let segmentX = fx - i * (scale * 1.3);
                let segmentY = fy + (12 * scale) + Math.sin(flagWaveFrame + i * 0.5) * (3 * scale);
                ctx.lineTo(segmentX, segmentY);
            }
            ctx.closePath();
            ctx.fill();

            ctx.font = `bold ${10 * scale}px Arial`;
            ctx.fillStyle = '#4a282d'; 
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText("Jass", fx - (flagWidth / 2), fy + (6 * scale) + Math.sin(flagWaveFrame + 10 * 0.5) * (3 * scale));
            ctx.restore();

            ctx.fillStyle = '#4a3728';
            ctx.beginPath(); ctx.arc(-10 * scale, -10 * scale, 6 * scale, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(10 * scale, -10 * scale, 6 * scale, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#ffd6ba';
            ctx.beginPath(); ctx.arc(0, 0, 12 * scale, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = '#4a3728';
            ctx.beginPath(); ctx.arc(0, -4 * scale, 12 * scale, Math.PI, 0); ctx.fill();

            ctx.fillStyle = '#222';
            ctx.beginPath(); ctx.arc(-4 * scale, 0, 1.5 * scale, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(4 * scale, 0, 1.5 * scale, 0, Math.PI * 2); ctx.fill();

            ctx.strokeStyle = theme.main;
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(0, 3 * scale, 3 * scale, 0, Math.PI); ctx.stroke();

            ctx.fillStyle = theme.main;
            ctx.beginPath();
            ctx.moveTo(-8 * scale, 11 * scale);
            ctx.lineTo(8 * scale, 11 * scale);
            ctx.lineTo(12 * scale, 19 * scale);
            ctx.lineTo(-12 * scale, 19 * scale);
            ctx.closePath();
            ctx.fill();

            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const theme = themes[currentLevel];

            for (let r = 0; r < gridSize; r++) {
                for (let c = 0; c < gridSize; c++) {
                    const x = c * tileSize;
                    const y = r * tileSize;

                    if (map[r][c] === TILE.WALL) {
                        ctx.fillStyle = theme.wall;
                        ctx.fillRect(x, y, tileSize, tileSize);
                        ctx.strokeStyle = theme.wallBorder;
                        ctx.lineWidth = 1;
                        ctx.strokeRect(x, y, tileSize, tileSize);
                    } 
                    else if (map[r][c] === TILE.KEY) {
                        ctx.fillStyle = '#ffd700';
                        ctx.font = `${tileSize * 0.75}px sans-serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('🔑', x + tileSize/2, y + tileSize/2);
                    } 
                    else if (map[r][c] === TILE.GATE) {
                        ctx.fillStyle = '#b76e79';
                        ctx.fillRect(x, y, tileSize, tileSize);
                        ctx.fillStyle = '#4a282d';
                        ctx.fillRect(x + (tileSize*0.2), y, 2, tileSize);
                        ctx.fillRect(x + (tileSize*0.5), y, 2, tileSize);
                        ctx.fillRect(x + (tileSize*0.8), y, 2, tileSize);
                        ctx.fillStyle = '#ffd700';
                        ctx.beginPath(); ctx.arc(x + (tileSize*0.7), y + tileSize/2, 2.5, 0, Math.PI*2); ctx.fill();
                    }
                    else if (map[r][c] === TILE.HEART) {
                        drawHeart(x, y, tileSize * 0.65);
                    }
                }
            }
            drawGirlAndFlag(player.x, player.y);
        }

        function gameLoop() {
            draw();
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function handleMove(dir) {
            if (!gameActive) return;
            tryPlayMusic();

            let nextX = player.x;
            let nextY = player.y;

            switch(dir) {
                case 'up': nextY--; break;
                case 'down': nextY++; break;
                case 'left': nextX--; break;
                case 'right': nextX++; break;
            }

            if (nextY >= 0 && nextY < gridSize && nextX >= 0 && nextX < gridSize) {
                const targetTile = map[nextY][nextX];

                if (targetTile !== TILE.WALL) {
                    if (targetTile === TILE.KEY) {
                        keysFound++;
                        updateInventoryDisplay();
                        map[nextY][nextX] = TILE.FLOOR;
                    }

                    if (targetTile === TILE.GATE) {
                        if (keysFound === totalKeysNeeded) {
                            for (let r = 0; r < gridSize; r++) {
                                for (let c = 0; c < gridSize; c++) {
                                    if (map[r][c] === TILE.GATE) map[r][c] = TILE.FLOOR;
                                }
                            }
                        } else {
                            return; 
                        }
                    }

                    player.x = nextX;
                    player.y = nextY;

                    if (map[player.y][player.x] === TILE.HEART) {
                        triggerWin();
                    }
                }
            }
        }

        function triggerWin() {
            gameActive = false;
            levelWon = true;
            clearInterval(timerInterval);

            setTimeout(() => {
                popupMessage.textContent = levelConfigs[currentLevel].msg;
                if (currentLevel === levelConfigs.length - 1) {
                    popupBtn.textContent = "Play Again!";
                } else {
                    popupBtn.textContent = "Next Level";
                }
                popupOverlay.style.display = 'flex';
            }, 1500);
        }

        function triggerGameOver() {
            gameActive = false;
            levelWon = false;
            clearInterval(timerInterval);

            popupMessage.textContent = "Time's up! Gagan's heart locked away.";
            popupBtn.textContent = "Try Again";
            popupOverlay.style.display = 'flex';
        }

        window.addEventListener('keydown', (e) => {
            let dir = '';
            switch(e.key.toLowerCase()) {
                case 'arrowup': case 'w': dir = 'up'; break;
                case 'arrowdown': case 's': dir = 'down'; break;
                case 'arrowleft': case 'a': dir = 'left'; break;
                case 'arrowright': case 'd': dir = 'right'; break;
                default: return;
            }
            e.preventDefault();
            handleMove(dir);
        });

        document.getElementById('btn-up').addEventListener('touchstart', (e) => { e.preventDefault(); handleMove('up'); });
        document.getElementById('btn-down').addEventListener('touchstart', (e) => { e.preventDefault(); handleMove('down'); });
        document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); handleMove('left'); });
        document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); handleMove('right'); });

        document.getElementById('btn-up').addEventListener('click', () => handleMove('up'));
        document.getElementById('btn-down').addEventListener('click', () => handleMove('down'));
        document.getElementById('btn-left').addEventListener('click', () => handleMove('left'));
        document.getElementById('btn-right').addEventListener('click', () => handleMove('right'));

        window.addEventListener('click', tryPlayMusic);

        popupBtn.addEventListener('click', () => {
            if (levelWon) {
                if (currentLevel === levelConfigs.length - 1) {
                    currentLevel = 0; 
                } else {
                    currentLevel++; 
                }
            }
            initLevel();
        });

        initCarousel();
        initLevel();
    </script>
</body>
</html>
