t-size:1.8rem;letter-spacing:2px;transition:transform .1s,opacity .1s;opacity:0;width:100%;padding:0 10px}#score-details{font-size:.8rem;margin-top:15px;opacity:0;color:#fff;text-shadow:2px 2px 0 #000}#game-over-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;z-index:15;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none}#game-over-screen.active{opacity:1;pointer-events:auto}.go-title{color:#ff0055;font-size:2.2rem;letter-spacing:4px;margin-bottom:20px;text-shadow:4px 4px 0 #000,0 0 15px rgba(255,0,85,.6);animation:blink .5s infinite alternate}.go-subtitle{color:#a4a4b5;font-size:.65rem;margin-bottom:50px;line-height:2;text-align:center}.restart-btn{background:#ffff00;color:#000;border:4px solid #fff;padding:16px 28px;font-family:'Press Start 2P',monospace;font-size:.75rem;cursor:pointer;box-shadow:6px 6px 0 #ff0055;transition:transform .05s}.restart-btn:active{transform:translate(3px,3px);box-shadow:3px 3px 0 #ff0055}.footer{text-align:center;font-size:.5rem;color:#ffff00;opacity:.7;width:100%;animation:blink .8s infinite alternate}@keyframes blink{0%{opacity:.2}100%{opacity:1}}</style></head><body><div id="ui"><div class="header"><div class="stats-left"><div class="level-badge" id="level-display">STAGE 01</div><div class="attempts-box" id="attempts-display"></div></div><div class="target-box">TARGET RATIO<span class="target-highlight">50 / 50</span></div></div><div class="message-container"><div id="feedback">PERFECT!</div><div id="score-details">50.0% / 50.0%</div></div><div class="footer">HARDCORE MODE - SWIPE SCREEN TO CUT</div></div><div id="game-over-screen"><div class="go-title">GAME OVER</div><div class="go-subtitle" id="go-score-summary">STAGE REACHED: 01</div><button class="restart-btn" onclick="restartWholeGame()">CONTINUE (99)</button></div><canvas id="gameCanvas"></canvas><script>const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),levelDisplay=document.getElementById('level-display'),attemptsDisplay=document.getElementById('attempts-display'),feedbackEl=document.getElementById('feedback'),scoreDetailsEl=document.getElementById('score-details'),gameOverScreen=document.getElementById('game-over-screen'),goScoreSummary=document.getElementById('go-score-summary'),MAX_ATTEMPTS=5,shapeColors=['#ff0055','#00ff66','#00ffff','#ffff00','#ff00ff','#ff6600'];let attemptsLeft=MAX_ATTEMPTS,currentLevel=1,gameState='playing',currentShape=null,cutStart=null,cutEnd=null,isDragging=false,fallingPieces=[];function updateAttemptsUI(){let h="";for(let i=0;i<MAX_ATTEMPTS;i++)h+=i<attemptsLeft?"❤️":"💀";attemptsDisplay.innerText=h}function resizeCanvas(){const d=window.devicePixelRatio||1;canvas.width=window.innerWidth*d;canvas.height=window.innerHeight*d;ctx.scale(d,d);ctx.imageSmoothingEnabled=ctx.mozImageSmoothingEnabled=ctx.webkitImageSmoothingEnabled=false;if(!currentShape&&gameState==='playing')generateShapeForLevel(currentLevel)}window.addEventListener('resize',resizeCanvas);function pAlign(v,s=6){return Math.floor(v/s)*s}function getDistance(p1,p2){return Math.hypot(p2.x-p1.x,p2.y-p1.y)}function getPolygonArea(v){let a=0,l=v.length;for(let i=0;i<l;i++)a+=(v[i].x*v[(i+1)%l].y)-(v[(i+1)%l].x*v[i].y);return Math.abs(a/2)}function getLineIntersection(p1,p2,p3,p4){const d=(p4.y-p3.y)*(p2.x-p1.x)-(p4.x-p3.x)*(p2.y-p1.y);if(d===0)return null;const ua=((p4.x-p3.x)*(p1.y-p3.y)-(p4.y-p3.y)*(p1.x-p3.x))/d,ub=((p2.x-p1.x)*(p1.y-p3.y)-(p2.y-p1.y)*(p1.x-p3.x))/d;return(ua>=0&&ua<=1&&ub>=0&&ub<=1)?{x:p1.x+ua*(p2.x-p1.x),y:p1.y+ua*(p2.y-p1.y)}:null}function generateShapeForLevel(lvl){const cx=pAlign(window.innerWidth/2),cy=pAlign(window.innerHeight/2),b=pAlign(Math.min(window.innerWidth,window.innerHeight)*.24),t=(lvl-1)%10,c=shapeColors[t%shapeColors.length];let v=[];if(t===0)v=[{x:cx-b,y:cy-b},{x:cx+b,y:cy-b},{x:cx+b,y:cy+b},{x:cx-b,y:cy+b}];else if(t===1)v=[{x:cx,y:cy-b*1.2},{x:cx+b*1.2,y:cy+b},{x:cx-b*1.2,y:cy+b}];else if(t===2){for(let i=0;i<5;i++){let a=(i*2*Math.PI/5)-Math.PI/2;v.push({x:cx+b*1.2*Math.cos(a),y:cy+b*1.2*Math.sin(a)})}}else if(t===3){for(let i=0;i<6;i++){let a=(i*2*Math.PI/6);v.push({x:cx+b*1.1*Math.cos(a),y:cy+b*1.1*Math.sin(a)})}}else if(t===4){v=[{x:cx-b,y:cy-b},{x:cx,y:cy-b},{x:cx,y:cy+b*0.2},{x:cx+b,y:cy+b*0.2},{x:cx+b,y:cy+b},{x:cx-b,y:cy+b}]}else if(t===5){v=[{x:cx-b*1.2,y:cy-b*0.6},{x:cx-b*0.4,y:cy-b*0.6},{x:cx,y:cy-b*1.3},{x:cx+b*0.4,y:cy-b*0.6},{x:cx+b*1.2,y:cy-b*0.6},{x:cx+b*0.8,y:cy+b*0.8},{x:cx-b*0.8,y:cy+b*0.8}]}else if(t===6){v=[{x:cx-b*0.3,y:cy-b*1.2},{x:cx+b*0.3,y:cy-b*1.2},{x:cx+b*0.3,y:cy-b*0.3},{x:cx+b*1.2,y:cy-b*0.3},{x:cx+b*1.2,y:cy+b*0.3},{x:cx+b*0.3,y:cy+b*0.3},{x:cx+b*0.3,y:cy+b*1.2},{x:cx-b*0.3,y:cy+b*1.2},{x:cx-b*0.3,y:cy+b*0.3},{x:cx-b*1.2,y:cy+b*0.3},{x:cx-b*1.2,y:cy-b*0.3},{x:cx-b*0.3,y:cy-b*0.3}]}else if(t===7){v=[{x:cx-b*0.2,y:cy-b*1.3},{x:cx+b*0.8,y:cy-b*0.2},{x:cx,y:cy-b*0.1},{x:cx+b*1.1,y:cy+b*1.1},{x:cx-b*0.4,y:cy+b*0.3},{x:cx-b*0.9,y:cy+b*0.9}]}else if(t===8){v=[{x:cx,y:cy-b*1.4},{x:cx+b*1.1,y:cy},{x:cx,y:cy+b*1.4},{x:cx-b*1.1,y:cy}]}else{v=[{x:cx-b*1.2,y:cy-b*0.8},{x:cx+b*0.4,y:cy-b*0.8},{x:cx+b*1.4,y:cy+b*0.8},{x:cx-b*0.2,y:cy+b*0.8}]}if(lvl>2){const r=((lvl*31)%360)*Math.PI/180;v=v.map(pt=>{let dx=pt.x-cx,dy=pt.y-cy;return{x:cx+dx*Math.cos(r)-dy*Math.sin(r),y:cy+dx*Math.sin(r)+dy*Math.cos(r)}})}currentShape={vertices:v.map(pt=>({x:pAlign(pt.x),y:pAlign(pt.y)})),color:c}}function sliceShape(s,p1,p2){const poly=s.vertices;let ints=[];for(let i=0;i<poly.length;i++){const pt=getLineIntersection(p1,p2,poly[i],poly[(i+1)%poly.length]);if(pt&&!ints.some(p=>getDistance(p.point,pt)<.01))ints.push({point:pt,idx:i})}if(ints.length!==2)return null;ints.sort((a,b)=>a.idx-b.idx);const i1=ints[0],i2=ints[1];let pA=[i1.point];for(let i=i1.idx+1;i<=i2.idx;i++)pA.push({x:poly[i].x,y:poly[i].y});pA.push(i2.point);let pB=[i2.point];for(let i=(i2.idx+1)%poly.length;;i=(i+1)%poly.length){pB.push({x:poly[i].x,y:poly[i].y});if(i===i1.idx)break}return pB.push(i1.point),[pA,pB]}function triggerShatterEffect(pcs,col,ang){const a1=ang+Math.PI/2,a2=ang-Math.PI/2;fallingPieces=pcs.map((v,idx)=>{let cx=0,cy=0;v.forEach(pt=>{cx+=pt.x;cy+=pt.y});cx/=v.length;cy/=v.length;const fa=idx===0?a1:a2,sp=5+Math.random()*3;return{vertices:v,color:col,vx:Math.cos(fa)*sp,vy:Math.sin(fa)*sp-5,gravity:.6,rotation:(Math.random()>.5?1:-1)*.06,angle:0,cx:cx,cy:cy}})}function processSliceResults(pcs,ang){const aA=getPolygonArea(pcs[0]),aB=getPolygonArea(pcs[1]),tot=aA+aB;if(tot<10)return;const pA=(aA/tot)*100,pB=(aB/tot)*100,diff=Math.abs(pA-50);scoreDetailsEl.innerHTML=`SPLIT: ${pA.toFixed(1)}% / ${pB.toFixed(1)}%`;let txt="",col="",pass=false;if(diff<=1.0){txt="PERFECT!!";col="#00ffff";pass=true}else if(diff<=2.5){txt="GREAT CUT!";col="#00ff66";pass=true}else if(diff<=4.5){txt="OK STEP";col="#ffff00";pass=true}else{txt="BAD SPLIT!";col="#ff0055";attemptsLeft--}updateAttemptsUI();feedbackEl.innerText=txt;feedbackEl.style.color=col;feedbackEl.style.opacity=1;feedbackEl.style.transform="scale(1.1)";scoreDetailsEl.style.opacity=1;triggerShatterEffect(pcs,currentShape.color,ang);currentShape=null;setTimeout(()=>{feedbackEl.style.opacity=0;feedbackEl.style.transform="scale(1)";scoreDetailsEl.style.opacity=0;if(attemptsLeft<=0){gameState='gameover';goScoreSummary.innerHTML=`FINAL SCORE: STAGE ${currentLevel<10?'0'+currentLevel:currentLevel}`;gameOverScreen.classList.add('active')}else{if(pass)currentLevel++;levelDisplay.innerText=`STAGE ${currentLevel<10?'0'+currentLevel:currentLevel}`;generateShapeForLevel(currentLevel);fallingPieces=[];gameState='playing'}},1800)}function restartWholeGame(){attemptsLeft=MAX_ATTEMPTS;currentLevel=1;fallingPieces=[];currentShape=null;updateAttemptsUI();levelDisplay.innerText=`STAGE 01`;gameOverScreen.classList.remove('active');gameState='playing';generateShapeForLevel(currentLevel)}function getTouchMousePos(e){const cX=e.touches?e.touches[0].clientX:e.clientX,cY=e.touches?e.touches[0].clientY:e.clientY;return{x:cX,y:cY}}function handleStart(e){if(gameState!=='playing')return;isDragging=true;cutStart=getTouchMousePos(e);cutEnd=cutStart}function handleMove(e){if(!isDragging||gameState!=='playing')return;cutEnd=getTouchMousePos(e)}function handleEnd(){if(!isDragging||gameState!=='playing')return;isDragging=false;if(getDistance(cutStart,cutEnd)>20){gameState='evaluation';const dx=cutEnd.x-cutStart.x,dy=cutEnd.y-cutStart.y,ang=Math.atan2(dy,dx),len=Math.max(window.innerWidth,window.innerHeight)*2,p1={x:cutStart.x-Math.cos(ang)*len,y:cutStart.y-Math.sin(ang)*len},p2={x:cutEnd.x+Math.cos(ang)*len,y:cutEnd.y+Math.sin(ang)*len},slices=sliceShape(currentShape,p1,p2);if(slices)processSliceResults(slices,ang);else gameState='playing'}cutStart=cutEnd=null}canvas.addEventListener('mousedown',handleStart);canvas.addEventListener('mousemove',handleMove);window.addEventListener('mouseup',handleEnd);canvas.addEventListener('touchstart',handleStart,{passive:true});canvas.addEventListener('touchmove',handleMove,{passive:true});window.addEventListener('touchend',handleEnd);function drawLoop(){ctx.fillStyle="#0c0c12";ctx.fillRect(0,0,window.innerWidth,window.innerHeight);if(currentShape){ctx.beginPath();ctx.moveTo(pAlign(currentShape.vertices[0].x),pAlign(currentShape.vertices[0].y));for(let i=1;i<currentShape.vertices.length;i++)ctx.lineTo(pAlign(currentShape.vertices[i].x),pAlign(currentShape.vertices[i].y));ctx.closePath();ctx.fillStyle=currentShape.color;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=6;ctx.stroke()}fallingPieces.forEach(p=>{p.vy+=p.gravity;p.cx+=p.vx;p.cy+=p.vy;p.angle=Math.floor((p.angle+p.rotation)/.1)*.1;ctx.save();ctx.translate(pAlign(p.cx),pAlign(p.cy));ctx.rotate(p.angle);ctx.beginPath();ctx.moveTo(pAlign(p.vertices[0].x-p.cx),pAlign(p.vertices[0].y-p.cy));for(let i=1; i<p.vertices.length;i++)ctx.lineTo(pAlign(p.vertices[i].x-p.cx),pAlign(p.vertices[i].y-p.cy));ctx.closePath();ctx.fillStyle=p.color;ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=4;ctx.stroke();ctx.restore()});if(isDragging&&cutStart&&cutEnd){const dx=cutEnd.x-cutStart.x,dy=cutEnd.y-cutStart.y,ang=Math.atan2(dy,dx);ctx.beginPath();ctx.moveTo(pAlign(cutStart.x-Math.cos(ang)*2000),pAlign(cutStart.y-Math.sin(ang)*2000));ctx.lineTo(pAlign(cutEnd.x+Math.cos(ang)*2000),pAlign(cutEnd.y+Math.sin(ang)*2000));ctx.strokeStyle='#fff';ctx.lineWidth=6;ctx.stroke()}requestAnimationFrame(drawLoop)}updateAttemptsUI();resizeCanvas();requestAnimationFrame(drawLoop);</script></body></html>
