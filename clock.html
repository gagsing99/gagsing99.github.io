<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Elegant Luxury Heart Watch with Straps</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            font-family: 'Times New Roman', Times, serif;
        }
        .wrapper {
            width: 100%;
            max-width: 480px; /* Accounts for straps vertically */
            aspect-ratio: 1 / 1.5; /* Adjusted aspect ratio to accommodate straps */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            width: 100%;
            height: 100%;
            background-color: transparent;
            /* Enhanced premium shadow profile */
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.85);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <canvas id="luxuryClock"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("luxuryClock");
        const ctx = canvas.getContext("2d");
        
        // Base coordinate grid (scaled seamlessly for high-DPI viewports)
        const baseWidth = 600;
        const baseHeight = 900; // Taller canvas to render top/bottom leather straps
        const radius = baseWidth * 0.44; // Dial size calculated dynamically

        // Setup High-DPI / Retina mobile scaling
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            
            ctx.scale(canvas.width / baseWidth, canvas.height / baseHeight);
        }

        const words = ["I", "love", "you", "every", "second", "of", "my", "life.", "I", "love", "you", "always"];

        // Generate seeded, deterministic coordinates for the background watermarks
        // This stops them from "shuffling" randomly on every single frame refresh.
        const watermarkPattern = [];
        const seedRandom = (s) => { return function() { s = Math.sin(s) * 10000; return s - Math.floor(s); }; };
        const random = seedRandom(42); // Seeded random instance
        
        for (let i = 0; i < 45; i++) {
            // Keep points roughly mapped within the circular constraints of the dial
            let angle = random() * Math.PI * 2;
            let distance = random() * (radius * 0.85);
            watermarkPattern.push({
                x: Math.cos(angle) * distance,
                y: Math.sin(angle) * distance,
                size: 11 + random() * 8,
                rotation: random() * 0.4 - 0.2 // Soft, elegant text tilt
            });
        }

        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100); 

        setInterval(drawClock, 1000);
        
        function drawClock() {
            const now = new Date();
            let hour = now.getHours();
            let minute = now.getMinutes();
            let second = now.getSeconds();
            let day = now.getDate();

            ctx.clearRect(0, 0, baseWidth, baseHeight);

            // Set Center point of the watch face body explicitly
            const cx = baseWidth / 2;
            const cy = baseHeight / 2;

            // 1. Draw Brown Leather Straps (Rendered in the background layer)
            drawStraps(cx, cy);

            // 2. Thick White Luxury Bezel / Case
            ctx.save();
            ctx.translate(cx, cy);
            ctx.beginPath();
            ctx.arc(0, 0, radius + 12, 0, 2 * Math.PI); // Extra padding for heavy bezel width
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            
            // Subtle premium case accent inner-ring
            ctx.strokeStyle = "rgba(0, 0, 0, 0.15)";
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.restore();

            // 3. Dial Face Base (Deep Black Inner Surface)
            ctx.save();
            ctx.translate(cx, cy);
            ctx.beginPath();
            ctx.arc(0, 0, radius, 0, 2 * Math.PI);
            ctx.fillStyle = "#000000";
            ctx.fill();

            // 4. Draw Faintest Gray "3000" Watermark Text Layer
            drawWatermarks();

            // 5. Draw Heart Minute Markers
            drawHeartTrack();

            // 6. Draw Minimalist Date Window
            drawMinimalDate(day);

            // 7. Draw Integrated Hours & Typography
            drawElegantHours();

            // 8. Draw Luxury Hands
            hour = hour % 12;
            hour = (hour * Math.PI / 6) + (minute * Math.PI / (6 * 60)) + (second * Math.PI / (360 * 60));
            drawSleekHand(hour, radius * 0.46, 3.5); 

            minute = (minute * Math.PI / 30) + (second * Math.PI / (30 * 60));
            drawSleekHand(minute, radius * 0.72, 2.2);  

            second = (second * Math.PI / 30);
            drawSleekHand(second, radius * 0.80, 0.8, "rgba(255, 255, 255, 0.95)"); 

            // Center Premium Solid Pivot Cap
            ctx.beginPath();
            ctx.arc(0, 0, 5, 0, 2 * Math.PI);
            ctx.fillStyle = "#ffffff";
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 0, 1.5, 0, 2 * Math.PI);
            ctx.fillStyle = "#000000";
            ctx.fill();
            
            ctx.restore(); // Complete drawing cycle
        }

        function drawStraps(cx, cy) {
            ctx.save();
            const strapWidth = radius * 0.95;
            const strapLength = 260; // Distance extending outward
            
            // Rich Horween Brown Leather tones
            ctx.fillStyle = "#4a2c11"; 
            ctx.strokeStyle = "#331d0a"; // Fine dark leather edge-burnishing
            ctx.lineWidth = 2;

            // Top Strap
            ctx.beginPath();
            ctx.moveTo(cx - strapWidth / 2, cy - radius);
            ctx.lineTo(cx - strapWidth / 2 + 10, cy - radius - strapLength);
            ctx.lineTo(cx + strapWidth / 2 - 10, cy - radius - strapLength);
            ctx.lineTo(cx + strapWidth / 2, cy - radius);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Bottom Strap
            ctx.beginPath();
            ctx.moveTo(cx - strapWidth / 2, cy + radius);
            ctx.lineTo(cx - strapWidth / 2 + 15, cy + radius + strapLength + 20);
            ctx.lineTo(cx + strapWidth / 2 - 15, cy + radius + strapLength + 20); // Rounded aesthetic tailoring
            ctx.lineTo(cx + strapWidth / 2, cy + radius);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Intricate luxury leather stitching effect (Dotted lines)
            ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
            ctx.lineWidth = 1.5;
            ctx.setLineDash([4, 5]);
            
            // Top Stitching Lines
            ctx.beginPath();
            ctx.moveTo(cx - strapWidth / 2 + 6, cy - radius - 5);
            ctx.lineTo(cx - strapWidth / 2 + 14, cy - radius - strapLength + 6);
            ctx.lineTo(cx + strapWidth / 2 - 14, cy - radius - strapLength + 6);
            ctx.lineTo(cx + strapWidth / 2 - 6, cy - radius - 5);
            ctx.stroke();

            // Bottom Stitching Lines
            ctx.beginPath();
            ctx.moveTo(cx - strapWidth / 2 + 6, cy + radius + 5);
            ctx.lineTo(cx - strapWidth / 2 + 19, cy + radius + strapLength + 14);
            ctx.lineTo(cx + strapWidth / 2 - 19, cy + radius + strapLength + 14);
            ctx.lineTo(cx + strapWidth / 2 - 6, cy + radius + 5);
            ctx.stroke();

            ctx.restore();
        }

        function drawWatermarks() {
            ctx.save();
            // Ultra-low opacity light gray so it blends smoothly right into the deep black dial
            ctx.fillStyle = "rgba(255, 255, 255, 0.045)";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            watermarkPattern.forEach(pt => {
                ctx.save();
                ctx.translate(pt.x, pt.y);
                ctx.rotate(pt.rotation);
                ctx.font = `600 ${pt.size}px Arial, Helvetica, sans-serif`;
                ctx.fillText("3000", 0, 0);
                ctx.restore();
            });
            ctx.restore();
        }

        function drawHeartTrack() {
            ctx.save();
            for (let i = 0; i < 60; i++) {
                let angle = i * Math.PI / 30;
                ctx.rotate(angle);
                ctx.translate(0, -radius * 0.88);

                const isHour = (i % 5 === 0);
                const heartSize = isHour ? 4.5 : 2.5;
                const heartColor = isHour ? "rgba(255, 255, 255, 0.75)" : "rgba(255, 255, 255, 0.22)";

                ctx.beginPath();
                ctx.fillStyle = heartColor;
                
                ctx.moveTo(0, -heartSize / 4);
                ctx.bezierCurveTo(-heartSize / 2, -heartSize, -heartSize, -heartSize / 3, -heartSize, heartSize / 4);
                ctx.bezierCurveTo(-heartSize, heartSize * 0.7, -heartSize / 4, heartSize * 1.1, 0, heartSize * 1.4);
                ctx.bezierCurveTo(heartSize / 4, heartSize * 1.1, heartSize, heartSize * 0.7, heartSize, heartSize / 4);
                ctx.bezierCurveTo(heartSize, -heartSize / 3, heartSize / 2, -heartSize, 0, -heartSize / 4);
                ctx.closePath();
                ctx.fill();

                ctx.translate(0, radius * 0.88);
                ctx.rotate(-angle);
            }
            ctx.restore();
        }

        function drawElegantHours() {
            const romanNumerals = ["XII", "I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI"];

            for (let num = 0; num < 12; num++) {
                let angle = num * Math.PI / 6;
                ctx.rotate(angle);
                ctx.translate(0, -radius * 0.71);
                ctx.rotate(-angle); 

                // Roman Numeral
                ctx.font = "300 " + (radius * 0.088) + "px 'Times New Roman'";
                ctx.textBaseline = "middle";
                ctx.textAlign = "center";
                ctx.fillStyle = "#ffffff";
                ctx.fillText(romanNumerals[num], 0, -8);

                // Words
                ctx.font = "italic 300 " + (radius * 0.034) + "px 'Times New Roman'";
                ctx.fillStyle = "rgba(255, 255, 255, 0.45)"; 
                ctx.fillText(words[num], 0, 18);

                ctx.rotate(angle);
                ctx.translate(0, radius * 0.71);
                ctx.rotate(-angle);
            }
        }

        function drawSleekHand(pos, length, width, color = "#ffffff") {
            ctx.save();
            ctx.beginPath();
            ctx.lineWidth = width;
            ctx.lineCap = "round";
            ctx.strokeStyle = color;
            ctx.moveTo(0, 0);
            ctx.rotate(pos);
            ctx.lineTo(0, length * 0.12); 
            ctx.moveTo(0, 0);
            ctx.lineTo(0, -length);
            ctx.stroke();
            ctx.restore();
        }

        function drawMinimalDate(day) {
            ctx.save();
            const boxX = radius * 0.36;
            const boxY = 0;
            const width = 34;
            const height = 22;

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(boxX - width/2, boxY - height/2, width, height);

            ctx.fillStyle = "#000000";
            ctx.font = "600 " + (radius * 0.045) + "px 'Times New Roman'";
            ctx.textBaseline = "middle";
            ctx.textAlign = "center";
            ctx.fillText(day, boxX, boxY);
            ctx.restore();
        }
    </script>
</body>
</html>
