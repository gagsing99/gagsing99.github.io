<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Biometric Verification</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #00ffcc; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #canvas-container { position: relative; width: 300px; height: 300px; border: 2px solid #333; border-radius: 20px; cursor: pointer; transition: transform 0.5s; overflow: hidden; }
        canvas { width: 100%; height: 100%; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); transition: opacity 0.5s; }
        .hidden-msg { font-size: 2px; color: white; transform: scale(0.001); transition: all 3s ease-in-out; text-align: center; }
        .zoomed { transform: scale(1000); opacity: 0; }
        .msg-visible { transform: scale(1); font-size: 20px; }
    </style>
</head>
<body>

    <h2 id="status">Input Thumb Angle 1/5</h2>
    <div id="canvas-container" onclick="registerInput()">
        <canvas id="thumbCanvas"></canvas>
        <div id="overlay">Tap to Scan</div>
    </div>

    <div id="final-msg" class="hidden-msg">Gagan loves you</div>

    <script>
        let count = 0;
        const canvas = document.getElementById('thumbCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        function drawThumb(angle) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.ellipse(150, 150, 50, 80, angle * Math.PI / 180, 0, 2 * Math.PI);
            ctx.stroke();
            // Draw dummy lines
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(100, 150); ctx.lineTo(200, 150);
            ctx.stroke();
        }

        function registerInput() {
            count++;
            if (count <= 5) {
                drawThumb(count * 30);
                document.getElementById('status').innerText = `Input Thumb Angle ${count}/5`;
                if (count === 5) {
                    setTimeout(zoomEffect, 500);
                }
            }
        }

        function zoomEffect() {
            container.classList.add('zoomed');
            setTimeout(() => {
                const msg = document.getElementById('final-msg');
                msg.classList.add('msg-visible');
            }, 500);
        }
    </script>
</body>
</html>
