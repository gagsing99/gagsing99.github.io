<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>A Garden for Jass</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        body {
            background-color: #0b0b0f;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 12px;
            font-weight: 300;
            letter-spacing: 2px;
            color: #c8b6ff;
            font-size: 1.1rem;
            text-transform: uppercase;
            text-align: center;
            transition: opacity 1s;
        }
        #game-container {
            position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            border-radius: 16px;
            overflow: hidden;
            background: #121216;
            width: 100%;
            max-width: 500px; /* Perfectly sized for mobile portrait */
            aspect-ratio: 4 / 5;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        #message {
            position: absolute;
            bottom: 15%;
            width: 100%;
            text-align: center;
            font-size: 2.2rem;
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
            font-weight: bold;
            color: #ff3354;
            text-shadow: 0 0 12px rgba(255, 51, 84, 0.8), 0 0 25px rgba(255, 215, 0, 0.6);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 2.5s ease, transform 2.5s ease;
            pointer-events: none;
        }
        #message.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1 id="instruction">Tap the flowers to clear the path...</h1>
    
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="message">I love you, Jass</div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const instruction = document.getElementById('instruction');
const message = document.getElementById('message');

// Base logical coordinate resolution
const LOGICAL_WIDTH = 600;
const LOGICAL_HEIGHT = 750;

let flowerItems = [];
let gameOver = false;
let pulseTimer = 0;

const TOTAL_FLOWERS = 100; // Balanced density for mobile screens
const flowerTypes = ['daisy', 'marigold', 'tulip', 'hydrangea', 'lavender'];

class Flower {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.type = flowerTypes[Math.floor(Math.random() * flowerTypes.length)];
        this.radius = Math.random() * 10 + 24; // Balanced tap sizing
        this.rotation = Math.random() * Math.PI * 2;
        this.scaleY = 0.85 + Math.random() * 0.15;
        
        if (this.type === 'daisy') {
            this.color = '#ffffff';
            this.centerColor = '#ffb703';
            this.petals = 9;
        } else if (this.type === 'marigold') {
            this.color = ['#ff9f1c', '#ffbf69', '#e65c00'][Math.floor(Math.random() * 3)];
            this.centerColor = '#9e3f00';
            this.petals = 14;
        } else if (this.type === 'tulip') {
            this.color = ['#ff758f', '#ff8fa3', '#b5179e', '#7209b7'][Math.floor(Math.random() * 4)];
            this.petals = 4;
        } else if (this.type === 'hydrangea') {
            this.color = ['#4cc9f0', '#4895ef', '#7209b7', '#b5179e'][Math.floor(Math.random() * 4)];
        } else { 
            this.color = ['#dec9e9', '#ccb7e5', '#b185db', '#944bbb'][Math.floor(Math.random() * 4)];
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.scale(1, this.scaleY);
        
        ctx.shadowColor = 'rgba(0, 0, 0, 0.45)';
        ctx.shadowBlur = 10;
        ctx.shadowOffsetX = 4;
        ctx.shadowOffsetY = 6;

        if (this.type === 'daisy' || this.type === 'marigold') {
            ctx.fillStyle = this.color;
            for (let i = 0; i < this.petals; i++) {
                ctx.rotate((Math.PI * 2) / this.petals);
                ctx.beginPath();
                ctx.ellipse(0, -this.radius * 0.65, this.radius * 0.2, this.radius * 0.65, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            ctx.fillStyle = this.centerColor;
            ctx.beginPath();
            ctx.arc(0, 0, this.radius * 0.3, 0, Math.PI * 2);
            ctx.fill();

        } else if (this.type === 'tulip') {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.ellipse(-this.radius*0.18, 0, this.radius * 0.32, this.radius * 0.6, -0.15, 0, Math.PI * 2);
            ctx.ellipse(this.radius*0.18, 0, this.radius * 0.32, this.radius * 0.6, 0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(0, this.radius*0.05, this.radius * 0.28, this.radius * 0.55, 0, 0, Math.PI * 2);
            ctx.fill();

        } else if (this.type === 'hydrangea') {
            ctx.fillStyle = this.color;
            for(let j = 0; j < 5; j++) {
                let ox = (j % 3 - 1) * 10;
                let oy = (Math.floor(j / 3) - 0.5) * 10;
                ctx.save();
                ctx.translate(ox, oy);
                for(let k=0; k<4; k++) {
                    ctx.rotate(Math.PI / 2);
                    ctx.beginPath();
                    ctx.ellipse(0, -5, 3.5, 6, 0, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();
            }
        } else if (this.type === 'lavender') {
            ctx.fillStyle = this.color;
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.ellipse(-5, -i * 7, 4.5, 3.5, Math.PI/4, 0, Math.PI * 2);
                ctx.ellipse(5, -i * 7, 4.5, 3.5, -Math.PI/4, 0, Math.PI * 2);
                ctx.ellipse(0, -i * 7 - 3, 3.5, 4.5, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        ctx.restore();
    }

    isPointInside(mx, my) {
        let dist = Math.hypot(mx - this.x, my - this.y);
        // Generous hit-box for easier mobile tapping
        return dist < this.radius + 12; 
    }
}

function resizeCanvas() {
    // High DPI / Mobile Retina configuration
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    
    ctx.scale(canvas.width / LOGICAL_WIDTH, canvas.height / LOGICAL_HEIGHT);
}

function initGame() {
    flowerItems = [];
    for (let i = 0; i < TOTAL_FLOWERS; i++) {
        let angle = Math.random() * Math.PI * 2;
        let distance = Math.pow(Math.random(), 1.1) * 160; 
        let x = LOGICAL_WIDTH / 2 + Math.cos(angle) * distance;
        let y = LOGICAL_HEIGHT / 2 - 30 + Math.sin(angle) * distance;
        flowerItems.push(new Flower(x, y));
    }
}

function drawHyperRealisticRose(cx, cy, scale) {
    pulseTimer += 0.025;
    let yellowGlow = 45 + Math.sin(pulseTimer) * 15; 

    ctx.save();
    
    // Ambient Golden-Yellow Glow Map
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = yellowGlow;
    let glowGrad = ctx.createRadialGradient(cx, cy, 5, cx, cy, 130);
    glowGrad.addColorStop(0, 'rgba(255, 234, 0, 0.7)');
    glowGrad.addColorStop(0.3, 'rgba(255, 200, 0, 0.35)');
    glowGrad.addColorStop(0.7, 'rgba(218, 165, 32, 0.05)');
    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, 130, 0, Math.PI*2);
    ctx.fill();

    ctx.shadowBlur = 0; 

    // Stem
    ctx.lineWidth = 6 * scale;
    ctx.strokeStyle = '#143616';
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, cy + 15);
    ctx.quadraticCurveTo(cx + 8, cy + 50, cx - 15, cy + 110);
    ctx.stroke();

    // Leaves
    autoLeaf(cx - 26, cy + 55, 22 * scale, -Math.PI/6);
    autoLeaf(cx + 24, cy + 70, 20 * scale, Math.PI/4);

    // Rose Structure Layers
    drawAdvancedPetal(cx - 8, cy + 22, 42 * scale, 28 * scale, 0.1, '#4a000b', '#800016', 0.2);
    drawAdvancedPetal(cx - 32, cy - 2, 38 * scale, 30 * scale, -0.4, '#5c0011', '#9e0024', 0.1);
    drawAdvancedPetal(cx + 32, cy - 2, 38 * scale, 30 * scale, 0.4, '#5c0011', '#9e0024', 0.1);
    drawAdvancedPetal(cx, cy - 28, 40 * scale, 28 * scale, 0, '#4a000b', '#8b001e', 0.1);

    drawAdvancedPetal(cx - 18, cy + 10, 30 * scale, 25 * scale, -0.2, '#800016', '#ba0029', 0.3);
    drawAdvancedPetal(cx + 18, cy + 10, 30 * scale, 25 * scale, 0.2, '#800016', '#ba0029', 0.3);
    drawAdvancedPetal(cx, cy - 14, 32 * scale, 26 * scale, 0.05, '#9e0024', '#d90429', 0.2);

    drawAdvancedPetal(cx - 10, cy - 2, 21 * scale, 21 * scale, -0.1, '#ba0029', '#ef233c', 0.4);
    drawAdvancedPetal(cx + 10, cy - 2, 21 * scale, 21 * scale, 0.1, '#ba0029', '#ef233c', 0.4);
    drawAdvancedPetal(cx, cy + 6, 22 * scale, 18 * scale, 0, '#d90429', '#ff4d6d', 0.5);

    // Inner Core Buds
    ctx.save();
    ctx.translate(cx, cy - 4);
    for (let i = 0; i < 6; i++) {
        let r = (11 - i * 1.5) * scale;
        let rot = i * 1.3;
        ctx.rotate(0.4);
        let grad = ctx.createLinearGradient(-r, -r, r, r);
        grad.addColorStop(0, '#ff758f');
        grad.addColorStop(0.5, '#ba0029');
        grad.addColorStop(1, '#2b0006');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(i % 2 === 0 ? 1.5 : -1.5, 0, r, r * 1.3, rot, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();

    ctx.restore();
}

function drawAdvancedPetal(x, y, rx, ry, angle, darkColor, lightColor, highlightShift) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    let grad = ctx.createRadialGradient(-rx * highlightShift, -ry * 0.3, rx * 0.1, 0, 0, rx);
    grad.addColorStop(0, lightColor);
    grad.addColorStop(0.6, darkColor);
    grad.addColorStop(0.95, '#2b0006'); 
    grad.addColorStop(1, '#150003');

    ctx.fillStyle = grad;
    
    ctx.beginPath();
    ctx.moveTo(-rx, 0);
    ctx.bezierCurveTo(-rx, -ry * 1.2, rx, -ry * 1.2, rx, 0);
    ctx.bezierCurveTo(rx, ry * 0.9, -rx, ry * 0.9, -rx, 0);
    ctx.closePath();
    ctx.fill();
    
    ctx.strokeStyle = 'rgba(255, 117, 143, 0.2)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
    ctx.restore();
}

function autoLeaf(lx, ly, size, angle) {
    ctx.save();
    ctx.translate(lx, ly);
    ctx.rotate(angle);
    
    let leafGrad = ctx.createLinearGradient(-size, 0, size, 0);
    leafGrad.addColorStop(0, '#2d5a27');
    leafGrad.addColorStop(0.5, '#1e4620');
    leafGrad.addColorStop(1, '#0f2b11');
    ctx.fillStyle = leafGrad;

    ctx.beginPath();
    ctx.moveTo(-size, 0);
    ctx.quadraticCurveTo(0, -size * 0.5, size, 0);
    ctx.quadraticCurveTo(0, size * 0.5, -size, 0);
    ctx.fill();

    ctx.strokeStyle = '#477e40';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(-size, 0);
    ctx.lineTo(size, 0);
    ctx.stroke();
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);

    // Draw the static glowing core rose
    drawHyperRealisticRose(LOGICAL_WIDTH / 2, LOGICAL_HEIGHT / 2 - 40, 1.1);

    // Draw masking overlay flora
    for (let i = 0; i < flowerItems.length; i++) {
        flowerItems[i].draw();
    }

    if (flowerItems.length === 0 && !gameOver) {
        gameOver = true;
        instruction.style.opacity = 0;
        message.classList.add('show');
    }

    requestAnimationFrame(draw);
}

// --- MOBILE TOUCH AND TAP SELECTION LOGIC ---

function handleTap(e) {
    if (gameOver) return;

    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    // Convert screen metrics directly into fixed logical map coordinate space
    const canvasX = ((clientX - rect.left) / rect.width) * LOGICAL_WIDTH;
    const canvasY = ((clientY - rect.top) / rect.height) * LOGICAL_HEIGHT;

    // Process array in reverse order to pop the topmost visual flower element first
    for (let i = flowerItems.length - 1; i >= 0; i--) {
        if (flowerItems[i].isPointInside(canvasX, canvasY)) {
            flowerItems.splice(i, 1); // Instantly remove flower from array
            break; 
        }
    }
}

// Universal Interaction Bindings
canvas.addEventListener('mousedown', handleTap);
canvas.addEventListener('touchstart', function(e) {
    e.preventDefault(); // Stop mobile scrolling zooming behavior
    handleTap(e);
}, { passive: false });

window.addEventListener('resize', resizeCanvas);

// Initialize
window.onload = () => {
    resizeCanvas();
    initGame();
    draw();
};
</script>
</body>
</html>
