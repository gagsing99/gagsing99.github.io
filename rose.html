<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Garden for Jass</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0b0f;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin-bottom: 15px;
            font-weight: 300;
            letter-spacing: 3px;
            color: #c8b6ff;
            font-size: 1.3rem;
            text-transform: uppercase;
            transition: opacity 1s;
        }
        #game-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            border-radius: 20px;
            overflow: hidden;
            background: #121216;
        }
        canvas {
            display: block;
            cursor: grab;
        }
        canvas:active {
            cursor: grabbing;
        }
        #message {
            position: absolute;
            bottom: 60px;
            width: 100%;
            text-align: center;
            font-size: 3rem;
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
            font-weight: bold;
            color: #ff3354;
            text-shadow: 0 0 15px rgba(255, 51, 84, 0.8), 0 0 30px rgba(255, 215, 0, 0.6);
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 3s ease, transform 3s ease;
            pointer-events: none;
        }
        #message.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h1 id="instruction">Clear the hidden garden...</h1>
    
    <div id="game-container">
        <canvas id="gameCanvas" width="900" height="650"></canvas>
        <div id="message">I love you, Jass</div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const instruction = document.getElementById('instruction');
const message = document.getElementById('message');

let flowerItems = [];
let selectedItem = null;
let dragOffset = { x: 0, y: 0 };
let gameOver = false;
let pulseTimer = 0;

const TOTAL_FLOWERS = 120; 
const flowerTypes = ['daisy', 'marigold', 'tulip', 'hydrangea', 'lavender'];

class Flower {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.type = flowerTypes[Math.floor(Math.random() * flowerTypes.length)];
        this.radius = Math.random() * 12 + 22; 
        this.rotation = Math.random() * Math.PI * 2;
        this.scaleY = 0.85 + Math.random() * 0.15; 
        
        if (this.type === 'daisy') {
            this.color = '#ffffff';
            this.centerColor = '#ffb703';
            this.petals = 10;
        } else if (this.type === 'marigold') {
            this.color = ['#ff9f1c', '#ffbf69', '#e65c00'][Math.floor(Math.random() * 3)];
            this.centerColor = '#9e3f00';
            this.petals = 16;
        } else if (this.type === 'tulip') {
            this.color = ['#ff758f', '#ff8fa3', '#b5179e', '#7209b7'][Math.floor(Math.random() * 4)];
            this.petals = 4;
        } else if (this.type === 'hydrangea') {
            this.color = ['#4cc9f0', '#4895ef', '#7209b7', '#b5179e'][Math.floor(Math.random() * 4)];
            this.petals = 4;
        } else { 
            this.color = ['#dec9e9', '#ccb7e5', '#b185db', '#944bbb'][Math.floor(Math.random() * 4)];
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.scale(1, this.scaleY);
        
        ctx.shadowColor = 'rgba(0, 0, 0, 0.45)';
        ctx.shadowBlur = 12;
        ctx.shadowOffsetX = 5;
        ctx.shadowOffsetY = 7;

        if (this.type === 'daisy' || this.type === 'marigold') {
            ctx.fillStyle = this.color;
            for (let i = 0; i < this.petals; i++) {
                ctx.rotate((Math.PI * 2) / this.petals);
                ctx.beginPath();
                ctx.ellipse(0, -this.radius * 0.65, this.radius * 0.2, this.radius * 0.65, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
            ctx.fillStyle = this.centerColor;
            ctx.beginPath();
            ctx.arc(0, 0, this.radius * 0.3, 0, Math.PI * 2);
            ctx.fill();

        } else if (this.type === 'tulip') {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.ellipse(-this.radius*0.18, 0, this.radius * 0.32, this.radius * 0.6, -0.15, 0, Math.PI * 2);
            ctx.ellipse(this.radius*0.18, 0, this.radius * 0.32, this.radius * 0.6, 0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(0, this.radius*0.05, this.radius * 0.28, this.radius * 0.55, 0, 0, Math.PI * 2);
            ctx.fill();

        } else if (this.type === 'hydrangea') {
            ctx.fillStyle = this.color;
            for(let j = 0; j < 5; j++) {
                let ox = (j % 3 - 1) * 12;
                let oy = (Math.floor(j / 3) - 0.5) * 12;
                ctx.save();
                ctx.translate(ox, oy);
                for(let k=0; k<4; k++) {
                    ctx.rotate(Math.PI / 2);
                    ctx.beginPath();
                    ctx.ellipse(0, -6, 4, 7, 0, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();
            }
        } else if (this.type === 'lavender') {
            ctx.fillStyle = this.color;
            for (let i = 0; i < 6; i++) {
                ctx.beginPath();
                ctx.ellipse(-6, -i * 8, 5, 4, Math.PI/4, 0, Math.PI * 2);
                ctx.ellipse(6, -i * 8, 5, 4, -Math.PI/4, 0, Math.PI * 2);
                ctx.ellipse(0, -i * 8 - 4, 4, 5, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        ctx.restore();
    }

    isPointInside(mx, my) {
        let dist = Math.hypot(mx - this.x, my - this.y);
        return dist < this.radius + 15; 
    }
}

function initGame() {
    for (let i = 0; i < TOTAL_FLOWERS; i++) {
        let angle = Math.random() * Math.PI * 2;
        let distance = Math.pow(Math.random(), 1.2) * 220; 
        let x = canvas.width / 2 + Math.cos(angle) * distance;
        let y = canvas.height / 2 + Math.sin(angle) * distance;
        flowerItems.push(new Flower(x, y));
    }
}

function drawHyperRealisticRose(cx, cy, scale) {
    pulseTimer += 0.025;
    let yellowGlow = 50 + Math.sin(pulseTimer) * 18; 

    ctx.save();
    
    // Dynamic golden-yellow back glow
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = yellowGlow;
    let glowGrad = ctx.createRadialGradient(cx, cy, 10, cx, cy, 160);
    glowGrad.addColorStop(0, 'rgba(255, 234, 0, 0.65)');
    glowGrad.addColorStop(0.3, 'rgba(255, 200, 0, 0.35)');
    glowGrad.addColorStop(0.6, 'rgba(218, 165, 32, 0.1)');
    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, 160, 0, Math.PI*2);
    ctx.fill();

    ctx.shadowBlur = 0; 

    // Stem
    ctx.lineWidth = 7 * scale;
    ctx.strokeStyle = '#143616';
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, cy + 20);
    ctx.quadraticCurveTo(cx + 10, cy + 70, cx - 20, cy + 150);
    ctx.stroke();

    // Leaves
    autoLeaf(cx - 35, cy + 75, 28 * scale, -Math.PI/6);
    autoLeaf(cx + 32, cy + 95, 26 * scale, Math.PI/4);

    // Outer Petals
    drawAdvancedPetal(cx - 10, cy + 30, 52 * scale, 35 * scale, 0.1, '#4a000b', '#800016', 0.2);
    drawAdvancedPetal(cx - 42, cy - 2, 48 * scale, 38 * scale, -0.4, '#5c0011', '#9e0024', 0.1);
    drawAdvancedPetal(cx + 42, cy - 2, 48 * scale, 38 * scale, 0.4, '#5c0011', '#9e0024', 0.1);
    drawAdvancedPetal(cx, cy - 35, 50 * scale, 36 * scale, 0, '#4a000b', '#8b001e', 0.1);

    // Middle Whorl Petals
    drawAdvancedPetal(cx - 24, cy + 14, 38 * scale, 32 * scale, -0.2, '#800016', '#ba0029', 0.3);
    drawAdvancedPetal(cx + 24, cy + 14, 38 * scale, 32 * scale, 0.2, '#800016', '#ba0029', 0.3);
    drawAdvancedPetal(cx, cy - 18, 40 * scale, 34 * scale, 0.05, '#9e0024', '#d90429', 0.2);

    // Inner Corolla Petals
    drawAdvancedPetal(cx - 12, cy - 2, 26 * scale, 26 * scale, -0.1, '#ba0029', '#ef233c', 0.4);
    drawAdvancedPetal(cx + 12, cy - 2, 26 * scale, 26 * scale, 0.1, '#ba0029', '#ef233c', 0.4);
    drawAdvancedPetal(cx, cy + 8, 28 * scale, 22 * scale, 0, '#d90429', '#ff4d6d', 0.5);

    // Tight Core Center Spiral
    ctx.save();
    ctx.translate(cx, cy - 5);
    for (let i = 0; i < 7; i++) {
        let r = (14 - i * 1.8) * scale;
        let rot = i * 1.3;
        ctx.rotate(0.4);
        let grad = ctx.createLinearGradient(-r, -r, r, r);
        grad.addColorStop(0, '#ff758f');
        grad.addColorStop(0.5, '#ba0029');
        grad.addColorStop(1, '#2b0006');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(i % 2 === 0 ? 2 : -2, 0, r, r * 1.3, rot, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.restore();

    ctx.restore();
}

function drawAdvancedPetal(x, y, rx, ry, angle, darkColor, lightColor, highlightShift) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);

    let grad = ctx.createRadialGradient(-rx * highlightShift, -ry * 0.3, rx * 0.1, 0, 0, rx);
    grad.addColorStop(0, lightColor);
    grad.addColorStop(0.6, darkColor);
    grad.addColorStop(0.95, '#2b0006'); 
    grad.addColorStop(1, '#150003');

    ctx.fillStyle = grad;
    
    ctx.beginPath();
    ctx.moveTo(-rx, 0);
    ctx.bezierCurveTo(-rx, -ry * 1.2, rx, -ry * 1.2, rx, 0);
    ctx.bezierCurveTo(rx, ry * 0.9, -rx, ry * 0.9, -rx, 0);
    ctx.closePath();
    ctx.fill();
    
    ctx.strokeStyle = 'rgba(255, 117, 143, 0.22)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.restore();
}

function autoLeaf(lx, ly, size, angle) {
    ctx.save();
    ctx.translate(lx, ly);
    ctx.rotate(angle);
    
    let leafGrad = ctx.createLinearGradient(-size, 0, size, 0);
    leafGrad.addColorStop(0, '#2d5a27');
    leafGrad.addColorStop(0.5, '#1e4620');
    leafGrad.addColorStop(1, '#0f2b11');
    ctx.fillStyle = leafGrad;

    ctx.beginPath();
    ctx.moveTo(-size, 0);
    ctx.quadraticCurveTo(0, -size * 0.5, size, 0);
    ctx.quadraticCurveTo(0, size * 0.5, -size, 0);
    ctx.fill();

    ctx.strokeStyle = '#477e40';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-size, 0);
    ctx.lineTo(size, 0);
    ctx.stroke();
    ctx.restore();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw the centerpiece rose at base layer
    drawHyperRealisticRose(canvas.width / 2, canvas.height / 2 - 30, 1.3);

    // Draw the top layered decorative flowers
    for (let i = 0; i < flowerItems.length; i++) {
        flowerItems[i].draw();
    }

    if (flowerItems.length === 0 && !gameOver) {
        gameOver = true;
        instruction.style.opacity = 0;
        message.classList.add('show');
    }

    requestAnimationFrame(draw);
}

// --- INTERACTIVE HANDLING ---

function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
        x: clientX - rect.left,
        y: clientY - rect.top
    };
}

function handleStart(e) {
    if (gameOver) return;
    const pos = getMousePos(e);
    
    for (let i = flowerItems.length - 1; i >= 0; i--) {
        if (flowerItems[i].isPointInside(pos.x, pos.y)) {
            selectedItem = flowerItems[i];
            flowerItems.splice(i, 1);
            flowerItems.push(selectedItem); 
            
            dragOffset.x = pos.x - selectedItem.x;
            dragOffset.y = pos.y - selectedItem.y;
            break;
        }
    }
}

function handleMove(e) {
    if (!selectedItem || gameOver) return;
    e.preventDefault(); 
    
    const pos = getMousePos(e);
    selectedItem.x = pos.x - dragOffset.x;
    selectedItem.y = pos.y - dragOffset.y;

    if (selectedItem.x < -40 || selectedItem.x > canvas.width + 40 || 
        selectedItem.y < -40 || selectedItem.y > canvas.height + 40) {
        flowerItems = flowerItems.filter(item => item !== selectedItem);
        selectedItem = null;
    }
}

function handleEnd() {
    if (!selectedItem) return;
    
    let distFromCenter = Math.hypot(selectedItem.x - canvas.width/2, selectedItem.y - canvas.height/2);
    if (distFromCenter > 250) {
        flowerItems = flowerItems.filter(item => item !== selectedItem);
    }
    selectedItem = null;
}

canvas.addEventListener('mousedown', handleStart);
canvas.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);

canvas.addEventListener('touchstart', handleStart, { passive: false });
canvas.addEventListener('touchmove', handleMove, { passive: false });
window.addEventListener('touchend', handleEnd);

initGame();
draw();
</script>
</body>
</html>
