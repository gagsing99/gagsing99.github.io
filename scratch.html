<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scratch Reveal</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  /* Changed to black as requested */
  background: #000000;
}

.container {
  text-align: center;
  width: 90vw;
  max-width: 360px;
  position: relative;
}

/* Added background color to canvas for the text to appear on */
canvas {
  width: 100%;
  height: auto;
  border-radius: 20px;
  touch-action: none;
  background-color: #ffffff; 
}

.love-msg {
  margin-top: 20px;
  font-size: 7vw;
  color: #ffffff; /* White text to contrast with black background */
  opacity: 0;
  transition: opacity 1s ease;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <canvas id="canvas" width="360" height="220"></canvas>
  <div id="love" class="love-msg">I LOVE YOU!</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 1. Draw content (Text/Numbers) on the white background
ctx.fillStyle = "#000000";
ctx.font = "bold 40px Arial";
ctx.textAlign = "center";
ctx.textBaseline = "middle";
ctx.fillText("JASLEENA", canvas.width / 2, canvas.height / 2 - 20);
ctx.font = "20px Arial";
ctx.fillText("7 3 9 2 8 4", canvas.width / 2, canvas.height / 2 + 20);

// 2. Add scratch covering layer (Gray)
ctx.globalCompositeOperation = "source-over";
ctx.fillStyle = "#808080";
ctx.fillRect(0, 0, canvas.width, canvas.height);

// 3. Switch to erase mode
ctx.globalCompositeOperation = "destination-out";

let isDrawing = false;
let revealed = false;
let lastX = 0;
let lastY = 0;

function scratchLine(x, y) {
  ctx.lineWidth = 30;
  ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.stroke();
  lastX = x;
  lastY = y;
}

function checkReveal() {
  if (revealed) return;
  const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let cleared = 0;
  for (let i = 3; i < pixels.data.length; i += 4) {
    if (pixels.data[i] === 0) cleared++;
  }
  if (cleared / (canvas.width * canvas.height) > 0.5) {
    revealed = true;
    document.getElementById("love").style.opacity = 1;
  }
}

canvas.addEventListener("mousedown", (e) => {
  isDrawing = true;
  const rect = canvas.getBoundingClientRect();
  lastX = e.clientX - rect.left;
  lastY = e.clientY - rect.top;
});

canvas.addEventListener("mouseup", () => {
  isDrawing = false;
  checkReveal();
});

canvas.addEventListener("mousemove", (e) => {
  if (!isDrawing) return;
  const rect = canvas.getBoundingClientRect();
  scratchLine(e.clientX - rect.left, e.clientY - rect.top);
});

// Touch support remains the same
canvas.addEventListener("touchstart", (e) => {
  isDrawing = true;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  lastX = t.clientX - rect.left;
  lastY = t.clientY - rect.top;
});

canvas.addEventListener("touchend", () => { isDrawing = false; checkReveal(); });
canvas.addEventListener("touchmove", (e) => {
  if (!isDrawing) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  scratchLine(t.clientX - rect.left, t.clientY - rect.top);
});
</script>

</body>
</html>
