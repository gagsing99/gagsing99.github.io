<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        .scratch-container {
            position: relative;
            width: 300px;
            height: 150px;
            border: 2px solid #333;
            border-radius: 10px;
            overflow: hidden;
            user-select: none;
        }

        /* The hidden prize */
        #prize {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            background: #fff;
            color: #d4af37;
        }

        /* The scratchable silver layer */
        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
    </style>
</head>
<body>

<div class="scratch-container">
    <div id="prize">YOU WIN $100!</div>
    <canvas id="scratch-canvas" width="300" height="150"></canvas>
</div>

<script>
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');

    // Fill the canvas with silver "scratch" color
    ctx.fillStyle = '#c0c0c0';
    ctx.fillRect(0, 0, 300, 150);

    // Function to clear area where mouse/touch moves
    function scratch(e) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX || e.touches[0].clientX) - rect.left;
        const y = (e.clientY || e.touches[0].clientY) - rect.top;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 20, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousemove', (e) => {
        if (e.buttons === 1) scratch(e);
    });
    
    canvas.addEventListener('touchmove', (e) => {
        scratch(e);
    });
</script>

</body>
</html>
