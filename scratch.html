<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

        /* Revealed Message Layer (Pure Yellow) */
        .reveal-layer {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background-color: #FFFF00;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        #prize {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            text-align: center;
            color: #000000;
            font-weight: bold;
        }

        .name { font-size: 12vw; margin-bottom: 10px; }
        .message { font-size: 5vw; line-height: 1.4; margin-bottom: 20px; max-width: 90%; }
        .punjabi { font-size: 6vw; font-style: italic; }

        /* Initial Scratch Layer (White) */
        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 3;
            touch-action: none;
        }

        /* The "Butt" Graphic */
        .graphic-container {
            position: absolute;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
            pointer-events: none;
        }

        .butt-shape {
            width: 150px;
            height: 120px;
            background: #ffccaa;
            border-radius: 50% 50% 20% 20%;
            border: 4px solid #000;
            position: relative;
        }
        .butt-shape::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 80px;
            background: #000;
            left: 65px;
            top: 20px;
            border-radius: 10px;
        }
        .scratch-text { margin-top: 20px; font-family: sans-serif; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="reveal-layer">
        <div id="prize">
            <div class="name">Jasleena</div>
            <div class="message">
                Your beauty leaves me in awe and makes me want to love you more each and every day.
            </div>
            <div class="punjabi">"tu hi meri, tere naal nibhaani, bas rakh lae kol"</div>
        </div>
    </div>

    <div class="graphic-container">
        <div class="butt-shape"></div>
        <div class="scratch-text">Scratch my butt</div>
    </div>

    <canvas id="scratch-canvas"></canvas>

<script>
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = '#FFFFFF'; // White scratch layer
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    window.addEventListener('resize', resize);
    resize();

    function scratch(e) {
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 50, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousemove', (e) => { if (e.buttons === 1) scratch(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });
</script>

</body>
</html>
