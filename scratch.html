<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }

        /* The Revealed Message (Bottom Layer - Yellow) */
        .reveal-layer {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background-color: #FFFF00;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        #prize {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: #000;
            font-weight: bold;
        }

        .name { font-size: 12vw; margin-bottom: 10px; }
        .message { font-size: 5vw; line-height: 1.4; margin-bottom: 20px; max-width: 90%; }
        .punjabi { font-size: 6vw; font-style: italic; }

        /* The White Screen Layer (Middle - Contains Butt & Text) */
        .white-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #FFFFFF;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        /* Curved "W" Shape Butt */
        .butt-shape {
            width: 180px;
            height: 100px;
            background: #e0aa78;
            border-radius: 40% 40% 50% 50% / 80% 80% 20% 20%;
            position: relative;
            border: 4px solid #c68e59;
        }
        .butt-shape::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-bottom: 8px solid #c68e59;
            border-left: 8px solid #c68e59;
            border-radius: 0 0 0 20px;
            left: 50%;
            margin-left: -20px;
            top: 25px;
        }

        .scratch-text { margin-top: 30px; font-size: 24px; font-weight: bold; color: #333; }

        /* The Scratch Canvas (Top Layer) */
        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 3;
            touch-action: none;
        }
    </style>
</head>
<body>

    <!-- 1. The Revealed Message (Yellow) -->
    <div class="reveal-layer">
        <div id="prize">
            <div class="name">Jasleena</div>
            <div class="message">
                Your beauty leaves me in awe and makes me want to love you more each and every day.
            </div>
            <div class="punjabi">"tu hi meri, tere naal nibhaani, bas rakh lae kol"</div>
        </div>
    </div>

    <!-- 2. The Initial Screen (White + Graphic) -->
    <div class="white-screen">
        <div class="butt-shape"></div>
        <div class="scratch-text">scratch my butt</div>
    </div>

    <!-- 3. The Scratch Canvas (Top) -->
    <canvas id="scratch-canvas"></canvas>

<script>
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // The canvas starts fully white
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    window.addEventListener('resize', resize);
    resize();

    function scratch(e) {
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 50, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousemove', (e) => { if (e.buttons === 1) scratch(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });
</script>

</body>
</html>
