<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }

        /* The Revealed Message (Bottom Layer - Yellow) */
        .reveal-layer {
            position: absolute;
            width: 100vw;
            height: 100vh;
            background-color: #FFFF00;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1; /* Below the canvas */
        }

        #prize {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            color: #000;
            font-weight: bold;
        }

        .name { font-size: 12vw; margin-bottom: 10px; }
        .message { font-size: 5vw; line-height: 1.4; margin-bottom: 20px; max-width: 90%; }
        .punjabi { font-size: 6vw; font-style: italic; }

        /* The Canvas (Top Layer - You scratch this) */
        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            touch-action: none;
            cursor: crosshair;
        }
    </style>
</head>
<body>

    <!-- Bottom Layer: Yellow screen with your text -->
    <div class="reveal-layer">
        <div id="prize">
            <div class="name">Jasleena</div>
            <div class="message">
                Your beauty leaves me in awe and makes me want to love you more each and every day.
            </div>
            <div class="punjabi">"tu hi meri, tere naal nibhaani, bas rakh lae kol"</div>
        </div>
    </div>

    <!-- Top Layer: The Scratchable Surface -->
    <canvas id="scratch-canvas"></canvas>

<script>
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');

    function drawInitialCanvas() {
        const w = canvas.width;
        const h = canvas.height;
        
        // Fill white
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, w, h);

        // Draw two touching circles (The Butt)
        const centerX = w / 2;
        const centerY = h / 2 - 50;
        const radius = 60;

        ctx.fillStyle = '#e0aa78';
        ctx.strokeStyle = '#c68e59';
        ctx.lineWidth = 5;

        // Circle 1
        ctx.beginPath();
        ctx.arc(centerX - 55, centerY, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        // Circle 2
        ctx.beginPath();
        ctx.arc(centerX + 55, centerY, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        // Text
        ctx.fillStyle = '#333';
        ctx.font = 'bold 24px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText("scratch my butt", centerX, centerY + 120);
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        drawInitialCanvas();
    }

    window.addEventListener('resize', resize);
    resize();

    function scratch(e) {
        // Get correct coordinates
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        // "Erase" mode
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 40, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousemove', (e) => { if (e.buttons === 1) scratch(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });
</script>

</body>
</html>
