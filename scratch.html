<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scratch Love</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

.container {
  text-align: center;
  width: 90vw;
  max-width: 360px;
}

canvas {
  width: 100%;
  height: auto;
  border-radius: 20px;
  touch-action: none;
}

.love-msg {
  margin-top: 20px;
  font-size: 7vw;
  color: #880e4f;
  opacity: 0;
  transition: opacity 1s ease;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <canvas id="canvas" width="360" height="220"></canvas>
  <div id="love" class="love-msg">I LOVE YOU!</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 👉 STEP 1: Draw hidden text UNDERNEATH
ctx.fillStyle = "#c2185b";
ctx.font = "bold 42px Segoe UI";
ctx.textAlign = "center";
ctx.textBaseline = "middle";
ctx.fillText("JASLEENA", canvas.width / 2, canvas.height / 2);

// 👉 STEP 2: Add scratch covering layer
ctx.globalCompositeOperation = "source-over";
ctx.fillStyle = "#bdbdbd";
ctx.fillRect(0, 0, canvas.width, canvas.height);

// 👉 STEP 3: Switch to erase mode (scratch effect)
ctx.globalCompositeOperation = "destination-out";

let isDrawing = false;
let revealed = false;
let lastX = 0;
let lastY = 0;

// ✅ Smooth scratch brush (LINE instead of dots)
function scratchLine(x, y) {
  ctx.lineWidth = 25;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);
  ctx.stroke();

  lastX = x;
  lastY = y;
}

// ✅ Calculate scratched %
function getScratchedPercent() {
  const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
  let cleared = 0;

  for (let i = 3; i < pixels.data.length; i += 4) {
    if (pixels.data[i] === 0) cleared++;
  }

  return cleared / (canvas.width * canvas.height) * 100;
}

// ✅ Reveal logic
function checkReveal() {
  if (revealed) return;

  const percent = getScratchedPercent();

  if (percent > 60) {
    revealed = true;
    document.getElementById("love").style.opacity = 1;
  }
}

/* ✅ Mouse */
canvas.addEventListener("mousedown", (e) => {
  isDrawing = true;
  const rect = canvas.getBoundingClientRect();
  lastX = e.clientX - rect.left;
  lastY = e.clientY - rect.top;
});

canvas.addEventListener("mouseup", () => {
  isDrawing = false;
  checkReveal();
});

canvas.addEventListener("mouseleave", () => isDrawing = false);

canvas.addEventListener("mousemove", (e) => {
  if (!isDrawing) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  scratchLine(x, y);
});

/* ✅ Touch (mobile) */
canvas.addEventListener("touchstart", (e) => {
  isDrawing = true;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];

  lastX = t.clientX - rect.left;
  lastY = t.clientY - rect.top;
});

canvas.addEventListener("touchend", () => {
  isDrawing = false;
  checkReveal();
});

canvas.addEventListener("touchmove", (e) => {
  if (!isDrawing) return;
  e.preventDefault();

  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];

  const x = t.clientX - rect.left;
  const y = t.clientY - rect.top;

  scratchLine(x, y);
});
</script>

</body>
</html>
