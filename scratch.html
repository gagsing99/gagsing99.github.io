<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

        /* Starry Night Animation */
        .scratch-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at bottom, #1B2735 0%, #090A0F 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Heart Background Pattern */
        .hearts-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle, #ff69b4 2px, transparent 2px),
                radial-gradient(circle, #ffffff 2px, transparent 2px);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            opacity: 0.3;
        }

        /* Twinkling Stars */
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 3s infinite; }

        #prize {
            position: relative;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            color: #DC143C;
            font-weight: bold;
            z-index: 5;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .name { font-size: 12vw; margin-bottom: 10px; }
        .message { font-size: 5vw; line-height: 1.4; margin-bottom: 20px; max-width: 90%; }
        .punjabi { font-size: 6vw; font-style: italic; }

        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            touch-action: none;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="scratch-container" id="container">
    <div class="hearts-bg"></div>
    <div id="prize">
        <div class="name">Jasleena</div>
        <div class="message">
            Your beauty leaves me in awe and makes me want to love you more each and every day.
        </div>
        <div class="punjabi">"tu hi meri, tere naal nibhaani, bas rakh lae kol"</div>
    </div>
    <canvas id="scratch-canvas"></canvas>
</div>

<script>
    // Create random stars
    const container = document.getElementById('container');
    for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.width = star.style.height = Math.random() * 3 + 'px';
        star.style.left = Math.random() * 100 + 'vw';
        star.style.top = Math.random() * 100 + 'vh';
        star.style.animationDelay = Math.random() * 3 + 's';
        container.appendChild(star);
    }

    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.fillStyle = '#c0c0c0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    window.addEventListener('resize', resize);
    resize();

    function scratch(e) {
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 40, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousemove', (e) => { if (e.buttons === 1) scratch(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });
</script>

</body>
</html>
