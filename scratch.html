<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .scratch-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            /* Gradient Blue Background */
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #prize {
            position: absolute;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            /* Crimson Red Text */
            color: #DC143C;
            font-weight: bold;
        }

        .name { font-size: 12vw; margin-bottom: 10px; }
        .message { font-size: 5vw; line-height: 1.4; margin-bottom: 20px; max-width: 90%; }
        .punjabi { font-size: 6vw; font-style: italic; }

        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            touch-action: none;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="scratch-container">
    <div id="prize">
        <div class="name">Jasleena</div>
        <div class="message">
            Your beauty leaves me in awe and makes me want to love you more each and every day.
        </div>
        <div class="punjabi">"tu hi meri, tere naal nibhaani, bas rakh lae kol"</div>
    </div>
    <canvas id="scratch-canvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // The silver scratch layer
        ctx.fillStyle = '#c0c0c0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    window.addEventListener('resize', resize);
    resize();

    function scratch(e) {
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        
        const rect = canvas.getBoundingClientRect();
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 40, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousemove', (e) => { if (e.buttons === 1) scratch(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); scratch(e); }, { passive: false });
</script>

</body>
</html>
