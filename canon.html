<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Balloon Fight Challenge!</title>
    <style>
        :root {
            --vh: 1s;
        }
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: calc(var(--vh, 1vh) * 100);
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 12px;
            overflow: hidden;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/10;
            background: #74b9ff;
        }
        canvas {
            background: linear-gradient(to bottom, #74b9ff, #a1c4fd);
            display: block;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-size: clamp(16px, 4vw, 22px);
            font-weight: bold;
            color: #2c3e50;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            pointer-events: none;
            gap: 5px;
            z-index: 5;
        }
        .screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.96);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }
        h1 { color: #ff4757; margin-bottom: 10px; font-size: clamp(24px, 6vw, 36px); margin-top: 0;}
        h2 { color: #2ed573; margin-top: 0; font-size: clamp(20px, 5vw, 28px);}
        .challenge-box {
            background: #16a085;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: clamp(14px, 3.5vw, 16px);
            max-width: 90%;
            line-height: 1.4;
        }
        input[type="text"] {
            padding: 12px;
            width: 85%;
            max-width: 280px;
            border: 2px solid #34495e;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 16px;
            background: #fff;
            color: #333;
            -webkit-user-select: text;
            user-select: text;
        }
        button {
            padding: 12px 24px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            touch-action: manipulation;
        }
        button:hover { background: #ff6b81; }
        #share-url {
            margin-top: 15px;
            font-size: 12px;
            color: #a4b0be;
            word-break: break-all;
            max-width: 90%;
            user-select: text;
            -webkit-user-select: text;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    
    <div id="ui-layer">
        <div id="score-display">Score: 0</div>
        <div id="timer-display">Time: 30</div>
    </div>

    <div id="onboarding-screen" class="screen-overlay">
        <h1>Balloon Fight!</h1>
        <p style="font-size: 16px; margin-bottom: 15px;">Enter your name to begin:</p>
        <input type="text" id="name-input" value="Player">
        <button onclick="submitName()">Save & Continue</button>
    </div>

    <div id="start-challenge-screen" class="screen-overlay" style="display: none;">
        <h1>Incoming Challenge!</h1>
        <div id="incoming-msg-box" class="challenge-box"></div>
        <button onclick="startGameAfterChallenge()">Accept Challenge & Play</button>
    </div>

    <div id="game-over-screen" class="screen-overlay" style="display: none;">
        <h1>Game Over!</h1>
        <h2 id="final-score">Your Score: 0</h2>
        
        <p id="challenge-target-text" style="font-size: 20px; font-weight: bold; margin-bottom: 15px; color: #ffa502;"></p>
        <input type="text" id="msg-input" placeholder="Enter a cheeky trash-talk message...">
        <button onclick="generateShareLink()">Generate & Copy Share Link</button>
        <div id="share-url"></div>
        <button onclick="location.reload()" style="background: #2ed573; margin-top: 15px;">Play Again</button>
    </div>
</div>

<script>
// Mobile vh fix for Safari/Chrome UI bars
function resetVH() {
    let vh = window.innerHeight * 0.01;
    document.documentElement.style.setProperty('--vh', `${vh}px`);
}
window.addEventListener('resize', resetVH);
window.addEventListener('orientationchange', resetVH);
resetVH();

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const onboardingScreen = document.getElementById('onboarding-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const startChallengeScreen = document.getElementById('start-challenge-screen');
const incomingMsgBox = document.getElementById('incoming-msg-box');
const challengeTargetText = document.getElementById('challenge-target-text');
const scoreDisplay = document.getElementById('score-display');
const timerDisplay = document.getElementById('timer-display');
const finalScoreDisplay = document.getElementById('final-score');
const msgInput = document.getElementById('msg-input');
const nameInput = document.getElementById('name-input');
const shareUrlDisplay = document.getElementById('share-url');

// Game parameters
let score = 0;
let timeLeft = 30;
let gameActive = false;
let targets = [];
let balloons = [];
let splashes = [];
let timerInterval;
let currentUserName = "";

// Aim Tracking
let aimX = canvas.width / 2;
let aimY = 0;

// Scenery
let clouds = [
    { x: 100, y: 80, size: 30, speed: 0.3 },
    { x: 450, y: 50, size: 40, speed: 0.2 },
    { x: 700, y: 110, size: 25, speed: 0.4 }
];

// --- COOKIE HELPERS ---
function setCookie(name, value, days) {
    const d = new Date();
    d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
    document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + d.toUTCString() + ";path=/;SameSite=Strict";
}

function getCookie(name) {
    let cname = name + "=";
    let decodedCookie = decodeURIComponent(document.cookie);
    let ca = decodedCookie.split(';');
    for(let i = 0; i < ca.length; i++) {
        let c = ca[i].trim();
        if (c.indexOf(cname) == 0) return c.substring(cname.length, c.length);
    }
    return "";
}

// Web Audio Setup
let audioCtx;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function playSplashSound(isBlood) {
    if (!audioCtx) return;
    try {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        osc.type = isBlood ? 'sawtooth' : 'triangle';
        osc.frequency.setValueAtTime(isBlood ? 160 : 280, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.12);
        
        gainNode.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.13);
    } catch(e) { console.log("Audio play blocked"); }
}

// Check Cookies on Startup
currentUserName = getCookie("playerName");
if (currentUserName) {
    onboardingScreen.style.display = 'none';
    processIncomingChallenge();
}

function submitName() {
    initAudio(); // Required interaction binding for iOS Audio safety rules
    let value = nameInput.value.trim();
    currentUserName = value ? value : "Player";
    setCookie("playerName", currentUserName, 30);
    onboardingScreen.style.display = 'none';
    processIncomingChallenge();
}

function processIncomingChallenge() {
    const urlParams = new URLSearchParams(window.location.search);
    const challengerName = urlParams.get('user');
    const opponentScore = urlParams.get('score');
    const opponentMsg = urlParams.get('msg');

    if (challengerName && opponentScore !== null) {
        startChallengeScreen.style.display = 'flex';
        incomingMsgBox.innerHTML = `<strong>${challengerName}</strong> has challenged you and scored <strong>${opponentScore}</strong>!<br><br><em>"${opponentMsg || 'Beat me if you can!'}"</em>`;
    } else {
        startGame();
    }
}

function startGameAfterChallenge() {
    initAudio();
    startChallengeScreen.style.display = 'none';
    startGame();
}

function startGame() {
    gameActive = true;
    timerInterval = setInterval(() => {
        if (timeLeft > 0) {
            timeLeft--;
            timerDisplay.innerText = `Time: ${timeLeft}`;
        } else {
            endGame();
        }
    }, 1000);
    gameLoop();
}

// Particle Class
class SplashParticle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 9;
        this.vy = (Math.random() - 0.7) * 9 - 2;
        this.radius = Math.random() * 4 + 2;
        this.alpha = 1;
        this.gravity = 0.25;
        this.color = color;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += this.gravity;
        this.alpha -= 0.035;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

// Targets Class
class Target {
    constructor() {
        this.x = Math.random() * (canvas.width - 140) + 70;
        this.y = canvas.height + Math.random() * 80;
        this.radius = 26;
        this.speed = Math.random() * 2.2 + 2.2;
        this.drift = Math.random() * 2 - 1;
        
        if (Math.random() < 0.24) {
            this.icon = '❤️';
            this.type = 'pitfall';
        } else {
            const types = ['🦅', '🐛', '🕷️'];
            this.icon = types[Math.floor(Math.random() * types.length)];
            this.type = 'enemy';
        }
    }
    update() {
        this.y -= this.speed; this.x += this.drift;
        if (this.x - this.radius < 0 || this.x + this.radius > canvas.width) this.drift *= -1;
    }
    draw() {
        ctx.save();
        ctx.font = "38px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(this.icon, this.x, this.y);
        ctx.restore();
    }
}

// Balloon Projectiles
class Balloon {
    constructor(targetX, targetY) {
        this.x = canvas.width / 2; 
        this.y = canvas.height - 20;
        this.radius = 14;
        this.speed = 13;
        
        let angle = Math.atan2(targetY - this.y, targetX - this.x);
        this.vx = Math.cos(angle) * this.speed;
        this.vy = Math.sin(angle) * this.speed;
        
        const colors = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#9b59b6'];
        this.color = colors[Math.floor(Math.random() * colors.length)];
    }
    update() { this.x += this.vx; this.y += this.vy; }
    draw() {
        ctx.save();
        ctx.beginPath();
        ctx.fillStyle = this.color;
        ctx.ellipse(this.x, this.y, this.radius, this.radius * 1.3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }
}

function drawScenery() {
    // Sun
    ctx.fillStyle = '#feca57';
    ctx.beginPath(); ctx.arc(80, 80, 42, 0, Math.PI * 2); ctx.fill();

    // Clouds
    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
    clouds.forEach(c => {
        c.x += c.speed;
        if (c.x - c.size * 2 > canvas.width) c.x = -c.size * 2;
        ctx.beginPath();
        ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
        ctx.arc(c.x + c.size * 0.6, c.y - c.size * 0.4, c.size * 0.8, 0, Math.PI * 2);
        ctx.arc(c.x + c.size * 1.2, c.y, c.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
    });

    // Palm Trees
    const treePositions = [60, 180, 620, 740];
    treePositions.forEach(xPos => {
        ctx.strokeStyle = '#795548'; ctx.lineWidth = 8;
        ctx.beginPath(); ctx.moveTo(xPos, canvas.height);
        ctx.quadraticCurveTo(xPos - 5, canvas.height - 40, xPos - 10, canvas.height - 80); ctx.stroke();

        ctx.fillStyle = '#2e7d32';
        for (let i = 0; i < 5; i++) {
            ctx.beginPath();
            ctx.ellipse(xPos - 10, canvas.height - 80, 12, 30, (i * 35 * Math.PI) / 180, 0, Math.PI * 2);
            ctx.fill();
        }
    });
}

function drawCannon() {
    const cannonX = canvas.width / 2;
    const cannonY = canvas.height;
    let angle = Math.atan2(aimY - cannonY, aimX - cannonX);

    ctx.save();
    ctx.fillStyle = '#34495e';
    ctx.beginPath(); ctx.arc(cannonX, cannonY, 35, Math.PI, 0); ctx.fill();

    ctx.translate(cannonX, cannonY);
    ctx.rotate(angle);
    ctx.fillStyle = '#2c3e50'; ctx.fillRect(0, -11, 55, 22);
    ctx.fillStyle = '#1a252f'; ctx.fillRect(52, -11, 5, 22);
    ctx.restore();
}

// Spawning Cycle
let spawnTimer = 0;
function gameLoop() {
    if (!gameActive) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawScenery();

    spawnTimer++;
    if (spawnTimer % 40 === 0) {
        targets.push(new Target());
    }

    // Particle Splashes
    for (let i = splashes.length - 1; i >= 0; i--) {
        splashes[i].update(); splashes[i].draw();
        if (splashes[i].alpha <= 0) splashes.splice(i, 1);
    }

    // Balloons
    for (let b = balloons.length - 1; b >= 0; b--) {
        balloons[b].update(); balloons[b].draw();

        if (balloons[b].y < -20 || balloons[b].x < -20 || balloons[b].x > canvas.width + 20) {
            balloons.splice(b, 1); continue;
        }

        for (let t = targets.length - 1; t >= 0; t--) {
            let dist = Math.hypot(balloons[b].x - targets[t].x, balloons[b].y - targets[t].y);
            if (dist < balloons[b].radius + targets[t].radius) {
                let isHeart = (targets[t].type === 'pitfall');
                let splashColor = isHeart ? '#ff3838' : '#74b9ff';
                
                playSplashSound(isHeart);

                for(let p=0; p < 18; p++) splashes.push(new SplashParticle(targets[t].x, targets[t].y, splashColor));

                if (isHeart) {
                    score = Math.max(0, score - 15);
                } else {
                    score += 10;
                }

                targets.splice(t, 1); balloons.splice(b, 1);
                scoreDisplay.innerText = `Score: ${score}`;
                break;
            }
        }
    }

    // Targets Engine
    for (let t = targets.length - 1; t >= 0; t--) {
        targets[t].update(); targets[t].draw();
        if (targets[t].y < -40) targets.splice(t, 1);
    }

    drawCannon();
    requestAnimationFrame(gameLoop);
}

// High Compatibility Coordinate Converter for High Density Displays (Pixel 10 / iPhone 16 Pro)
function handlePointerInput(clientX, clientY) {
    if (!gameActive) return;
    initAudio(); // Workaround to safely awaken audio pipeline context on touch events
    const rect = canvas.getBoundingClientRect();
    aimX = (clientX - rect.left) * (canvas.width / rect.width);
    aimY = (clientY - rect.top) * (canvas.height / rect.height);
    balloons.push(new Balloon(aimX, aimY));
}

// Track aiming dynamically on Desktop Hover or Move
canvas.addEventListener('pointermove', (e) => {
    const rect = canvas.getBoundingClientRect();
    aimX = (e.clientX - rect.left) * (canvas.width / rect.width);
    aimY = (e.clientY - rect.top) * (canvas.height / rect.height);
});

// Primary Input trigger using Unified PointerEvents API
canvas.addEventListener('pointerdown', (e) => {
    handlePointerInput(e.clientX, e.clientY);
    e.preventDefault();
});

function endGame() {
    gameActive = false;
    clearInterval(timerInterval);
    finalScoreDisplay.innerText = `Your Score: ${score}`;
    
    if (currentUserName.toLowerCase() === "gagan") {
        challengeTargetText.innerText = "Challenge Jassa Singh!!!";
    } else {
        challengeTargetText.innerText = "Challenge Gagani Kaur!!!";
    }

    gameOverScreen.style.display = 'flex';
}

function generateShareLink() {
    const message = encodeURIComponent(msgInput.value || "Try and beat my score!");
    const baseUrl = window.location.href.split('?')[0];
    const shareUrl = `${baseUrl}?user=${encodeURIComponent(currentUserName)}&score=${score}&msg=${message}`;
    shareUrlDisplay.innerText = shareUrl;
    
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(shareUrl).then(() => {
            alert("Challenge link copied! Send it over to your opponent.");
        }).catch(() => {
            alert("Copying failed. Please copy the link text manually from the screen.");
        });
    } else {
        alert("Please copy the link text manually from the screen below.");
    }
}
</script>

</body>
</html>
