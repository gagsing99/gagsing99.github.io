<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Love Letter Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 15px;
            background: linear-gradient(135deg, #1a1c29 0%, #10111a 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: rgba(21, 23, 34, 0.6);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        h1 {
            margin: 0;
            text-align: center;
            font-size: 2.3rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #ff7b00, #ffae00, #00e5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 680px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .section-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8b9bb4;
            font-weight: 600;
            padding-left: 5px;
        }

        textarea {
            width: 100%;
            min-height: 250px;
            padding: 20px;
            border-radius: 16px;
            border: 2px solid #2e344e;
            background-color: #151722;
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.5;
            outline: none;
            resize: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            -webkit-appearance: none;
        }

        textarea:focus {
            border-color: #ffae00;
            box-shadow: 0 0 20px rgba(255, 174, 0, 0.1);
        }

        /* Styling for the live answer output box */
        .output-box {
            background-color: rgba(16, 17, 26, 0.7);
            border: 2px dashed #00e5ff;
            color: #00e5ff;
            cursor: default;
            transition: background-color 0.3s, transform 0.3s;
        }

        .output-box:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15);
        }

        .flash-pulse {
            animation: pulseGlow 0.5s ease-out;
        }

        @keyframes pulseGlow {
            0% { border-color: #00e5ff; box-shadow: 0 0 25px rgba(0, 229, 255, 0.4); }
            50% { border-color: #ff7b00; box-shadow: 0 0 25px rgba(255, 123, 0, 0.3); }
            100% { border-color: #00e5ff; box-shadow: none; }
        }

        button {
            width: 100%;
            min-height: 56px;
            padding: 0 25px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(45deg, #00e5ff, #00aaff);
            color: #10111a;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            user-select: none;
        }

        button:active {
            transform: scale(0.98);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 229, 255, 0.95);
            color: #10111a;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Love Letter Dashboard</h1>

        <div class="dashboard-grid">
            <div class="section-box">
                <div class="section-label">Section One: Your Message</div>
                <textarea id="userInput" placeholder="Type anything here..." autofocus autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
            </div>

            <div class="section-box">
                <div class="section-label">Section Two: Heart Reply</div>
                <textarea id="replyOutput" class="output-box" readonly placeholder="Waiting for you to speak..."></textarea>
            </div>
        </div>

        <button id="copyBtn">Copy Heart Reply</button>
    </div>

    <div class="toast" id="toast">Reply copied to clipboard! ✨</div>

    <script>
        const userInput = document.getElementById('userInput');
        const replyOutput = document.getElementById('replyOutput');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');

        let lastHandledText = "";

        // Context Matching Intent Database
        const intentRules = [
            {
                keywords: ["hate you", "don't love", "dislike you"],
                reply: "I still love you with all my heart, unconditionally. Nothing could ever change that."
            },
            {
                keywords: ["love you", "cherish you", "adore you", "miss you"],
                reply: "I love you infinitely more! You are my absolute world, my sunshine, and my entire happiness."
            },
            {
                keywords: ["asshole", "fucker", "idiot", "stupid", "jerk", "bitch", "shit"],
                reply: "Even when your words are sharp, I hear the beautiful, gentle soul inside you. I love you anyway."
            },
            {
                keywords: ["hurt", "pain", "sad", "crying", "broken", "lonely"],
                reply: "Please don't worry. I am right here to wrap you in pure comfort and keep you completely loved and safe."
            },
            {
                keywords: ["tired", "exhausted", "stressed", "mad", "angry"],
                reply: "Take a deep breath and rest your mind. I am sending you all my peace, energy, and love right now."
            }
        ];

        // Core Intent Evaluation Loop
        function analyzeAndReply() {
            const currentRawText = userInput.value;
            const normalizedText = currentRawText.trim().toLowerCase();

            // Skip processing cycles if text state hasn't shifted
            if (normalizedText === lastHandledText) return;
            lastHandledText = normalizedText;

            // Default fallback response if user input is empty or words don't match rules
            if (!normalizedText) {
                replyOutput.value = "";
                return;
            }

            let calculatedReply = "Know this, I will always love you.";
            let matchFound = false;

            // Intent validation sweep
            for (let rule of intentRules) {
                if (rule.keywords.some(keyword => normalizedText.includes(keyword))) {
                    calculatedReply = rule.reply;
                    matchFound = true;
                    break;
                }
            }

            // Update Section Two interface window seamlessly
            if (replyOutput.value !== calculatedReply) {
                replyOutput.value = calculatedReply;

                // Fire responsive layout visual glow feedback pulse
                replyOutput.classList.remove('flash-pulse');
                void replyOutput.offsetWidth; 
                replyOutput.classList.add('flash-pulse');
            }
        }

        // Traditional structural keyboard binding interface
        userInput.addEventListener('input', analyzeAndReply);

        // Bypasses sandbox iframe tracking gaps by running an continuous analysis poll every 100ms
        setInterval(analyzeAndReply, 100);

        // Copy Clipboard Management
        copyBtn.addEventListener('click', () => {
            const textToCopy = replyOutput.value;
            if (!textToCopy) return;
            
            navigator.clipboard.writeText(textToCopy).then(() => {
                toast.style.opacity = '1';
                setTimeout(() => { toast.style.opacity = '0'; }, 2000);
            });
        });
    </script>
</body>
</html>
