<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-select=none,touch-action=none">
<title>Alien Commando</title>
<style>
body{background:#050505;color:#fff;font-family:monospace;margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;user-select:none}
h1{margin:5px;color:#f33;text-shadow:2px 2px #0ff;font-size:1.4rem;text-transform:uppercase}
#game-container{position:relative;width:100%;max-width:800px;aspect-ratio:16/9;box-shadow:0 0 20px rgba(255,0,0,.4);background:#000}
canvas{width:100%;height:100%;display:block}
#touch-controls{display:none;position:absolute;bottom:10px;left:0;width:100%;height:110px;pointer-events:none;padding:0 20px;box-sizing:border-box}
.touch-zone{pointer-events:auto;position:absolute;bottom:0}
#dpad-container{left:20px;width:120px;height:120px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr)}
.dpad-btn{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.4);border-radius:8px;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:1.2rem}
.dpad-btn:active{background:rgba(255,51,51,.6);border-color:#f33}
#btn-up{grid-column:2;grid-row:1}
#btn-left{grid-column:1;grid-row:2}
#btn-right{grid-column:3;grid-row:2}
#btn-down{grid-column:2;grid-row:3}
#action-container{right:20px;width:140px;height:70px;display:flex;gap:15px}
.action-btn{width:65px;height:65px;border-radius:50%;background:rgba(0,255,255,.25);border:3px solid rgba(0,255,255,.6);color:#fff;font-weight:bold;display:flex;align-items:center;justify-content:center}
.action-btn:active{background:rgba(0,255,255,.7);transform:scale(.95)}
#btn-shoot{background:rgba(255,51,102,.3);border-color:rgba(255,51,102,.7)}
#btn-shoot:active{background:rgba(255,51,102,.8)}
#desktop-tip{margin-top:5px;color:#888;font-size:.8rem}
</style>
</head>
<body>
<h1>Alien Commando</h1>
<div id="game-container">
<canvas id="gameCanvas" width="800" height="450"></canvas>
<div id="touch-controls">
<div id="dpad-container" class="touch-zone">
<div id="btn-up" class="dpad-btn">▲</div>
<div id="btn-left" class="dpad-btn">◀</div>
<div id="btn-right" class="dpad-btn">▶</div>
<div id="btn-down" class="dpad-btn">▼</div>
</div>
<div id="action-container" class="touch-zone">
<div id="btn-jump" class="action-btn">JUMP</div>
<div id="btn-shoot" class="action-btn">FIRE</div>
</div>
</div>
</div>
<div id="desktop-tip">A/D: Move | W/S: Aim | K: Jump | J: Fire</div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
document.addEventListener('gesturestart',e=>e.preventDefault());
const W=800,H=450,L=3600,G=.5;
let state="START",camX=0,score=0,player,pBullets,eBullets,enemies,particles,spawners;
const keys={a:0,d:0,w:0,s:0,j:0,k:0,kp:0};
window.addEventListener('keydown',e=>hKey(e,1));
window.addEventListener('keyup',e=>hKey(e,0));
function hKey(e,down){
const k=e.key.toLowerCase();
if(k==='a'||k==='arrowleft')keys.a=down;
if(k==='d'||k==='arrowright')keys.d=down;
if(k==='w'||k==='arrowup')keys.w=down;
if(k==='s'||k==='arrowdown')keys.s=down;
if(k==='j')keys.j=down;
if(k==='k'||k===' '){if(down&&!keys.k)keys.kp=1;keys.k=down}
if(down)trig();}
function setupTouch(){
if('ontouchstart'in window||navigator.maxTouchPoints>0)document.getElementById('touch-controls').style.display='block';
bTouch('btn-up','w');bTouch('btn-left','a');bTouch('btn-right','d');bTouch('btn-down','s');bTouch('btn-shoot','j');
const j=document.getElementById('btn-jump');
j.addEventListener('touchstart',e=>{e.preventDefault();if(!keys.k)keys.kp=1;keys.k=1;trig();});
j.addEventListener('touchend',e=>{e.preventDefault();keys.k=0;});}
function bTouch(id,v){
const b=document.getElementById(id);
b.addEventListener('touchstart',e=>{e.preventDefault();keys[v]=1;trig();});
b.addEventListener('touchend',e=>{e.preventDefault();keys[v]=0;});}
function trig(){if(state!=="PLAYING"){reset();state="PLAYING"}}
const platforms=[
{x:0,y:400,w:1200,h:50},{x:1350,y:400,w:800,h:50},{x:2250,y:400,w:1400,h:50},
{x:200,y:300,w:200,h:12},{x:500,y:220,w:250,h:12},{x:900,y:300,w:200,h:12},
{x:1400,y:280,w:300,h:12},{x:1800,y:200,w:250,h:12},{x:2300,y:300,w:200,h:12},
{x:2600,y:210,w:300,h:12},{x:3000,y:290,w:400,h:12}];
class Player{
constructor(){this.x=100;this.y=200;this.w=24;this.h=44;this.vx=0;this.vy=0;this.f=1;this.ay=0;this.c=0;this.hp=3;this.iv=0;this.cd=0}
update(){
if(this.iv>0)this.iv--;if(this.cd>0)this.cd--;
this.c=keys.s&&this.g;let s=this.c?0:4.5;
if(keys.a){this.vx=-s;this.f=-1}else if(keys.d){this.vx=s;this.f=1}else this.vx=0;
this.ay=keys.w?1:(keys.s&&!this.g?-1:0);
if(keys.kp&&this.g){this.vy=-11.5;this.g=0}keys.kp=0;
this.vy+=G;this.x+=this.vx;this.colX();this.y+=this.vy;this.colY();
if(this.x<camX)this.x=camX;if(this.x>L-this.w)this.x=L-this.w;
if(this.y>H){this.dmg(1);this.x=Math.max(camX+50,this.x-150);this.y=100;this.vy=0}
if(keys.j&&!this.cd)this.fire();}
fire(){
this.cd=9;let bx=this.x+(this.f==1?this.w:0),by=this.y+(this.c?this.h*.7:this.h*.35),bvx=0,bvy=0,sp=11;
if(this.ay==1){if(keys.a||keys.d){bvx=this.f*sp*.707;bvy=-sp*.707}else{bvx=0;bvy=-sp;bx=this.x+this.w/2}}
else if(this.ay==-1){if(keys.a||keys.d){bvx=this.f*sp*.707;bvy=sp*.707}else{bvx=0;bvy=sp;bx=this.x+this.w/2}}
else{bvx=this.f*sp;bvy=0}pBullets.push(new Bullet(bx,by,bvx,bvy,1));}
dmg(a){if(this.iv>0)return;this.hp-=a;this.iv=60;if(this.hp<=0)state="GAME_OVER"}
colX(){for(let p of platforms){if(this.x<p.x+p.w&&this.x+this.w>p.x&&this.y<p.y+p.h&&this.y+this.h>p.y){if(this.vx>0)this.x=p.x-this.w;if(this.vx<0)this.x=p.x+p.w}}}
colY(){this.g=0;for(let p of platforms){if(this.x<p.x+p.w&&this.x+this.w>p.x&&this.y<p.y+p.h&&this.y+this.h>p.y){if(this.vy>0){this.y=p.y-this.h;this.vy=0;this.g=1}else if(this.vy<0){this.y=p.y+p.h;this.vy=0}}}}
draw(){
if(this.iv%4>1)return;ctx.save();ctx.translate(this.x-camX,this.y);ctx.fillStyle="#0055ff";
let rh=this.c?this.h/2:this.h,ry=this.c?this.h/2:0;ctx.fillRect(0,ry,this.w,rh);ctx.fillStyle="#f22";
ctx.fillRect(this.f==1?this.w-8:0,ry+4,8,8);ctx.fillStyle="#fcc99";ctx.fillRect(this.f==1?this.w-6:2,ry+6,4,5);
ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.beginPath();let gy=ry+(this.c?12:16);ctx.moveTo(this.w/2,gy);
if(this.ay==1)ctx.lineTo(this.f==1?this.w+6:-6,gy-12);else if(this.ay==-1)ctx.lineTo(this.f==1?this.w+6:-6,gy+12);else ctx.lineTo(this.f==1?this.w+12:-12,gy);
ctx.stroke();ctx.restore();}}
class Bullet{
constructor(x,y,vx,vy,p){this.x=x;this.y=y;this.vx=vx;this.vy=vy;this.p=p;this.sz=p?4:5;this.a=1}
update(){this.x+=this.vx;this.y+=this.vy;if(this.x<camX||this.x>camX+W||this.y<0||this.y>H)this.a=0}
draw(){ctx.fillStyle=this.p?"#0ff":"#f90";ctx.beginPath();ctx.arc(this.x-camX,this.y,this.sz,0,Math.PI*2);ctx.fill()}}
class RunnerEnemy{
constructor(x,y){this.x=x;this.y=y;this.w=24;this.h=40;this.vx=-2;this.vy=0;this.hp=1;this.a=1}
update(){
this.vy+=G;this.x+=this.vx;this.y+=this.vy;
for(let p of platforms){if(this.x<p.x+p.w&&this.x+this.w>p.x&&this.y<p.y+p.h&&this.y+this.h>p.y){if(this.vy>0){this.y=p.y-this.h;this.vy=0}}}
if(this.x<0||this.y>H)this.a=0;}
draw(){ctx.fillStyle="#3c3";ctx.fillRect(this.x-camX,this.y,this.w,this.h);ctx.fillStyle="#f00";ctx.fillRect(this.x-camX+(this.vx<0?4:this.w-8),this.y+6,4,4)}}
class TurretEnemy{
constructor(x,y){this.x=x;this.y=y;this.w=32;this.h=32;this.hp=3;this.t=Math.random()*90;this.a=1}
update(){this.t++;if(this.t>=100){this.t=0;let dx=player.x-this.x,dy=player.y-this.y,an=Math.atan2(dy,dx);eBullets.push(new Bullet(this.x+this.w/2,this.y+this.h/2,Math.cos(an)*3.5,Math.sin(an)*3.5,0))}}
draw(){ctx.fillStyle="#808";ctx.fillRect(this.x-camX,this.y,this.w,this.h);ctx.fillStyle="#f0f";ctx.beginPath();ctx.arc(this.x-camX+this.w/2,this.y+this.h/2,10,0,Math.PI*2);ctx.fill()}}
class Particle{
constructor(x,y,c){this.x=x;this.y=y;this.vx=(Math.random()-.5)*6;this.vy=(Math.random()-.5)*6;this.c=c;this.l=20;this.a=1}
update(){this.x+=this.vx;this.y+=this.vy;this.l--;if(this.l<=0)this.a=0}
draw(){ctx.fillStyle=this.c;ctx.fillRect(this.x-camX,this.y,4,4)}}
function reset(){
player=new Player();pBullets=[];eBullets=[];enemies=[];particles=[];camX=0;score=0;
enemies=[new TurretEnemy(600,120),new TurretEnemy(1000,200),new RunnerEnemy(700,200),new RunnerEnemy(850,200),new TurretEnemy(1500,150),new RunnerEnemy(1600,100),new RunnerEnemy(1900,100),new TurretEnemy(2400,200),new TurretEnemy(2800,120),new RunnerEnemy(2500,100),new RunnerEnemy(3100,200)];
spawners=[{x:450,t:0,d:150},{x:1100,t:0,d:130},{x:1750,t:0,d:160},{x:2350,t:0,d:120},{x:2900,t:0,d:100}];}
function exp(x,y,c="#f50",n=8){for(let i=0;i<n;i++)particles.push(new Particle(x,y,c))}
function box(r1,r2){return r1.x<r2.x+r2.w&&r1.x+r1.w>r2.x&&r1.y<r2.y+r2.h&&r1.y+r1.h>r2.y}
function update(){
if(state!=="PLAYING")return;player.update();
if(player.x-camX>350)camX=player.x-350;if(camX>L-W)camX=L-W;
spawners.forEach(s=>{s.t++;if(s.t>s.d&&s.x>camX&&s.x<camX+W+100){enemies.push(new RunnerEnemy(s.x,50));s.t=0}});
pBullets.forEach(b=>b.update());eBullets.forEach(b=>b.update());
enemies.forEach(e=>{e.update();if(e.a&&box(player,e))player.dmg(1)});
pBullets.forEach(b=>{enemies.forEach(e=>{if(e.a&&box({x:b.x-b.sz,y:b.y-b.sz,w:b.sz*2,h:b.sz*2},e)){b.a=0;e.hp--;exp(b.x,b.y,"#fc0",3);if(e.hp<=0){e.a=0;score+=100;exp(e.x+e.w/2,e.y+e.h/2,"#f30",12)}}})});
eBullets.forEach(b=>{if(box({x:b.x-b.sz,y:b.y-b.sz,w:b.sz*2,h:b.sz*2},player)){b.a=0;player.dmg(1)}});
pBullets=pBullets.filter(b=>b.a);eBullets=eBullets.filter(b=>b.a);enemies=enemies.filter(e=>e.a);
particles.forEach(p=>p.update());particles=particles.filter(p=>p.a);
if(box(player,{x:L-120,y:320,w:30,h:80}))state="VICTORY";}
function draw(){
ctx.fillStyle="#0c0518";ctx.fillRect(0,0,W,H);ctx.fillStyle="#220a2d";ctx.beginPath();
for(let i=0;i<6;i++){let cx=(i * 200)-(camX*.2)%200;ctx.moveTo(cx,H);ctx.lineTo(cx+100,220);ctx.lineTo(cx+200,H)}ctx.fill();
platforms.forEach(p=>{if(p.x+p.w>camX&&p.x<camX+W){ctx.fillStyle="#aa1133";ctx.fillRect(p.x-camX,p.y,p.w,p.h);ctx.fillStyle="#ff4466";ctx.fillRect(p.x-camX,p.y,p.w,4)}});
player.draw();enemies.forEach(e=>e.draw());pBullets.forEach(b=>b.draw());eBullets.forEach(b=>b.draw());particles.forEach(p=>p.draw());
if(L-camX>0){let gx=L-100-camX,gy=356;ctx.strokeStyle="#0ff";ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.strokeRect(gx-10,gy-10,40,55);ctx.setLineDash([]);ctx.fillStyle="#f6c";ctx.fillRect(gx,gy+12,20,32);ctx.fillStyle="#fcc99";ctx.fillRect(gx+3,gy,14,14);ctx.fillStyle="#630";ctx.fillRect(gx,gy,20,5)}
ctx.fillStyle="#fff";ctx.font="bold 16px monospace";ctx.fillText(`SCORE: ${score.toString().padStart(6,'0')}`,20,30);ctx.fillStyle="#f05";ctx.fillText("LIFE: ",540,30);
for(let i=0;i<3;i++){ctx.fillStyle=i<player.hp?"#f05":"#222";ctx.fillRect(600+(i*22),16,14,14)}
ctx.fillStyle="#222";ctx.fillRect(280,20,200,8);ctx.fillStyle="#0f0";ctx.fillRect(280,20,200*(player.x/L),8);
if(state==="START")scr("ALIEN COMMANDO","TAP SCREEN TO DEPLOY");
else if(state==="GAME_OVER")scr("MISSION FAILED","TAP TO TRY AGAIN");
else if(state==="VICTORY"){ctx.fillStyle="rgba(0,0,0,.9)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#f36";ctx.font="bold 36px monospace";ctx.textAlign="center";ctx.fillText("❤️ MISSION ACCOMPLISHED ❤️",W/2,H/2-20);ctx.fillStyle="#fff";ctx.font="16px monospace";ctx.fillText("You saved her heart! Tap to replay.",W/2,H/2+30);ctx.textAlign="left"}}
function scr(t,s){ctx.fillStyle="rgba(0,0,0,.8)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#f33";ctx.font="bold 42px monospace";ctx.textAlign="center";ctx.fillText(t,W/2,H/2-15);ctx.fillStyle="#0ff";ctx.font="14px monospace";ctx.fillText(s,W/2,H/2+35);ctx.textAlign="left"}
function loop(){update();draw();requestAnimationFrame(loop)}
reset();setupTouch();loop();
</script>
</body>
</html>
