<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alien Commando: Heart Rescue</title>
    <style>
        body {
            background-color: #050505;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin: 5px 0;
            color: #ff3333;
            text-shadow: 3px 3px #00ffff;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #game-wrapper {
            position: relative;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            border: 4px solid #333;
        }

        canvas {
            background-color: #000;
            display: block;
        }

        #controls-tip {
            margin-top: 10px;
            color: #aaa;
            font-size: 0.9rem;
            text-align: center;
            line-height: 1.4;
        }

        .highlight {
            color: #ffcc00;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Alien Commando</h1>
    <div id="game-wrapper">
        <canvas id="gameCanvas" width="800" height="450"></canvas>
    </div>
    
    <div id="controls-tip">
        [<span class="highlight">A / D</span>] Move Left/Right | [<span class="highlight">W</span>] Look Up | [<span class="highlight">S</span>] Crouch<br>
        [<span class="highlight">K</span>] Jump | [<span class="highlight">J</span>] Shoot (Hold for Rapid Fire) <br>
        <span class="highlight">Aiming combinations work!</span> Hold W while running to shoot diagonally up.
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Prevent scrolling default keys
    window.addEventListener("keydown", function(e) {
        if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
            e.preventDefault();
        }
    }, false);

    // --- GAME STATE CONFIGURATION ---
    const GAME_WIDTH = 800;
    const GAME_HEIGHT = 450;
    const LEVEL_LENGTH = 3600; // Map width (4.5 screen lengths)
    const GRAVITY = 0.5;

    let gameState = "START"; // START, PLAYING, GAME_OVER, VICTORY
    let cameraX = 0;
    let score = 0;

    // --- CONTROLS TRACKER ---
    const keys = {
        a: false, d: false, w: false, s: false, j: false, k: false, kPressed: false
    };

    window.addEventListener('keydown', e => handleKey(e, true));
    window.addEventListener('keyup', e => handleKey(e, false));

    function handleKey(e, isDown) {
        const key = e.key.toLowerCase();
        if (key === 'a') keys.a = isDown;
        if (key === 'd') keys.d = isDown;
        if (key === 'w') keys.w = isDown;
        if (key === 's') keys.s = isDown;
        if (key === 'j') keys.j = isDown;
        if (key === 'k') {
            if (isDown && !keys.k) keys.kPressed = true;
            keys.k = isDown;
        }

        // State progression toggles
        if (isDown && (gameState === "START" || gameState === "GAME_OVER" || gameState === "VICTORY")) {
            resetGame();
            gameState = "PLAYING";
        }
    }

    // --- STATIC MAP GEOMETRY (Platforms) ---
    const platforms = [
        // Ground floor patches
        { x: 0, y: 400, w: 1200, h: 50 },
        { x: 1350, y: 400, w: 800, h: 50 }, // Pit 1
        { x: 2250, y: 400, w: 1400, h: 50 }, // Pit 2
        
        // Contra Upper Platforms
        { x: 200, y: 300, w: 200, h: 12 },
        { x: 500, y: 220, w: 250, h: 12 },
        { x: 900, y: 300, w: 200, h: 12 },
        
        { x: 1400, y: 280, w: 300, h: 12 },
        { x: 1800, y: 200, w: 250, h: 12 },
        
        { x: 2300, y: 300, w: 200, h: 12 },
        { x: 2600, y: 210, w: 300, h: 12 },
        { x: 3000, y: 290, w: 400, h: 12 }
    ];

    // --- ENTITY CLASSES ---

    class Player {
        constructor() {
            this.x = 100;
            this.y = 200;
            this.w = 24;
            this.h = 44;
            this.vx = 0;
            this.vy = 0;
            this.speed = 4;
            this.jumpForce = -11;
            this.grounded = false;
            this.facing = 1; // 1 = Right, -1 = Left
            this.aimY = 0;   // -1 = Down, 0 = Straight, 1 = Up
            this.crouching = false;
            
            this.hp = 3;
            this.invulnFrames = 0;
            this.shootCooldown = 0;
        }

        update() {
            if (this.invulnFrames > 0) this.invulnFrames--;
            if (this.shootCooldown > 0) this.shootCooldown--;

            // Action inputs
            this.crouching = keys.s && this.grounded;
            
            // Movement speed modifiers based on crouching
            let currentSpeed = this.crouching ? 0 : this.speed;

            if (keys.a) {
                this.vx = -currentSpeed;
                this.facing = -1;
            } else if (keys.d) {
                this.vx = currentSpeed;
                this.facing = 1;
            } else {
                this.vx = 0;
            }

            // Cross-directional aiming setups
            if (keys.w) {
                this.aimY = 1; // Aiming upwards
            } else if (keys.s && !this.grounded) {
                this.aimY = -1; // Aiming downwards in mid-air
            } else {
                this.aimY = 0; // Standard horizon
            }

            // Jump handling
            if (keys.kPressed && this.grounded) {
                this.vy = this.jumpForce;
                this.grounded = false;
                keys.kPressed = false;
            }
            keys.kPressed = false; // Consume click event

            // Apply gravity forces
            this.vy += GRAVITY;

            // Move X axis
            this.x += this.vx;
            this.handleCollisionX();

            // Move Y axis
            this.y += this.vy;
            this.handleCollisionY();

            // Enforce camera box boundary limitations
            if (this.x < cameraX) this.x = cameraX;
            if (this.x > LEVEL_LENGTH - this.w) this.x = LEVEL_LENGTH - this.w;

            // Check Bottomless Pit Casualties
            if (this.y > GAME_HEIGHT) {
                this.takeDamage(1);
                this.x = Math.max(cameraX + 50, this.x - 150);
                this.y = 100;
                this.vy = 0;
            }

            // Shoot triggers
            if (keys.j && this.shootCooldown === 0) {
                this.fireWeapon();
            }
        }

        fireWeapon() {
            this.shootCooldown = 8; // Burst fire delay rate
            
            let bx = this.x + (this.facing === 1 ? this.w : 0);
            let by = this.y + (this.crouching ? this.h * 0.7 : this.h * 0.35);

            let bvx = 0;
            let bvy = 0;
            const bSpeed = 10;

            if (this.aimY === 1) { // Upward vector shifts
                if (keys.a || keys.d) {
                    bvx = this.facing * bSpeed * 0.707;
                    bvy = -bSpeed * 0.707;
                } else {
                    bvx = 0;
                    bvy = -bSpeed;
                    bx = this.x + this.w / 2; // Central alignment if pointing straight up
                }
            } else if (this.aimY === -1) { // Downward vector shifts
                if (keys.a || keys.d) {
                    bvx = this.facing * bSpeed * 0.707;
                    bvy = bSpeed * 0.707;
                } else {
                    bvx = 0;
                    bvy = bSpeed;
                    bx = this.x + this.w / 2;
                }
            } else { // Flat standard alignment vectors
                bvx = this.facing * bSpeed;
                bvy = 0;
            }

            playerBullets.push(new Bullet(bx, by, bvx, bvy, true));
        }

        takeDamage(amt) {
            if (this.invulnFrames > 0) return;
            this.hp -= amt;
            this.invulnFrames = 60; // 1 second flashing period
            if (this.hp <= 0) {
                gameState = "GAME_OVER";
            }
        }

        handleCollisionX() {
            // Box buffer check
            for (let p of platforms) {
                if (this.x < p.x + p.w && this.x + this.w > p.x && this.y < p.y + p.h && this.y + this.h > p.y) {
                    // Adjust position back out
                    if (this.vx > 0) this.x = p.x - this.w;
                    if (this.vx < 0) this.x = p.x + p.w;
                }
            }
        }

        handleCollisionY() {
            this.grounded = false;
            for (let p of platforms) {
                if (this.x < p.x + p.w && this.x + this.w > p.x && this.y < p.y + p.h && this.y + this.h > p.y) {
                    // Dropping down into or landing on solid deck profiles
                    if (this.vy > 0) {
                        this.y = p.y - this.h;
                        this.vy = 0;
                        this.grounded = true;
                    } else if (this.vy < 0) { // Head bump ceiling limits
                        this.y = p.y + p.h;
                        this.vy = 0;
                    }
                }
            }
        }

        draw() {
            if (this.invulnFrames % 4 > 1) return; // Visual flashing frame drop bypass
            
            ctx.save();
            ctx.translate(this.x - cameraX, this.y);

            // True blue/red Commando palette profile matching classic themes
            ctx.fillStyle = "#0055ff"; // Pants/uniform
            let renderH = this.crouching ? this.h / 2 : this.h;
            let renderY = this.crouching ? this.h / 2 : 0;

            // Character body canvas shapes
            ctx.fillRect(0, renderY, this.w, renderH);
            
            // Red headband/chest plate details
            ctx.fillStyle = "#ff2222";
            ctx.fillRect(this.facing === 1 ? this.w - 8 : 0, renderY + 4, 8, 8); // Head focus indicator
            ctx.fillStyle = "#ffcc99"; // Skin tone profile
            ctx.fillRect(this.facing === 1 ? this.w - 6 : 2, renderY + 6, 4, 5);

            // Gun placement draw lines
            ctx.strokeStyle = "#ffffff";
            ctx.lineWidth = 3;
            ctx.beginPath();
            let gx = this.facing === 1 ? this.w : 0;
            let gy = renderY + (this.crouching ? 12 : 16);
            ctx.moveTo(this.w / 2, gy);

            if (this.aimY === 1) {
                ctx.lineTo(this.facing === 1 ? this.w + 6 : -6, gy - 12);
            } else if (this.aimY === -1) {
                ctx.lineTo(this.facing === 1 ? this.w + 6 : -6, gy + 12);
            } else {
                ctx.lineTo(this.facing === 1 ? this.w + 12 : -12, gy);
            }
            ctx.stroke();

            ctx.restore();
        }
    }

    class Bullet {
        constructor(x, y, vx, vy, isPlayerOwned = true) {
            this.x = x;
            this.y = y;
            this.vx = vx;
            this.vy = vy;
            this.isPlayerOwned = isPlayerOwned;
            this.size = isPlayerOwned ? 4 : 5;
            this.active = true;
        }

        update() {
            this.x += this.vx;
            this.y += this.vy;

            // Bullet clipping checks outside native margins
            if (this.x < cameraX || this.x > cameraX + GAME_WIDTH || this.y < 0 || this.y > GAME_HEIGHT) {
                this.active = false;
            }
        }

        draw() {
            ctx.fillStyle = this.isPlayerOwned ? "#00ffff" : "#ff9900";
            ctx.beginPath();
            ctx.arc(this.x - cameraX, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // --- MONSTER ENEMIES CLASSES ---
    class RunnerEnemy { // Standard ground grunts
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.w = 24;
            this.h = 40;
            this.vx = -2;
            this.vy = 0;
            this.hp = 1;
            this.active = true;
        }

        update() {
            this.vy += GRAVITY;
            this.x += this.vx;
            
            // Rough platform lock mechanics
            this.vy += GRAVITY;
            this.y += this.vy;

            for (let p of platforms) {
                if (this.x < p.x + p.w && this.x + this.w > p.x && this.y < p.y + p.h && this.y + this.h > p.y) {
                    if (this.vy > 0) {
                        this.y = p.y - this.h;
                        this.vy = 0;
                    }
                }
            }

            // Reverse direction if hitting extreme edge thresholds or wall zones
            if(this.x < 0 || this.y > GAME_HEIGHT) this.active = false;
        }

        draw() {
            ctx.fillStyle = "#33cc33"; // Xenomorph alien green tones
            ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
            
            // Cyclops alien red eye dot tracker glow
            ctx.fillStyle = "#ff0000";
            ctx.fillRect(this.x - cameraX + (this.vx < 0 ? 4 : this.w - 8), this.y + 6, 4, 4);
        }
    }

    class TurretEnemy { // Wall / Fixed alien pods shooting out projectiles
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.w = 32;
            this.h = 32;
            this.hp = 3;
            this.shootTimer = Math.random() * 90;
            this.active = true;
        }

        update() {
            this.shootTimer++;
            if (this.shootTimer >= 100) {
                this.shootTimer = 0;
                // Aim directly vector tracking towards player target coordinates
                let dx = player.x - this.x;
                let dy = player.y - this.y;
                let angle = Math.atan2(dy, dx);
                let speed = 4;
                enemyBullets.push(new Bullet(this.x + this.w/2, this.y + this.h/2, Math.cos(angle)*speed, Math.sin(angle)*speed, false));
            }
        }

        draw() {
            // Bio-mechanical turret base style geometry graphics
            ctx.fillStyle = "#880088";
            ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
            ctx.fillStyle = "#ff00ff";
            ctx.beginPath();
            ctx.arc(this.x - cameraX + this.w/2, this.y + this.h/2, 10, 0, Math.PI*2);
            ctx.fill();
        }
    }

    // --- EFFECT PARTICLE EXPLOSIONS ---
    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.vx = (Math.random() - 0.5) * 6;
            this.vy = (Math.random() - 0.5) * 6;
            this.color = color;
            this.life = 20;
            this.active = true;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.life--;
            if(this.life <= 0) this.active = false;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x - cameraX, this.y, 4, 4);
        }
    }

    // --- GLOBAL OBJECT MANAGEMENT CONTAINERS ---
    let player;
    let playerBullets;
    let enemyBullets;
    let enemies;
    let particles;
    let enemySpawners;

    function resetGame() {
        player = new Player();
        playerBullets = [];
        enemyBullets = [];
        enemies = [];
        particles = [];
        cameraX = 0;
        score = 0;

        // Structured Enemy Placement maps along long scrolling path layout
        enemies = [
            new TurretEnemy(600, 120),
            new TurretEnemy(1000, 200),
            new RunnerEnemy(700, 200),
            new RunnerEnemy(850, 200),
            
            new TurretEnemy(1500, 150),
            new RunnerEnemy(1600, 100),
            new RunnerEnemy(1900, 100),
            
            new TurretEnemy(2400, 200),
            new TurretEnemy(2800, 120),
            new RunnerEnemy(2500, 100),
            new RunnerEnemy(3100, 200)
        ];

        // Active procedural spawner engine loops
        enemySpawners = [
            { x: 450, lastSpawn: 0, delay: 140 },
            { x: 1100, lastSpawn: 0, delay: 120 },
            { x: 1750, lastSpawn: 0, delay: 150 },
            { x: 2350, lastSpawn: 0, delay: 110 },
            { x: 2900, lastSpawn: 0, delay: 90 }
        ];
    }

    function spawnExplosion(x, y, color = "#ff5500", count = 8) {
        for(let i=0; i<count; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    // --- RECTANGLE COLLISION BOX LOGIC ENGINE ---
    function checkRectCollision(r1, r2) {
        return (r1.x < r2.x + r2.w && r1.x + r1.w > r2.x && r1.y < r2.y + r2.h && r1.y + r1.h > r2.y);
    }

    // --- ENGINE CORE LOOPS ---
    function update() {
        if (gameState !== "PLAYING") return;

        player.update();

        // Lock camera horizontal tracking box smoothly with safety offsets
        if (player.x - cameraX > 350) {
            cameraX = player.x - 350;
        }
        if (cameraX > LEVEL_LENGTH - GAME_WIDTH) cameraX = LEVEL_LENGTH - GAME_WIDTH;

        // Run dynamic background enemy spawners based on camera view frame proximity
        enemySpawners.forEach(s => {
            s.lastSpawn++;
            if (s.lastSpawn > s.delay) {
                if (s.x > cameraX && s.x < cameraX + GAME_WIDTH + 100) {
                    enemies.push(new RunnerEnemy(s.x, 50));
                    s.lastSpawn = 0;
                }
            }
        });

        // Update Bullets paths
        playerBullets.forEach(b => b.update());
        enemyBullets.forEach(b => b.update());

        // Update Active Monsters
        enemies.forEach(enemy => {
            enemy.update();
            
            // Check direct player body touch hazards
            if (enemy.active && checkRectCollision(player, enemy)) {
                player.takeDamage(1);
            }
        });

        // Bullet Hit Box Collision Evaluations
        playerBullets.forEach(b => {
            enemies.forEach(e => {
                if (e.active && checkRectCollision({x: b.x - b.size, y: b.y - b.size, w: b.size*2, h: b.size*2}, e)) {
                    b.active = false;
                    e.hp--;
                    spawnExplosion(b.x, b.y, "#ffcc00", 3);
                    if (e.hp <= 0) {
                        e.active = false;
                        score += 100;
                        spawnExplosion(e.x + e.w/2, e.y + e.h/2, "#ff3300", 12);
                    }
                }
            });
        });

        enemyBullets.forEach(b => {
            if (checkRectCollision({x: b.x - b.size, y: b.y - b.size, w: b.size*2, h: b.size*2}, player)) {
                b.active = false;
                player.takeDamage(1);
            }
        });

        // Filter away old spent dead arrays
        playerBullets = playerBullets.filter(b => b.active);
        enemyBullets = enemyBullets.filter(b => b.active);
        enemies = enemies.filter(e => e.active);
        
        particles.forEach(p => p.update());
        particles = particles.filter(p => p.active);

        // --- CHECK END GOAL TARGET REQUISITES (Save the Girl) ---
        // Girl objective stands near the final safety flag edge of the matrix layout map
        let girlTriggerBox = { x: LEVEL_LENGTH - 120, y: 320, w: 30, h: 80 };
        if (checkRectCollision(player, girlTriggerBox)) {
            gameState = "VICTORY";
        }
    }

    function draw() {
        // Clear frame with classic retro canvas scanline styling tone
        ctx.fillStyle = "#0c0518"; 
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        // Draw deep parallax background elements (Distant Red Alien Mountains)
        ctx.fillStyle = "#220a2d";
        ctx.beginPath();
        f
