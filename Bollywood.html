<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bollywood</title>
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --bg-surface: #141414;
            --border-dark: #262626;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --text-muted: #444444;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .watermark-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .watermark-text {
            transform: rotate(-25deg);
            font-size: 3.5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.08);
            text-align: center;
            line-height: 1.4;
            white-space: normal;
            width: 150vw;
            user-select: none;
            letter-spacing: 2px;
        }

        .game-container {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-dark);
            padding: 24px 16px;
            border-radius: 12px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            z-index: 1;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 6px;
            margin: 0 0 4px 0;
            color: var(--text-primary);
        }

        .level-indicator {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .life-meter {
            display: flex;
            justify-content: center;
            gap: 6px;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .life-letter {
            transition: all 0.2s ease;
        }

        .life-letter.active {
            color: var(--text-primary);
        }

        .life-letter.lost {
            color: var(--text-muted);
            text-decoration: line-through;
            opacity: 0.2;
        }

        .word-display {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 35px;
            min-height: 45px;
        }

        .word-segment {
            display: flex;
            gap: 6px;
        }

        .letter-slot {
            width: 28px;
            height: 38px;
            border-bottom: 2px solid var(--text-primary);
            font-size: 1.4rem;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
        }

        .keyboard-wrapper {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .num-pad {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
        }

        .alpha-pad {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .key {
            background-color: #1a1a1a;
            border: 1px solid var(--border-dark);
            color: var(--text-primary);
            padding: 12px 0;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .num-pad .key {
            padding: 10px 0;
            font-size: 0.95rem;
        }

        .key:active:not(:disabled) {
            background-color: #333333;
        }

        .key:disabled {
            background-color: #0d0d0d;
            border-color: #121212;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .status-message {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 20px;
            min-height: 24px;
            color: var(--text-secondary);
            padding: 0 10px;
            line-height: 1.4;
        }

        .btn {
            background-color: var(--text-primary);
            color: var(--bg-deep);
            border: none;
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            display: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:active {
            background-color: #cccccc;
        }
    </style>
</head>
<body>

<div class="watermark-bg">
    <div class="watermark-text">
        I love you 3000<br>
        I love you 3000<br>
        I love you 3000<br>
        I love you 3000
    </div>
</div>

<div class="game-container">
    <h1>BOLLYWOOD</h1>
    <div class="level-indicator" id="levelIndicator">Setting Up Board...</div>
    
    <div class="life-meter" id="lifeMeter"></div>
    <div class="word-display" id="wordDisplay"></div>
    <div class="status-message" id="statusMessage">Syncing core indexes...</div>
    
    <div class="keyboard-wrapper">
        <div class="num-pad" id="numPad"></div>
        <div class="alpha-pad" id="alphaPad"></div>
    </div>
    
    <button class="btn" id="nextBtn" onclick="nextLevel()">Next Level</button>
    <button class="btn" id="restartBtn" onclick="retryLevel()">Try Again</button>
</div>

<script>
    const targetPath = "devensinghbhagtani/Bollywood-Movie-Dataset/main/IMDB-Movie-Dataset%282023-1951%29.csv";
    const primaryUrl = `https://raw.githubusercontent.com/${targetPath}`;
    const fallbackUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(primaryUrl)}`;
    
    // Strict alphanumeric core backup list (No special characters allowed)
    const backupDataset = [
        "JALWA", "BOMBAY", "HULCHUL", "BAHUBALI 2 THE CONCLUSION", "RAAZI", "SHOLAY", "DANGAL", "LAGAAN", "PK", "SANJU",
        "BAJRAO MASTANI", "PADMAAVAT", "WAR", "SULTAN", "KABIR SINGH", "KICK", "BARFI", "QUEEN", "DHOOM 3", "3 IDIOTS",
        "GANGS OF WASSEYPUR 1", "GANGS OF WASSEYPUR 2", "UDTA PUNJAB", "ANDHADHUN", "STREE", "CHHICHHORE",
        "GULLY BOY", "PINK", "TALVAR", "DRISHYAM 2", "JAWAN", "PATHAN", "FAN", "RAEES", "COMMANDO 3"
    ];

    const maxLives = 9;
    const bollywoodString = "BOLLYWOOD";
    
    let masterPool = [];       
    let playedMovies = new Set(); 
    let currentMovie = "";
    let roundCount = 0;
    
    let wrongGuessesCount = 0;
    let guessedLetters = new Set();

    const lifeMeterEl = document.getElementById('lifeMeter');
    const wordDisplayEl = document.getElementById('wordDisplay');
    const numPadEl = document.getElementById('numPad');
    const alphaPadEl = document.getElementById('alphaPad');
    const statusMessageEl = document.getElementById('statusMessage');
    const levelIndicatorEl = document.getElementById('levelIndicator');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');

    async function fetchCSV(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error();
        return await response.text();
    }

    async function loadDatabaseAndStart() {
        let rawCsvText = "";
        let datasetLoaded = false;

        try {
            rawCsvText = await fetchCSV(primaryUrl);
            datasetLoaded = true;
        } catch (e) {
            try {
                rawCsvText = await fetchCSV(fallbackUrl);
                datasetLoaded = true;
            } catch (proxyError) {
                console.log("Network error. Booting strict alphanumeric backup list...");
            }
        }

        if (datasetLoaded) {
            const extractedTitles = parseCsvMovieNames(rawCsvText);
            masterPool = extractedTitles.length > 0 ? extractedTitles : [...backupDataset];
        } else {
            masterPool = [...backupDataset];
        }

        playedMovies.clear();
        roundCount = 0;
        selectAndInitNewMovie();
    }

    function parseCsvMovieNames(text) {
        const uniqueMovieNames = new Set();
        const lines = text.split(/\r?\n/);
        if (lines.length === 0) return [];

        const headerLine = lines[0];
        let headers = [];
        let curVal = "";
        let inQuotes = false;

        for (let i = 0; i < headerLine.length; i++) {
            const char = headerLine[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                headers.push(curVal.trim().toLowerCase());
                curVal = "";
            } else {
                curVal += char;
            }
        }
        headers.push(curVal.trim().toLowerCase());

        const targetColumnIndex = headers.indexOf("movie_name");
        if (targetColumnIndex === -1) return [];

        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            let currentColumnIndex = 0;
            let currentStringValue = "";
            let insideQuotes = false;
            let targetMovieName = "";

            for (let j = 0; j < line.length; j++) {
                const char = line[j];
                if (char === '"') {
                    if (insideQuotes && line[j + 1] === '"') {
                        currentStringValue += '"';
                        j++; 
                    } else {
                        insideQuotes = !insideQuotes;
                    }
                } else if (char === ',' && !insideQuotes) {
                    if (currentColumnIndex === targetColumnIndex) { 
                        targetMovieName = currentStringValue.trim();
                        break;
                    }
                    currentStringValue = "";
                    currentColumnIndex++;
                } else {
                    currentStringValue += char;
                }
            }
            
            if (!targetMovieName && currentColumnIndex === targetColumnIndex) {
                targetMovieName = currentStringValue.trim();
            }

            if (targetMovieName) {
                // Remove all characters that are NOT letters, numbers, or standard spaces
                let cleanName = targetMovieName.toUpperCase().replace(/[^A-Z0-9 ]/g, "").replace(/\s+/g, " ").trim();
                
                // Enforce a strict verification pattern: letters, numbers, and interior spaces only
                const strictAlphanumericRegex = /^[A-Z0-9 ]+$/;
                
                if (cleanName && cleanName.length > 0 && cleanName.length <= 25 && strictAlphanumericRegex.test(cleanName)) {
                    uniqueMovieNames.add(cleanName);
                }
            }
        }
        return Array.from(uniqueMovieNames);
    }

    function selectAndInitNewMovie() {
        const availableMovies = masterPool.filter(movie => !playedMovies.has(movie));
        
        if (availableMovies.length === 0) {
            statusMessageEl.textContent = "You have played through all the available movies!";
            disableAllKeys();
            return;
        }

        const randomIndex = Math.floor(Math.random() * availableMovies.length);
        currentMovie = availableMovies[randomIndex];
        
        playedMovies.add(currentMovie);
        roundCount++;

        wrongGuessesCount = 0;
        guessedLetters.clear();
        statusMessageEl.textContent = "";
        nextBtn.style.display = "none";
        restartBtn.style.display = "none";
        
        levelIndicatorEl.textContent = `Movie ${roundCount} (Remaining: ${availableMovies.length - 1})`;
        
        renderLifeMeter();
        renderWordSlots();
        renderKeyboards();
    }

    function renderLifeMeter() {
        lifeMeterEl.innerHTML = "";
        for (let i = 0; i < bollywoodString.length; i++) {
            const span = document.createElement('span');
            span.textContent = bollywoodString[i];
            span.classList.add('life-letter');
            
            if (i < wrongGuessesCount) {
                span.classList.add('lost');
            } else {
                span.classList.add('active');
            }
            lifeMeterEl.appendChild(span);
        }
    }

    function renderWordSlots() {
        wordDisplayEl.innerHTML = "";
        const words = currentMovie.split(" ");

        words.forEach(word => {
            const wordSegment = document.createElement('div');
            wordSegment.classList.add('word-segment');
            
            for (let char of word) {
                const slot = document.createElement('div');
                slot.classList.add('letter-slot');
                
                if (guessedLetters.has(char)) {
                    slot.textContent = char;
                } else {
                    slot.textContent = "";
                }
                wordSegment.appendChild(slot);
            }
            wordDisplayEl.appendChild(wordSegment);
        });
    }

    function renderKeyboards() {
        numPadEl.innerHTML = "";
        alphaPadEl.innerHTML = "";
        
        const numbers = "1234567890";
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        
        for (let num of numbers) {
            const button = document.createElement('button');
            button.textContent = num;
            button.classList.add('key');
            if (guessedLetters.has(num) || isGameOver() || isLevelCleared()) {
                button.disabled = true;
            }
            button.addEventListener('click', () => handleGuess(num));
            numPadEl.appendChild(button);
        }
        
        for (let letter of alphabet) {
            const button = document.createElement('button');
            button.textContent = letter;
            button.classList.add('key');
            if (guessedLetters.has(letter) || isGameOver() || isLevelCleared()) {
                button.disabled = true;
            }
            button.addEventListener('click', () => handleGuess(letter));
            alphaPadEl.appendChild(button);
        }
    }

    function handleGuess(char) {
        if (guessedLetters.has(char) || isGameOver() || isLevelCleared()) return;
        
        guessedLetters.add(char);
        
        if (currentMovie.includes(char)) {
            renderWordSlots();
            checkWinCondition();
        } else {
            wrongGuessesCount++;
            renderLifeMeter();
            checkLoseCondition();
        }
        
        renderKeyboards();
    }

    function isLevelCleared() {
        if (!currentMovie) return false;
        return [...currentMovie].filter(char => char !== " ").every(char => guessedLetters.has(char));
    }

    function isGameOver() {
        return wrongGuessesCount >= maxLives;
    }

    function checkWinCondition() {
        if (isLevelCleared()) {
            disableAllKeys();
            statusMessageEl.textContent = "Correct! Advance to the next stage.";
            nextBtn.style.display = "block";
        }
    }

    function checkLoseCondition() {
        if (isGameOver()) {
            disableAllKeys();
            statusMessageEl.textContent = "Game Over! Try Again.";
            restartBtn.style.display = "block";
        }
    }

    function disableAllKeys() {
        const keys = document.querySelectorAll('.key');
        keys.forEach(key => key.disabled = true);
    }

    function nextLevel() {
        selectAndInitNewMovie();
    }

    function retryLevel() {
        selectAndInitNewMovie();
    }

    loadDatabaseAndStart();
</script>

</body>
</html>
