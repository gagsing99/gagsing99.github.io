<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gagan's heart</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fff5f5;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="250" height="100" viewBox="0 0 250 100"><text x="10" y="50" font-family="cursive, sans-serif" font-size="14" fill="rgba(0, 0, 0, 0.04)" transform="rotate(-15 125 50)">i love you 3000 to infinity</text></svg>');
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
            transition: background-color 0.5s ease;
        }

        #game-container {
            position: relative;
            background: white;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 95vw;
            width: 100%;
            box-sizing: border-box;
        }

        h1 {
            color: #4a4a4a;
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 1.6rem;
            transition: color 0.5s ease;
        }

        #carousel-container {
            border: 1px dashed #ccc;
            border-radius: 8px;
            padding: 6px;
            margin-bottom: 10px;
            min-height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.5s ease, border-color 0.5s ease;
        }

        #carousel-text {
            font-weight: 600;
            font-style: italic;
            font-size: 0.95rem;
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out, color 0.5s ease;
        }

        #status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #4a4a4a;
            font-weight: 600;
            margin-bottom: 10px;
            padding: 0 2px;
            font-size: 0.85rem;
        }

        #timer {
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            min-width: 60px;
            transition: background-color 0.5s ease, border-color 0.5s ease, color 0.5s ease;
        }

        #timer.hurry {
            animation: pulse 1s infinite;
            background: #d90429 !important;
            color: white !important;
            border-color: #d90429 !important;
        }

        #inventory {
            padding: 4px 10px;
            border-radius: 20px;
            transition: background-color 0.5s ease, border-color 0.5s ease, color 0.5s ease;
        }

        #inventory.has-key {
            color: #b48a04 !important;
            background: #fffdf0 !important;
            border-color: #f3e5ab !important;
        }

        #canvas-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        canvas {
            border: 4px solid #ccc;
            border-radius: 8px;
            display: block;
            max-width: 100%;
            max-height: 48vh;
            object-fit: contain;
            transition: border-color 0.5s ease, background-color 0.5s ease;
        }

        #mobile-controls {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 10px;
            user-select: none;
        }

        .dpad-row {
            display: flex;
            justify-content: center;
        }

        .dpad-btn {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid #ccc;
            border-radius: 50%;
            margin: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            touch-action: manipulation;
            transition: background 0.1s, border-color 0.5s ease, color 0.5s ease;
        }

        .dpad-btn:active {
            color: white !important;
        }

        .controls-hint {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #7a7a7a;
        }

        #popup-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #popup-box {
            background: white;
            padding: 25px 15px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            max-width: 85%;
            text-align: center;
            border: 3px solid #ccc;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transition: border-color 0.5s ease;
        }

        #popup-message {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
            font-family: 'Georgia', serif;
            line-height: 1.4;
            transition: color 0.5s ease;
        }

        #popup-btn {
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.3s ease;
        }

        @media (max-width: 768px) {
            #mobile-controls {
                display: flex;
            }
            h1 { font-size: 1.4rem; }
            .controls-hint { display: none; }
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div id="game-container">
        <h1 id="game-title">Gagan's heart</h1>
        
        <div id="carousel-container">
            <div id="carousel-text">Loading sweet lines...</div>
        </div>

        <div id="status-bar">
            <div id="level-indicator">Level 1 / 10</div>
            <div id="timer">⏱️ 45s</div>
            <div id="inventory">🎒 Keys: ❌</div>
        </div>
        
        <div id="canvas-wrapper">
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="mobile-controls">
            <div class="dpad-row">
                <button class="dpad-btn" id="btn-up">▲</button>
            </div>
            <div class="dpad-row">
                <button class="dpad-btn" id="btn-left">◀</button>
                <button class="dpad-btn" id="btn-down">▼</button>
                <button class="dpad-btn" id="btn-right">▶</button>
            </div>
        </div>
        
        <div class="controls-hint">Collect all <b>🔑 Keys</b> to open the doors before reaching the heart!</div>

        <!-- Pop-up Overlay -->
        <div id="popup-overlay">
            <div id="popup-box">
                <div id="popup-message">Message goes here!</div>
                <button id="popup-btn">Next Level</button>
            </div>
        </div>
    </div>

        const popupMessage = document.getElementById('popup-message');
        const popupBtn = document.getElementById('popup-btn');
        const bgMusic = document.getElementById('bgMusic');
        const dpadButtons = document.querySelectorAll('.dpad-btn');

        let timeLeft = 0;

        function applyTheme() {
            const theme = themes[currentLevel];
            document.body.style.backgroundColor = theme.bg;
            gameTitle.style.color = theme.main;
            
            carouselContainer.style.backgroundColor = theme.light;
            carouselContainer.style.borderColor = theme.wall;
            carouselText.style.color = theme.main;

            timerDiv.style.backgroundColor = theme.light;
            timerDiv.style.borderColor = theme.wall;
            timerDiv.style.color = theme.main;

            inventoryDiv.style.backgroundColor = theme.light;
            inventoryDiv.style.borderColor = theme.wall;
            inventoryDiv.style.color = theme.wallBorder;

            canvas.style.borderColor = theme.wall;

        function tryPlayMusic() {
            if (!audioInitialized) {
                bgMusic.volume = 0.2;
                bgMusic.play().then(() => {
                    audioInitialized = true;
                }).catch(e => console.log("Audio playlist gesture active"));
            }
        }

        function initCarousel() {
            carouselText.textContent = carouselLines[carouselIndex];
            setInterval(() => {
                carouselText.style.opacity = 0;
                carouselText.style.transform = "translateY(-10px)";
                setTimeout(() => {
                    carouselIndex = (carouselIndex + 1) % carouselLines.length;
                    carouselText.textContent = carouselLines[carouselIndex];
                    carouselText.style.opacity = 1;
                    carouselText.style.transform = "translateY(0)";
                }, 400);
            }, 3000);
        }

        function startTimer() {
            clearInterval(timerInterval);
            // Linear increase: Level 1 (index 0) = 45s, Level 2 (index 1) = 55s, etc.
            timeLeft = 45 + (currentLevel * 10);
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    triggerGameOver();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            timerDiv.textContent = `⏱️ ${timeLeft}s`;
            if (timeLeft <= 10 && timeLeft > 0) {
                timerDiv.classList.add('hurry');
            } else {
                timerDiv.classList.remove('hurry');
            }
        }

        function updateInventoryDisplay() {
            let statusStr = "🎒 Keys: ";
            if (keysFound === 0) {
                statusStr += "❌";
            } else {
                for (let i = 0; i < keysFound; i++) statusStr += "🔑";
                for (let i = keysFound; i < totalKeysNeeded; i++) statusStr += "❌";
            }
            inventoryDiv.textContent = statusStr;

            if (keysFound === totalKeysNeeded) {
                inventoryDiv.classList.add('has-key');
            } else {
                inventoryDiv.classList.remove('has-key');
            }
        }

        function forcePath(start, target) {
            let queue = [{x: start.x, y: start.y}];
            let visited = Array.from({ length: gridSize }, () => Array(gridSize).fill(false));
            let parent = {};
            visited[start.y][start.x] = true;
            let found = false;

            while (queue.length > 0) {
                let curr = queue.shift();
                if (curr.x === target.x && curr.y === target.y) {
                    found = true;
                    break;
                }
                let directions = [[0,1], [1,0], [0,-1], [-1,0]];
                for (let [dx, dy] of directions) {
                    let nx = curr.x + dx;
                    let ny = curr.y + dy;
                    if (nx >= 0 && nx < gridSize && ny >= 0 && ny < gridSize) {
                        if (!visited[ny][nx] && map[ny][nx] !== TILE.WALL) {
                            visited[ny][nx] = true;
                            parent[`${nx},${ny}`] = curr;
                            queue.push({x: nx, y: ny});
                        }
                    }
                }
            }

            if (!found) {
                queue = [{x: start.x, y: start.y}];

                while (queue.length > 0) {
                    let curr = queue.shift();
                    if (curr.x === target.x && curr.y === target.y) break;
                    let directions = [[0,1], [1,0], [0,-1], [-1,0]];
                    for (let [dx, dy] of directions) {
                        let nx = curr.x + dx;
                        let ny = curr.y + dy;
                        if (nx >= 0 && nx < gridSize && ny >= 0 && ny < gridSize) {
                            if (!visited[ny][nx]) {
                                visited[ny][nx] = true;
                                parent[`${nx},${ny}`] = curr;
                                queue.push({x: nx, y: ny});
                            }
                        }
                    }
                }
                let curr = target;
                while (curr.x !== start.x || curr.y !== start.y) {
                    if (map[curr.y][curr.x] === TILE.WALL) {
                        map[curr.y][curr.x] = TILE.FLOOR;
                    }
                    curr = parent[`${curr.x},${curr.y}`];
                }
            }
        }
